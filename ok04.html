<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>حصيلة أنشطة الوزارة من 2021 إلى 2025</title>
<meta name="description" content="حصيلة أنشطة وزارة إعداد التراب الوطني والتعمير والإسكان وسياسة المدينة من 2021 إلى 2025">
<style>
:root {
  --primary-color: #9370DB;
  --secondary-color: #BA55D3;
  --accent-color: #6A5ACD;
  --text-color: #333;
  --light-bg: #f8f4ff;
  --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
  --hover-shadow: 0 8px 20px rgba(147, 112, 219, 0.15);
  --facebook-blue: #0866ff;
  --facebook-blue-dark: #1877f2;
  --soft-bg: #f0f2f5;
  --transition: 0.3s ease;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Arial', sans-serif;
    background-attachment: fixed; /* C'est ce qui rend l'image fixe au scroll */
    background-size: cover;
    background-position: left left;
  color: var(--text-color);
  line-height: 1.6;
  min-height: 20vh;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 clamp(12px, 3vw, 20px);
}

/* Header Styles */
.header {
  text-align: center;
  padding: clamp(12px, 2vw, 16px);
  margin: clamp(8px, 1.5vw, 12px) 0;
  background: rgba(255, 255, 255, 0.98);
  border-radius: 16px;
  box-shadow: var(--card-shadow);
  border: 1px solid rgba(147, 112, 219, 0.1);
  position: sticky;
  top: 0;
  z-index: 1000;
  backdrop-filter: blur(10px);
}

.logo-arabic {
  font-size: clamp(1rem, 1.5vw, 1.1rem);
  font-weight: 700;
  color: var(--accent-color);
  line-height: 1.4;
}

.main-title {
  text-align: center;
  margin: clamp(15px, 3vw, 30px) 0;
  
  /* On garde un padding généreux pour la hauteur du bloc */
  padding: clamp(60px, 10vw, 120px) 20px; 
  
  background-image: url('background.jpg');
  background-repeat: no-repeat;
  background-position: center; /* L'image reste au milieu */
  
  /* 1. Taille réduite à 80% (soit -20%) */
  /* "80%" signifie que l'image prendra 80% de la largeur du div */
  /* "auto" permet de garder les proportions (ne pas écraser l'image) */
  background-size: 80% auto; 

  /* 2. Style du texte */
  color: white;
  border-radius: 20px;
  box-shadow: 0 8px 25px rgba(147, 112, 219, 0.3);
  font-size: clamp(1.8rem, 4vw, 2.5rem);
  font-weight: 800;
  text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.7);

  display: flex;
  align-items: center;
  justify-content: center;
}
/* Video Section - Position alignée avec l'image */
.video-section {
  display: none;
  position: relative;
  top: 0;
  margin: clamp(15px, 3vw, 25px) 0;
  animation: fadeIn 0.5s ease;
  z-index: 10;
}

.video-section.active {
  display: block;
}

.video-container {
  background: linear-gradient(135deg, #2a2a3a 0%, #3a3a4a 100%); /* Arrière-plan différent */
  border-radius: 16px;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
  overflow: hidden;
  border: 1px solid rgba(147, 112, 219, 0.3);
  position: relative;
  top: 0;
}

.video-header {
  padding: clamp(15px, 3vw, 25px);
  background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 15px;
}

.video-header h2 {
  margin: 0;
  font-size: clamp(1.3rem, 2.5vw, 1.6rem);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-weight: 700;
}

.close-video {
  background: rgba(255, 255, 255, 0.2);
  border: none;
  color: white;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 1.5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  flex-shrink: 0;
}

.close-video:hover {
  background: rgba(255, 255, 255, 0.3);
  transform: scale(1.1);
}

.video-wrapper {
  position: relative;
  padding-bottom: 56.25%;
  height: 0;
  overflow: hidden;
  background: #000;
}

.video-iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: none;
}

.video-info {
  padding: clamp(20px, 3vw, 30px);
  background: transparent;
}

.video-title-ar {
  font-weight: 800;
  color: white;
  font-size: clamp(1.5rem, 3vw, 1.9rem);
  margin-bottom: 15px;
  text-align: right;
  direction: rtl;
  line-height: 1.4;
}

.video-title-fr {
  font-style: italic;
  color: rgba(255, 255, 255, 0.8);
  margin-bottom: 25px;
  font-size: clamp(1.2rem, 2vw, 1.5rem);
  line-height: 1.4;
}

.video-description {
  color: rgba(255, 255, 255, 0.9);
  font-size: clamp(1rem, 1.6vw, 1.15rem);
  line-height: 1.7;
  margin: 20px 0;
}

.video-description.ar {
  text-align: right;
  direction: rtl;
}

/* Tags Styles - Masqués */
.tags-container {
  display: none !important;
}

.tag, .hashtag {
  display: none !important;
}

.video-meta {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: clamp(15px, 2vw, 20px);
  margin: 25px 0;
  padding: clamp(15px, 2vw, 20px);
  background: rgba(255, 255, 255, 0.1);
  border-radius: 16px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
}

.meta-item {
  display: flex;
  align-items: center;
  gap: 12px;
}

.meta-icon {
  font-size: 1.5rem;
  opacity: 0.9;
  color: white;
}

.meta-content {
  display: flex;
  flex-direction: column;
}

.meta-label {
  font-size: 0.85rem;
  opacity: 0.7;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
  color: rgba(255, 255, 255, 0.8);
}

.meta-value {
  font-size: 1.2rem;
  font-weight: 700;
  color: white;
}

.video-stats {
  display: flex;
  flex-wrap: wrap;
  gap: clamp(10px, 1.5vw, 15px);
  margin: 25px 0;
  padding: clamp(15px, 2vw, 20px);
  background: rgba(255, 255, 255, 0.1);
  border-radius: 16px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
}

.stat-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 20px;
  background: rgba(255, 255, 255, 0.15);
  color: white;
  border-radius: 30px;
  font-size: 1rem;
  font-weight: 600;
  flex: 1;
  min-width: 140px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  transition: all var(--transition);
}

.stat-item:hover {
  background: rgba(255, 255, 255, 0.25);
  transform: translateY(-2px);
}

.facebook-link {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: clamp(14px, 2.5vw, 18px) clamp(22px, 3.5vw, 30px);
  background: var(--facebook-blue);
  color: white;
  text-decoration: none;
  border-radius: 14px;
  font-weight: 700;
  font-size: 1.1rem;
  transition: all var(--transition);
  margin-top: 25px;
  width: fit-content;
  border: none;
}

.facebook-link:hover {
  background: var(--facebook-blue-dark);
  transform: translateY(-3px);
  box-shadow: 0 6px 20px rgba(8, 102, 255, 0.4);
}

.facebook-icon {
  font-size: 1.4rem;
}

/* Controls */
.controls {
  display: flex;
  flex-wrap: wrap;
  gap: clamp(10px, 2vw, 15px);
  justify-content: center;
  margin: clamp(15px, 3vw, 25px) 0;
}

.search-input, .year-select {
  flex: 1;
  min-width: 220px;
  padding: clamp(14px, 2.5vw, 16px) clamp(18px, 3vw, 24px);
  font-size: 1.1rem;
  border: 2px solid #ddd;
  background: white;
  border-radius: 12px;
  transition: all var(--transition);
  outline: none;
  font-weight: 500;
}

.search-input:focus, .year-select:focus {
  border-color: var(--primary-color);
  box-shadow: 0 0 0 4px rgba(147, 112, 219, 0.15);
  transform: translateY(-2px);
}

.theme-toggle {
  padding: clamp(14px, 2.5vw, 16px) clamp(18px, 3vw, 24px);
  background: var(--primary-color);
  color: white;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-size: 1.3rem;
  transition: all var(--transition);
  min-width: 70px;
  font-weight: 600;
}

.theme-toggle:hover {
  background: var(--secondary-color);
  transform: translateY(-3px);
  box-shadow: 0 4px 15px rgba(147, 112, 219, 0.3);
}

/* Year Sections avec même couleur que main-title */
.year-section {
  margin-bottom: clamp(25px, 4vw, 35px);
  background: white;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: var(--card-shadow);
  border: 1px solid rgba(147, 112, 219, 0.1);
  transition: transform var(--transition);
}

.year-section:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
}

.year-header {
  width: 100%;
  padding: clamp(18px, 3vw, 25px);
  background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%); /* Même couleur que main-title */
  color: white;
  border: none;
  text-align: right;
  font-size: clamp(1.4rem, 2.5vw, 1.7rem);
  font-weight: 800;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: all var(--transition);
  gap: 15px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.year-header:hover {
  background: linear-gradient(135deg, #8a64d4 0%, #b04de6 100%);
}

.year-count {
  background: rgba(255, 255, 255, 0.2);
  color: white;
  padding: 8px 18px;
  border-radius: 25px;
  font-size: 1.1rem;
  font-weight: 700;
  min-width: 50px;
  text-align: center;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.1);
}

.videos-panel {
  padding: 0;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.year-header.open + .videos-panel {
  max-height: 5000px;
  padding: clamp(20px, 3vw, 30px);
}

/* Publication Cards */
.publication-card {
  padding: clamp(25px, 4vw, 35px);
  margin: clamp(20px, 3vw, 30px) 0;
  border-radius: 20px;
  animation: fadeIn 0.4s ease;
  direction: rtl;
  background: white;
  border: 2px solid rgba(147, 112, 219, 0.1);
  box-shadow: 0 6px 25px rgba(0, 0, 0, 0.08);
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}

.publication-card:before {
  content: '';
  position: absolute;
  top: 0;
  right: 0;
  width: 5px;
  height: 100%;
  background: linear-gradient(to bottom, var(--primary-color), var(--secondary-color));
  border-radius: 0 20px 20px 0;
}

.publication-card:hover {
  transform: translateY(-8px);
  box-shadow: 0 15px 40px rgba(147, 112, 219, 0.2);
  border-color: rgba(147, 112, 219, 0.3);
}

.publication-card:last-child {
  margin-bottom: 0;
}

.card-header {
  display: flex;
  align-items: center;
  margin-bottom: clamp(18px, 3vw, 25px);
  padding-bottom: clamp(15px, 2.5vw, 20px);
  border-bottom: 2px solid #f0f0f0;
  gap: clamp(12px, 2.5vw, 18px);
}

.avatar {
  width: clamp(60px, 8vw, 75px);
  height: clamp(60px, 8vw, 75px);
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 800;
  font-size: clamp(1.5rem, 2.5vw, 1.8rem);
  box-shadow: 0 6px 15px rgba(147, 112, 219, 0.3);
  flex-shrink: 0;
  border: 3px solid white;
}

/* page-name masqué */
.page-name {
  display: none !important;
}

.post-date {
  font-size: 1rem;
  color: #ffffff;
  background: linear-gradient(135deg, #6A5ACD, #9370DB);
  padding: 8px 18px;
  border-radius: 25px;
  display: inline-block;
  margin-top: 5px;
  font-weight: 700;
  box-shadow: 0 4px 12px rgba(106, 90, 205, 0.4);
  border: 1px solid rgba(255, 255, 255, 0.2);
}

.thumb {
  position: relative;
  border-radius: 16px;
  overflow: hidden;
  margin: clamp(18px, 3vw, 28px) 0;
  cursor: pointer;
  background: #f5f5f5;
  transition: all var(--transition);
  border: 2px solid white;
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
}

.thumb:hover {
  transform: scale(1.03);
  box-shadow: 0 12px 35px rgba(0, 0, 0, 0.25);
}

.thumb img {
  width: 100%;
  height: auto;
  aspect-ratio: 16/9;
  object-fit: cover;
  display: block;
  transition: transform var(--transition);
}

.video-thumb {
  aspect-ratio: 16/9;
}

.reel-thumb {
  aspect-ratio: 9/16;
  max-width: 350px;
  margin: clamp(18px, 3vw, 28px) auto;
  border-radius: 20px;
  border: 4px solid white;
  box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
}

.play {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(50px, 8vw, 70px);
  color: white;
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(4px);
  transition: all var(--transition);
  opacity: 0.9;
}

.play:hover {
  opacity: 1;
  background: rgba(0, 0, 0, 0.5);
}

.video-duration {
  position: absolute;
  bottom: 20px;
  left: 20px;
  background: rgba(0, 0, 0, 0.8);
  color: white;
  padding: 8px 16px;
  border-radius: 15px;
  font-size: 0.9rem;
  font-weight: 600;
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255, 255, 255, 0.1);
}

.post-content {
  font-size: clamp(1.1rem, 1.8vw, 1.25rem);
  line-height: 1.8;
  margin: clamp(18px, 3vw, 28px) 0;
  color: #444;
  text-align: right;
}

/* Titre de publication augmenté au maximum */
.post-content strong {
  color: var(--accent-color);
  font-weight: 800;
  display: block;
  margin-bottom: 12px;
  font-size: clamp(1.5rem, 3vw, 2rem); /* Augmenté au maximum */
  line-height: 1.4;
}

.description-container {
  position: relative;
  margin-bottom: 20px;
}

.description-text {
  line-height: 1.8;
  font-size: 1.05rem;
}

.description-text.truncated {
  max-height: 150px;
  overflow: hidden;
  position: relative;
}

.description-text.truncated::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 60px;
  background: linear-gradient(to bottom, transparent, white);
}

.see-more-btn {
  background: rgba(147, 112, 219, 0.1);
  border: 1px solid rgba(147, 112, 219, 0.3);
  color: var(--primary-color);
  cursor: pointer;
  font-weight: 700;
  padding: 10px 20px;
  margin-top: 15px;
  border-radius: 10px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: all var(--transition);
  font-size: 0.95rem;
}

.see-more-btn:hover {
  background: rgba(147, 112, 219, 0.2);
  transform: translateY(-3px);
  box-shadow: 0 4px 12px rgba(147, 112, 219, 0.2);
}

.see-more-btn .icon {
  font-size: 0.9rem;
  transition: transform var(--transition);
}

.see-more-btn.expanded .icon {
  transform: rotate(180deg);
}

.post-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: clamp(12px, 2vw, 18px);
  font-size: 1rem;
  color: #666;
  padding: clamp(18px, 2.5vw, 25px) 0;
  margin: clamp(18px, 3vw, 28px) 0;
  border-top: 2px solid #f0f0f0;
  border-bottom: 2px solid #f0f0f0;
}

.post-stats div {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: clamp(12px, 2vw, 16px);
  background: #f9f9f9;
  border-radius: 12px;
  justify-content: center;
  text-align: center;
  font-weight: 600;
  border: 1px solid rgba(0,0,0,0.05);
  transition: all var(--transition);
}

.post-stats div:hover {
  background: #f0f0f0;
  transform: translateY(-3px);
}

.btn {
  display: block;
  width: 100%;
  padding: clamp(18px, 3vw, 24px);
  text-align: center;
  background: var(--facebook-blue);
  color: white;
  text-decoration: none;
  border-radius: 14px;
  font-weight: 700;
  font-size: clamp(1.1rem, 1.8vw, 1.3rem);
  margin-top: clamp(25px, 4vw, 35px);
  transition: all var(--transition);
  border: none;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(8, 102, 255, 0.2);
}

.btn:hover {
  background: var(--facebook-blue-dark);
  transform: translateY(-5px);
  box-shadow: 0 8px 25px rgba(8, 102, 255, 0.4);
}

/* Tags in Cards - Masqués */
.card-tags {
  display: none !important;
}

.card-tag, .card-hashtag {
  display: none !important;
}

/* Reels Badge */
.reels-badge {
  display: inline-flex;
  align-items: center;
  background: linear-gradient(45deg, #FF0069, #FF7F00);
  color: white;
  padding: 10px 20px;
  border-radius: 30px;
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 20px;
  gap: 10px;
  width: fit-content;
  box-shadow: 0 4px 15px rgba(255, 0, 105, 0.3);
  border: 2px solid rgba(255, 255, 255, 0.2);
}

.reels-badge::before {
  content: '🎬';
  font-size: 1.4rem;
}
.footer {
  text-align: center;
  /* 1. Réduction de la hauteur via le padding */
  padding: clamp(30px, 5vw, 60px) 20px;
  
  /* 2. Suppression ou réduction de la hauteur minimale */
  min-height: auto; 
  
  margin-top: 30px;
  
  /* 3. Image COMPLÈTE et proportionnelle */
  background-repeat: no-repeat;
  background-position: center;
  
  /* Utilisation de "contain" pour voir toute l'image sans coupure */
  background-size: contain; 
  
  /* Note : Si l'image est fixe, elle risque de paraître coupée. 
     Il est préférable d'enlever "fixed" ici pour la voir en entier. */
  background-attachment: scroll;

  /* 4. Style et lisibilité */
  color: #333; /* Changé en sombre si le fond devient blanc autour de l'image */
  font-size: clamp(0.9rem, 1.3vw, 1.1rem);
  border-top: 2px solid #e4e6eb;
  border-radius: 20px;
  
  /* 5. Flexbox pour bien caler le texte */
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
/* No Results */
.no-results {
  text-align: center;
  padding: 50px;
  color: #666;
  font-size: 1.2rem;
  background: white;
  border-radius: 20px;
  box-shadow: var(--card-shadow);
  border: 2px solid rgba(147, 112, 219, 0.1);
}

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Dark Mode */
.dark-mode {
  --text-color: #e4e6eb;
  --light-bg: #2a2a3a;
  --card-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
  --soft-bg: #1a1a2e;
}

.dark-mode body {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  color: var(--text-color);
}

.dark-mode .header,
.dark-mode .year-section,
.dark-mode .publication-card,
.dark-mode .no-results {
  background: rgba(30, 30, 46, 0.95);
  color: var(--text-color);
  border-color: rgba(255, 255, 255, 0.1);
}

.dark-mode .video-container {
  background: linear-gradient(135deg, #1a1a2e 0%, #2a2a3a 100%);
  border-color: rgba(147, 112, 219, 0.3);
}

.dark-mode .video-description,
.dark-mode .post-content {
  color: #d0d3d9;
}

.dark-mode .post-stats div {
  background: rgba(255, 255, 255, 0.08);
}

.dark-mode .thumb {
  background: rgba(255, 255, 255, 0.05);
  border-color: rgba(255, 255, 255, 0.1);
}

.dark-mode .search-input,
.dark-mode .year-select {
  background: rgba(255, 255, 255, 0.1);
  border-color: rgba(255, 255, 255, 0.2);
  color: var(--text-color);
}

.dark-mode .description-text.truncated::after {
  background: linear-gradient(to bottom, transparent, rgba(30, 30, 46, 0.95));
}

/* Responsive */

// État de l'application
const state = {
  openYear: null,
  activeVideo: null,
  searchTerm: '',
  selectedYear: ''
};

// Initialisation
function init() {
  renderVideos();
  setupEventListeners();
  restoreTheme();
  updateLastUpdated();
}

// Rendre les vidéos
function renderVideos() {
  const videosTree = document.getElementById('videosTree');
  videosTree.innerHTML = '';
  
  const filteredVideos = filterVideos();
  
  if (filteredVideos.length === 0) {
    videosTree.innerHTML = `
      <div class="year-section">
        <div class="year-header">
          <span>لا توجد نتائج</span>
          <span class="year-count">0</span>
        </div>
        <div class="videos-panel" style="max-height: none; padding: 20px;">
          <div class="no-results">
            <p style="text-align: center; color: #666; font-size: 1.2rem;">
              لم يتم العثور على أي فيديو يطابق البحث
            </p>
          </div>
        </div>
      </div>
    `;
    return;
  }
  
  const grouped = groupVideosByYear(filteredVideos);
  
  Object.keys(grouped).sort((a, b) => b - a).forEach(year => {
    const yearSection = createYearSection(year, grouped[year]);
    videosTree.appendChild(yearSection);
  });
  
  if (state.openYear) {
    const yearHeader = document.querySelector(`[data-year="${state.openYear}"]`);
    if (yearHeader) toggleYearPanel(yearHeader);
  }
}

// Filtrer les vidéos
function filterVideos() {
  return VIDEO_DATA.filter(video => {
    // S'assurer que les propriétés minimales existent
    if (!video.titre_ar && !video.titre_fr) {
      console.warn('Vidéo sans titre:', video.fbid);
      return false;
    }
    
    const matchesSearch = !state.searchTerm || 
      [video.titre_ar || '', video.titre_fr || '', video.description_ar || '', video.description_fr || '']
        .some(text => text && text.toLowerCase().includes(state.searchTerm.toLowerCase()));
    
    const matchesYear = !state.selectedYear || video.year === state.selectedYear;
    
    return matchesSearch && matchesYear;
  });
}

// Grouper par année
function groupVideosByYear(videos) {
  return videos.reduce((groups, video) => {
    if (!groups[video.year]) groups[video.year] = [];
    groups[video.year].push(video);
    return groups;
  }, {});
}

// Créer une section d'année
function createYearSection(year, videos) {
  const section = document.createElement('section');
  section.className = 'year-section';
  section.setAttribute('aria-label', `Vidéos de l'année ${year}`);
  
  const header = document.createElement('button');
  header.className = 'year-header';
  header.dataset.year = year;
  header.setAttribute('aria-expanded', 'false');
  header.innerHTML = `
    سنة ${year} <span class="year-count">${videos.length}</span>
  `;
  
  const panel = document.createElement('div');
  panel.className = 'videos-panel';
  panel.setAttribute('role', 'region');
  
  videos.forEach((video, index) => {
    setTimeout(() => {
      const videoCard = createVideoCard(video);
      panel.appendChild(videoCard);
    }, index * 100);
  });
  
  section.appendChild(header);
  section.appendChild(panel);
  
  return section;
}

// Créer une carte vidéo
function createVideoCard(video) {
  const isActive = state.activeVideo?.fbid === video.fbid;
  const card = document.createElement('article');
  card.className = `publication-card ${isActive ? 'active' : ''}`;
  
  // Utiliser le titre arabe s'il existe, sinon le titre français
  const title = video.titre_ar || video.titre_fr;
  card.setAttribute('aria-label', title);
  card.style.animationDelay = `${Math.random() * 0.3}s`;
  
  const thumbnailContent = video.thumbnail ? createThumbnailContent(video) : '';
  const reelsBadge = video.type === 'reel' ? createReelsBadge() : '';
  
  // Vérifier si la description est longue (>150 caractères)
  // Priorité: description arabe, sinon description française
  const description = video.description_ar || video.description_fr || '';
  const isLongDescription = description.length > 150;
  
  // Créer le contenu de la description avec "Voir plus" si nécessaire
  const descriptionContent = createDescriptionContent(description, 'ar', isLongDescription);
  
  card.innerHTML = `
    <div class="card-header">
      <div class="avatar" aria-hidden="true">M</div>
      <div>
        <!-- page-name supprimé -->
        <div class="post-date">${formatDate(video.date)}</div>
      </div>
    </div>
    
    ${reelsBadge}
    
    <div class="post-content">
      <strong>${escapeHtml(title)}</strong>
      ${descriptionContent}
    </div>
    
    ${thumbnailContent}
    
    <div class="post-stats">
      <div>👁 ${formatNumber(video.views || 0)} مشاهدة</div>
      <div>👍 ${formatNumber(video.reactions || 0)} تفاعل</div>
      <div>💬 ${formatNumber(video.commentaires || 0)} تعليق</div>
      <div>↗ ${formatNumber(video.partages || 0)} مشاركة</div>
    </div>
    
    <button class="btn" data-fbid="${video.fbid}" aria-label="مشاهدة ${title} على فيسبوك">
      <span style="margin-left: 8px;">📘</span>
      مشاهدة على فيسبوك
    </button>
  `;
  
  // Ajouter les événements
  if (video.thumbnail) {
    const thumb = card.querySelector('.thumb');
    thumb?.addEventListener('click', () => showVideo(video));
  }
  
  const btn = card.querySelector('.btn');
  btn?.addEventListener('click', () => window.open(video.url_facebook, '_blank'));
  
  // Ajouter les événements pour les boutons "Voir plus"
  card.querySelectorAll('.see-more-btn').forEach(btn => {
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      const container = this.closest('.description-container');
      const textElement = container.querySelector('.description-text');
      const isExpanded = this.classList.contains('expanded');
      
      if (isExpanded) {
        textElement.classList.add('truncated');
        this.classList.remove('expanded');
        this.innerHTML = '<span class="icon">▼</span> عرض المزيد';
      } else {
        textElement.classList.remove('truncated');
        this.classList.add('expanded');
        this.innerHTML = '<span class="icon">▲</span> عرض أقل';
      }
    });
  });
  
  return card;
}

// Créer le contenu de la description avec "Voir plus"
function createDescriptionContent(text, lang, isLong) {
  if (!text) return '';
  
  const langClass = lang === 'ar' ? 'ar' : '';
  const seeMoreText = 'عرض المزيد';
  const seeLessText = 'عرض أقل';
  
  if (isLong) {
    return `
      <div class="description-container">
        <div class="description-text truncated ${langClass}">
          ${escapeHtml(text)}
        </div>
        <button class="see-more-btn">
          <span class="icon">▼</span> ${seeMoreText}
        </button>
      </div>
    `;
  } else {
    return `<div class="description-text ${langClass}">${escapeHtml(text)}</div>`;
  }
}

// Créer le contenu de la miniature
function createThumbnailContent(video) {
  const thumbClass = video.type === 'reel' ? 'reel-thumb' : 'video-thumb';
  const durationHtml = video.duration_seconds ? 
    `<div class="video-duration">${formatDuration(video.duration_seconds)}</div>` : '';
  
  // Utiliser le titre arabe s'il existe, sinon le titre français
  const title = video.titre_ar || video.titre_fr || '';
  
  return `
    <div class="thumb ${thumbClass}" data-fbid="${video.fbid}" role="button" tabindex="0" aria-label="تشغيل ${title}">
      <img src="${video.thumbnail}" alt="${title}" loading="lazy" width="800" height="450">
      <div class="play" aria-hidden="true">▶</div>
      ${durationHtml}
    </div>
  `;
}

// Créer le badge Reels
function createReelsBadge() {
  return '<div class="reels-badge">Facebook Reels</div>';
}

// Afficher une vidéo
function showVideo(video) {
  state.activeVideo = video;
  
  // Utiliser le titre arabe s'il existe, sinon le titre français
  const title = video.titre_ar || video.titre_fr || '';
  const titleFr = video.titre_fr || '';
  
  // Mettre à jour l'interface
  document.getElementById('videoTitleHeader').textContent = truncateText(titleFr, 60);
  document.getElementById('videoTitleAr').textContent = title;
  document.getElementById('videoTitleFr').textContent = titleFr;
  
  // Afficher uniquement la description arabe si elle existe, sinon la description française
  const description = video.description_ar || video.description_fr || '';
  const isLongDescription = description.length > 150;
  
  document.getElementById('videoDescriptionAr').innerHTML = createDescriptionContent(description, 'ar', isLongDescription);
  
  document.getElementById('videoDate').textContent = formatDate(video.date);
  document.getElementById('videoYear').textContent = video.year;
  document.getElementById('videoId').textContent = video.fbid;
  document.getElementById('facebookLink').href = video.url_facebook;
  
  // Mettre à jour les statistiques
  updateVideoStats(video);
  
  // Charger l'iframe
  loadVideoIframe(video);
  
  // Afficher la section vidéo au même niveau que l'image
  document.getElementById('videoSection').classList.add('active');
  document.getElementById('videoSection').scrollIntoView({ 
    behavior: 'smooth', 
    block: 'start',
    inline: 'nearest'
  });
  
  // Ajouter les événements pour les boutons "Voir plus" dans la section vidéo
  setTimeout(() => {
    document.querySelectorAll('#videoDescriptionContainer .see-more-btn').forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        const container = this.closest('.description-container');
        const textElement = container.querySelector('.description-text');
        const isExpanded = this.classList.contains('expanded');
        
        if (isExpanded) {
          textElement.classList.add('truncated');
          this.classList.remove('expanded');
          this.innerHTML = '<span class="icon">▼</span> عرض المزيد';
        } else {
          textElement.classList.remove('truncated');
          this.classList.add('expanded');
          this.innerHTML = '<span class="icon">▲</span> عرض أقل';
        }
      });
    });
  }, 100);
  
  renderVideos();
}

// Mettre à jour les statistiques vidéo
function updateVideoStats(video) {
  const stats = document.getElementById('videoStats');
  stats.innerHTML = '';
  
  const statsData = [
    { icon: '👁', value: video.views, label: 'vues' },
    { icon: '👍', value: video.reactions, label: 'réactions' },
    { icon: '💬', value: video.commentaires, label: 'commentaires' },
    { icon: '↪️', value: video.partages, label: 'partages' }
  ];
  
  statsData.forEach(({ icon, value, label }) => {
    if (value || value === 0) {
      const statItem = document.createElement('div');
      statItem.className = 'stat-item';
      statItem.innerHTML = `<span>${icon}</span> ${formatNumber(value)} ${label}`;
      stats.appendChild(statItem);
    }
  });
}

// Charger l'iframe vidéo
function loadVideoIframe(video) {
  const cleanUrl = video.url_facebook.split('?')[0];
  const embedUrl = `https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(cleanUrl)}&show_text=false&width=560`;
  document.getElementById('videoIframe').src = embedUrl;
}

// Cacher la vidéo
function hideVideo() {
  state.activeVideo = null;
  document.getElementById('videoSection').classList.remove('active');
  document.getElementById('videoIframe').src = '';
  renderVideos();
}

// Basculer le panneau d'année
function toggleYearPanel(header) {
  const panel = header.nextElementSibling;
  const isOpen = header.classList.contains('open');
  
  if (isOpen) {
    header.classList.remove('open');
    header.setAttribute('aria-expanded', 'false');
    panel.style.maxHeight = null;
    state.openYear = null;
  } else {
    header.classList.add('open');
    header.setAttribute('aria-expanded', 'true');
    panel.style.maxHeight = panel.scrollHeight + 'px';
    state.openYear = header.dataset.year;
  }
}

// Formater la date
function formatDate(dateString) {
  try {
    const date = new Date(dateString);
    const options = { day: 'numeric', month: 'long', year: 'numeric' };
    return date.toLocaleDateString('ar-MA', options);
  } catch (e) {
    return dateString;
  }
}

// Formater la durée
function formatDuration(seconds) {
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;
  return `${mins}:${secs.toString().padStart(2, '0')}`;
}

// Formater les nombres
function formatNumber(num) {
  if (!num && num !== 0) return '0';
  return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
}

// Tronquer le texte
function truncateText(text, maxLength) {
  if (!text) return '';
  return text.length > maxLength ? text.substring(0, maxLength) + '...' : text;
}

// Échapper le HTML
function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Configuration des événements
function setupEventListeners() {
  // Recherche
  document.getElementById('searchInput').addEventListener('input', (e) => {
    state.searchTerm = e.target.value;
    renderVideos();
  });
  
  // Filtre par année
  document.getElementById('yearSelect').addEventListener('change', (e) => {
    state.selectedYear = e.target.value;
    renderVideos();
  });
  
  // Thème
  document.getElementById('themeToggle').addEventListener('click', toggleTheme);
  
  // Fermer la vidéo
  document.getElementById('closeVideo').addEventListener('click', hideVideo);
  
  // Gérer les clics sur les années
  document.getElementById('videosTree').addEventListener('click', (e) => {
    if (e.target.closest('.year-header')) {
      const header = e.target.closest('.year-header');
      toggleYearPanel(header);
    }
  });
  
  // Touche Échap pour fermer la vidéo
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && state.activeVideo) {
      hideVideo();
    }
  });
}

// Basculer le thème
function toggleTheme() {
  const isDark = document.body.classList.toggle('dark-mode');
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
  document.getElementById('themeToggle').textContent = isDark ? '☀️' : '🌓';
}

// Restaurer le thème
function restoreTheme() {
  const savedTheme = localStorage.getItem('theme');
  if (savedTheme === 'dark') {
    document.body.classList.add('dark-mode');
    document.getElementById('themeToggle').textContent = '☀️';
  }
}

// Mettre à jour la date de dernière mise à jour
function updateLastUpdated() {
  const now = new Date();
  const options = { year: 'numeric', month: 'long', day: 'numeric' };
  const dateString = now.toLocaleDateString('ar-MA', options);
  document.querySelector('.footer p:last-child').textContent = `آخر تحديث: ${dateString}`;
}
