<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#001122">
<meta name="description" content="Revue de Presse Hebdomadaire">
<title>Revue de Presse Hebdomadaire</title>
<link rel="icon" type="image/png" href="images1/00011.png">

<style>
/* ===== CSS RESET & VARIABLES ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --primary: #1a73e8;
  --primary-dark: #0d5cb6;
  --background: #001122;
  --card-bg: #001a44;
  --text: #ffffff;
  --text-secondary: #cccccc;
  --accent-1: #FF6B6B;
  --accent-2: #4ECDC4;
  --shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
  --radius: 12px;
  --transition: all 0.3s ease;
}

/* ===== BASE STYLES ===== */
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--background);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===== COMPACT HEADER ===== */
.app-header {
  background: linear-gradient(135deg, #001122 0%, #002244 100%);
  padding: 15px 20px 15px;
  box-shadow: var(--shadow);
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

/* ===== MAIN TITLE AND SEARCH COMPACT ===== */
.title-search-container {
  display: flex;
  flex-direction: column;
  gap: 15px;
  margin-bottom: 15px;
}

.main-title {
  font-size: 2.5rem;
  font-weight: 900;
  color: white;
  line-height: 1.1;
  text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
  text-align: center;
  letter-spacing: -0.5px;
}

/* ===== SEARCH BAR ===== */
.search-container {
  max-width: 600px;
  margin: 0 auto;
  width: 100%;
}

.search-wrapper {
  position: relative;
  display: flex;
  align-items: center;
  background: rgba(255, 255, 255, 0.1);
  border-radius: var(--radius);
  padding: 5px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(10px);
  transition: var(--transition);
}

.search-wrapper:focus-within {
  border-color: var(--primary);
  background: rgba(255, 255, 255, 0.15);
  box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.2);
}

.search-icon {
  padding: 0 15px;
  color: var(--text-secondary);
  font-size: 1.2rem;
  display: flex;
  align-items: center;
}

#search-input {
  flex: 1;
  padding: 14px 15px 14px 0;
  background: transparent;
  border: none;
  color: var(--text);
  font-size: 1rem;
  outline: none;
}

#search-input::placeholder {
  color: rgba(255, 255, 255, 0.5);
}

.clear-search {
  padding: 0 15px;
  color: var(--text-secondary);
  font-size: 1.2rem;
  cursor: pointer;
  display: none;
  transition: var(--transition);
}

.clear-search:hover {
  color: var(--text);
}

/* ===== ARTICLES LIST ===== */
#articles-container {
  padding: 15px;
  max-width: 800px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* ===== ARTICLE CARD - INCREASED HEIGHT ===== */
.article-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  transition: var(--transition);
  cursor: pointer;
  border: 1px solid rgba(255, 255, 255, 0.05);
  min-height: 400px; /* Increased minimum height */
  display: flex;
  flex-direction: column;
}

.article-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
  border-color: rgba(26, 115, 232, 0.3);
}

/* Article Image Section - Increased Height */
.article-image-container {
  position: relative;
  width: 100%;
  height: 280px; /* Increased from 200px to 280px */
  background: linear-gradient(45deg, #000428, #004e92);
  overflow: hidden;
  flex-shrink: 0;
}

.article-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.8s ease;
}

.article-card:hover .article-image {
  transform: scale(1.05);
}

.image-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  padding: 25px 20px;
  background: linear-gradient(to top, rgba(0, 0, 0, 0.95), transparent 60%);
}

.article-image-title {
  font-size: 1.4rem;
  font-weight: 700;
  line-height: 1.3;
  color: white;
  text-shadow: 0 2px 6px rgba(0, 0, 0, 0.8);
}

/* ===== BADGES ===== */
.image-badges {
  position: absolute;
  top: 15px;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 0 20px;
}

.image-badge {
  padding: 7px 14px;
  font-size: 0.85rem;
  font-weight: 700;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
  display: flex;
  align-items: center;
  gap: 6px;
}

.date-badge { 
  background: rgba(255, 107, 107, 0.9);
  color: white;
  font-weight: bold;
}

.category-badge { 
  background: rgba(78, 205, 196, 0.9);
  color: white;
}

.article-card:hover .image-badge {
  transform: translateY(-2px);
}

/* ===== ARTICLE INFO - Increased Space ===== */
.article-info {
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 15px;
  flex: 1;
}

.article-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: var(--text-secondary);
  font-size: 0.9rem;
  margin-top: 5px;
}

.article-source {
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: 600;
  color: var(--primary);
}

.article-source::before {
  content: "📰";
  font-size: 1rem;
}

.article-time {
  display: flex;
  align-items: center;
  gap: 5px;
  font-weight: bold;
}

.article-time::before {
  content: "🕒";
  font-size: 0.9rem;
}

.article-summary {
  font-size: 0.95rem;
  line-height: 1.6;
  color: var(--text-secondary);
  display: -webkit-box;
  -webkit-line-clamp: 4; /* Increased from 3 to 4 lines */
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin: 5px 0;
  flex: 1;
}

.article-keywords {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}

.keyword-tag {
  background: rgba(26, 115, 232, 0.15);
  color: var(--primary);
  font-size: 0.8rem;
  padding: 5px 12px;
  border-radius: 12px;
  border: 1px solid rgba(26, 115, 232, 0.3);
  font-weight: 600;
}

/* ===== ARTICLE OVERLAY ===== */
#article-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.98);
  z-index: 1000;
  animation: fadeIn 0.3s ease;
}

.overlay-container {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  position: relative;
}

.overlay-header {
  padding: 20px;
  background: rgba(0, 26, 68, 0.95);
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  z-index: 2;
}

.overlay-title {
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--text);
  flex: 1;
  margin-right: 15px;
  line-height: 1.3;
}

.close-overlay {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--accent-1);
  border: none;
  color: white;
  font-size: 1.5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: var(--transition);
  flex-shrink: 0;
}

.close-overlay:hover {
  background: #ff4444;
  transform: rotate(90deg);
}

.overlay-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  position: relative;
}

.article-frame-container {
  flex: 1;
  position: relative;
  background: white;
}

#article-frame {
  width: 100%;
  height: 100%;
  border: none;
}

/* ===== NO RESULTS ===== */
.no-results {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-secondary);
}

.no-results-icon {
  font-size: 3rem;
  margin-bottom: 20px;
  opacity: 0.5;
}

.no-results h3 {
  font-size: 1.5rem;
  margin-bottom: 10px;
  color: var(--text);
}

.no-results p {
  font-size: 1rem;
  margin-bottom: 20px;
}

.clear-search-btn {
  background: var(--primary);
  color: white;
  border: none;
  padding: 12px 25px;
  border-radius: 25px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  display: inline-block;
}

.clear-search-btn:hover {
  background: var(--primary-dark);
  transform: translateY(-2px);
}

/* ===== ERROR STATE ===== */
.error-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--accent-1);
}

.error-icon {
  font-size: 3rem;
  margin-bottom: 20px;
}

.error-state h3 {
  font-size: 1.5rem;
  margin-bottom: 10px;
}

.error-state p {
  font-size: 1rem;
  margin-bottom: 20px;
  color: var(--text-secondary);
}

.retry-button {
  background: var(--primary);
  color: white;
  border: none;
  padding: 12px 25px;
  border-radius: 25px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
}

.retry-button:hover {
  background: var(--primary-dark);
  transform: translateY(-2px);
}

/* ===== ANIMATIONS ===== */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* ===== RESPONSIVE DESIGN ===== */
@media (max-width: 480px) {
  .app-header {
    padding: 12px 15px 12px;
  }
  
  .main-title {
    font-size: 2rem;
  }
  
  .article-image-container {
    height: 240px; /* Still increased but responsive */
  }
  
  .article-image-title {
    font-size: 1.2rem;
  }
  
  .image-badge {
    padding: 6px 12px;
    font-size: 0.8rem;
  }
  
  .overlay-header {
    padding: 15px;
  }
  
  .overlay-title {
    font-size: 1.1rem;
  }
  
  .close-overlay {
    width: 35px;
    height: 35px;
    font-size: 1.3rem;
  }
}

@media (min-width: 768px) {
  .main-title {
    font-size: 2.8rem;
  }
  
  .article-image-container {
    height: 320px; /* Even larger on tablets */
  }
  
  .article-image-title {
    font-size: 1.6rem;
  }
}

@media (min-width: 1024px) {
  .article-image-container {
    height: 350px; /* Largest on desktop */
  }
}
</style>
</head>

<body>
<!-- Header with Title and Search -->
<header class="app-header">
  <div class="title-search-container">
    <h1 class="main-title">Revue de Presse<br>Hebdomadaire</h1>
    
    <!-- Search Bar -->
    <div class="search-container">
      <div class="search-wrapper">
        <div class="search-icon">🔍</div>
        <input type="text" 
               id="search-input" 
               placeholder="Search all articles..." 
               autocomplete="off"
               spellcheck="false">
        <div class="clear-search" id="clear-search">✕</div>
      </div>
    </div>
  </div>
</header>

<!-- Articles Container -->
<main id="articles-container">
  <!-- Articles will be loaded here -->
</main>

<!-- Article Overlay -->
<div id="article-overlay">
  <div class="overlay-container">
    <div class="overlay-header">
      <div class="overlay-title" id="overlay-article-title"></div>
      <button class="close-overlay" id="close-overlay">×</button>
    </div>
    
    <div class="overlay-content">
      <div class="article-frame-container">
        <iframe id="article-frame" 
                sandbox="allow-same-origin allow-scripts allow-popups allow-forms"
                title="Article Content">
        </iframe>
      </div>
    </div>
  </div>
</div>

<!-- JavaScript -->
<script>
// ===== APP CONFIGURATION =====
const CONFIG = {
  jsonUrl: 'data/datajson.json',
  maxArticles: 100
};

// ===== APP STATE =====
let appState = {
  articles: [],
  filteredArticles: [],
  searchQuery: '',
  isLoading: true
};

// ===== DOM ELEMENTS =====
const elements = {
  searchInput: document.getElementById('search-input'),
  clearSearch: document.getElementById('clear-search'),
  articlesContainer: document.getElementById('articles-container'),
  articleOverlay: document.getElementById('article-overlay'),
  closeOverlay: document.getElementById('close-overlay'),
  articleFrame: document.getElementById('article-frame'),
  overlayArticleTitle: document.getElementById('overlay-article-title')
};

// ===== INITIALIZE APP =====
function initApp() {
  setupEventListeners();
  loadArticles();
}

// ===== EVENT LISTENERS =====
function setupEventListeners() {
  // Search input
  elements.searchInput.addEventListener('input', function(e) {
    appState.searchQuery = e.target.value;
    elements.clearSearch.style.display = appState.searchQuery ? 'block' : 'none';
    debounce(filterArticles, 300)();
  });
  
  // Clear search button
  elements.clearSearch.addEventListener('click', () => {
    elements.searchInput.value = '';
    appState.searchQuery = '';
    elements.clearSearch.style.display = 'none';
    filterArticles();
    elements.searchInput.focus();
  });
  
  // Overlay close
  elements.closeOverlay.addEventListener('click', closeArticleOverlay);
  elements.articleOverlay.addEventListener('click', (e) => {
    if (e.target === elements.articleOverlay) closeArticleOverlay();
  });
  
  // Escape key to close overlay
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && elements.articleOverlay.style.display === 'block') {
      closeArticleOverlay();
    }
  });
}

// ===== LOAD ARTICLES =====
async function loadArticles() {
  try {
    const response = await fetch(CONFIG.jsonUrl);
    
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }
    
    const data = await response.json();
    
    // Process articles
    appState.articles = processArticleData(data);
    
    // Update UI
    filterArticles();
    
  } catch (error) {
    console.error('Error loading articles:', error);
    showError('Unable to load articles. Check your internet connection.');
  }
}

// ===== VALIDATE AND FORMAT DATE =====
function validateAndFormatDate(dateString) {
  if (!dateString) {
    return {
      date: 'N/A',
      time: '',
      fullDate: 'N/A'
    };
  }
  
  try {
    let date = new Date(dateString);
    
    // If invalid, try to parse different formats
    if (isNaN(date.getTime())) {
      // Try to fix common date format issues
      const cleanDate = dateString.replace(/(\d{2})\/(\d{2})\/(\d{4})/, '$3-$2-$1');
      date = new Date(cleanDate);
      
      if (isNaN(date.getTime())) {
        // If still invalid, try as is
        date = new Date(dateString);
      }
    }
    
    // Format date in Western format (DD/MM/YYYY)
    const day = String(date.getDate()).padStart(2, '0');
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const year = date.getFullYear();
    const formattedDate = `${day}/${month}/${year}`;
    
    // Format time
    const hours = String(date.getHours()).padStart(2, '0');
    const minutes = String(date.getMinutes()).padStart(2, '0');
    const formattedTime = `${hours}:${minutes}`;
    
    // Full date and time
    const fullDate = `${formattedDate} ${formattedTime}`;
    
    return {
      date: formattedDate,
      time: formattedTime,
      fullDate: fullDate
    };
    
  } catch (error) {
    console.warn('Date parsing error:', error);
    return {
      date: dateString,
      time: '',
      fullDate: dateString
    };
  }
}

// ===== PROCESS ARTICLE DATA =====
function processArticleData(articles) {
  // Filter visible articles
  const visibleArticles = articles.filter(article => article.visible === true);
  
  // Remove duplicates based on link, keep longest title
  const uniqueArticles = [];
  const linksMap = new Map();
  
  visibleArticles.forEach(article => {
    if (!article.lien) return;
    
    const existing = linksMap.get(article.lien);
    
    if (!existing) {
      linksMap.set(article.lien, article);
      uniqueArticles.push(article);
    } else if (article.titre && article.titre.length > existing.titre.length) {
      // Replace with longer title
      const index = uniqueArticles.indexOf(existing);
      uniqueArticles[index] = article;
      linksMap.set(article.lien, article);
    }
  });
  
  // Sort by date (newest first)
  uniqueArticles.sort((a, b) => {
    const dateA = new Date(a.date_heure) || new Date(0);
    const dateB = new Date(b.date_heure) || new Date(0);
    return dateB - dateA;
  });
  
  // Limit number of articles
  return uniqueArticles.slice(0, CONFIG.maxArticles);
}

// ===== FILTER ARTICLES =====
function filterArticles() {
  const query = appState.searchQuery.toLowerCase().trim();
  
  if (!query) {
    appState.filteredArticles = [...appState.articles];
  } else {
    appState.filteredArticles = appState.articles.filter(article => {
      // Full-text search
      const searchFields = [
        article.titre,
        article.resume,
        article.media,
        article.theme,
        ...(article.mots_cles_principaux || [])
      ].filter(Boolean).join(' ').toLowerCase();
      
      return searchFields.includes(query);
    });
  }
  
  displayArticles();
}

// ===== DISPLAY ARTICLES =====
function displayArticles() {
  elements.articlesContainer.innerHTML = '';
  
  if (appState.filteredArticles.length === 0) {
    showNoResults();
    return;
  }
  
  // Create article cards
  appState.filteredArticles.forEach((article, index) => {
    createArticleCard(article, index);
  });
}

// ===== CREATE ARTICLE CARD =====
function createArticleCard(article, index) {
  const card = document.createElement('div');
  card.className = 'article-card';
  
  // Get article data
  const imageUrl = getArticleImage(article);
  const title = article.titre || `Article ${index + 1}`;
  const source = article.media || 'Unknown';
  const category = article.theme || 'News';
  const summary = article.resume || 'No summary available';
  const keywords = article.mots_cles_principaux || [];
  
  // Format date
  const dateInfo = validateAndFormatDate(article.date_heure);
  
  // Create card content
  card.innerHTML = `
    <div class="article-image-container">
      <img src="${imageUrl}" alt="${title}" class="article-image" loading="lazy">
      <div class="image-overlay">
        <h3 class="article-image-title">${title}</h3>
      </div>
      <div class="image-badges">
        <div class="image-badge date-badge">
          <span>📅</span>
          <span>${dateInfo.date}</span>
        </div>
        <div class="image-badge category-badge">
          <span>🏷️</span>
          <span>${category}</span>
        </div>
      </div>
    </div>
    
    <div class="article-info">
      <div class="article-meta">
        <div class="article-source">${source}</div>
        <div class="article-time">${dateInfo.time}</div>
      </div>
      
      <p class="article-summary">${summary}</p>
      
      ${keywords.length > 0 ? `
      <div class="article-keywords">
        ${keywords.slice(0, 4).map(keyword => 
          `<span class="keyword-tag">${keyword}</span>`
        ).join('')}
        ${keywords.length > 4 ? `<span class="keyword-tag">+${keywords.length - 4}</span>` : ''}
      </div>
      ` : ''}
    </div>
  `;
  
  // Add click event
  card.addEventListener('click', () => openArticleOverlay(article));
  
  elements.articlesContainer.appendChild(card);
}

// ===== OPEN ARTICLE OVERLAY =====
function openArticleOverlay(article) {
  // Set overlay title
  elements.overlayArticleTitle.textContent = article.titre || 'No Title';
  
  // Load article in iframe
  if (article.lien) {
    elements.articleFrame.src = article.lien;
  } else {
    elements.articleFrame.srcdoc = `
      <html>
        <head>
          <title>${article.titre || 'Article'}</title>
          <style>
            body { 
              font-family: Arial, sans-serif; 
              padding: 20px; 
              max-width: 800px; 
              margin: 0 auto; 
              line-height: 1.6;
            }
            h1 { color: #333; margin-bottom: 20px; }
            .meta { color: #666; font-size: 14px; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
            .content { margin-top: 20px; }
          </style>
        </head>
        <body>
          <h1>${article.titre || 'Article'}</h1>
          <div class="meta">
            <strong>Source:</strong> ${article.media || 'Unknown'}<br>
            <strong>Date:</strong> ${validateAndFormatDate(article.date_heure).fullDate}<br>
            <strong>Category:</strong> ${article.theme || 'News'}
          </div>
          <div class="content">
            <p>${article.resume || 'No content available'}</p>
          </div>
        </body>
      </html>
    `;
  }
  
  // Show overlay
  elements.articleOverlay.style.display = 'block';
  document.body.style.overflow = 'hidden';
}

// ===== CLOSE ARTICLE OVERLAY =====
function closeArticleOverlay() {
  elements.articleOverlay.style.display = 'none';
  elements.articleFrame.src = '';
  document.body.style.overflow = '';
}

// ===== NO RESULTS VIEW =====
function showNoResults() {
  elements.articlesContainer.innerHTML = `
    <div class="no-results">
      <div class="no-results-icon">🔍</div>
      <h3>No Results Found</h3>
      <p>No articles match "<strong>${appState.searchQuery}</strong>"</p>
      <button class="clear-search-btn" onclick="clearAllSearch()">
        <span>Clear Search</span>
        <span>✕</span>
      </button>
    </div>
  `;
}

// ===== ERROR VIEW =====
function showError(message) {
  elements.articlesContainer.innerHTML = `
    <div class="error-state">
      <div class="error-icon">⚠️</div>
      <h3>Error</h3>
      <p>${message}</p>
      <button class="retry-button" onclick="loadArticles()">
        <span>Try Again</span>
        <span>🔄</span>
      </button>
    </div>
  `;
}

// ===== UTILITY FUNCTIONS =====

// ===== DEBOUNCE =====
function debounce(func, wait) {
  let timeout;
  return function executedFunction(...args) {
    const later = () => {
      clearTimeout(timeout);
      func(...args);
    };
    clearTimeout(timeout);
    timeout = setTimeout(later, wait);
  };
}
