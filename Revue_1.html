  const container = document.getElementById('articles-container');
  const overlay = document.getElementById('article-overlay');
  const closeBtn = document.getElementById('close-overlay');
  const articleFrame = document.getElementById('article-frame');
  const articleInfo = document.getElementById('overlay-article-info');

  // Fonction pour supprimer les doublons basés sur le lien
  function removeDuplicateArticles(articlesArray) {
    const uniqueLinks = new Set();
    const uniqueArticles = [];
    
    for (const article of articlesArray) {
      if (!uniqueLinks.has(article.lien)) {
        uniqueLinks.add(article.lien);
        uniqueArticles.push(article);
      }
    }
    
    return uniqueArticles;
  }

  // Filtrer les articles pour enlever les doublons
  const uniqueArticles = removeDuplicateArticles(articles);
  console.log(`Articles initiaux: ${articles.length}, Articles uniques: ${uniqueArticles.length}`);

  // Fermer l'overlay
  closeBtn.addEventListener('click', () => {
    overlay.style.display = 'none';
    articleFrame.src = 'about:blank'; // Vide l'iframe
  });

  // Fermer l'overlay en cliquant en dehors
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) {
      overlay.style.display = 'none';
      articleFrame.src = 'about:blank';
    }
  });

  // Fermer avec la touche Echap
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && overlay.style.display === 'flex') {
      overlay.style.display = 'none';
      articleFrame.src = 'about:blank';
    }
  });

  uniqueArticles.forEach(titre => {
    // --- Utilisation du titre directement ---
    let titreTexte = titre.titre_article || `مقال إخباري رقم ${titre.index}`;
    
    // Limite la longueur du titre
    if (titreTexte.length > 120) {
      titreTexte = titreTexte.substring(0, 120) + "...";
    }

    // --- Création de la carte ---
    const card = document.createElement('div');
    card.className = 'titre-card';
    
    // Ajouter un ID pour référence
    card.dataset.articleIndex = titre.index;

    card.innerHTML = `
 <div class="image-wrapper">
  <img src="images1/${titre.index}-image.jpg" alt="Image par défaut">

  <!-- TITRE DANS LE BAS 2/3 DE L'IMAGE -->
  <div class="image-title-overlay">
    <div class="image-title">
      ${titreTexte}
    </div>
  </div>
</div>

      <div class="time-badge">منذ دقائق</div>
      <div class="category-badge">أخبار</div>

      ${titre.alerte === 'Oui' ? '<div class="alert-badge">تنبيه عاجل</div>' : ''}
    `;

    // Ajouter l'événement de clic
    card.addEventListener('click', () => {
      // Afficher les informations de l'article dans l'overlay
      articleInfo.innerHTML = `
        <div class="meta">

          <strong>وقت الرصد :</strong> ${titre.date_heure}<br>
          <strong>اللغة :</strong> ${titre.langue}<br>
          <strong>الرتبة :</strong> ${titre.rang}<br>
          <strong>المشاعر :</strong> ${titre.sentiment}<br>
          <strong>الكلمات المفتاحية :</strong> ${titre.mots_cles_principaux.join(', ')}
        </div>
      `;
      
      // Charger l'article dans l'iframe
      if (titre.lien) {
        articleFrame.src = titre.lien;
      }
      
      // Afficher l'overlay
      overlay.style.display = 'flex';
    });

    container.appendChild(card);
  });
