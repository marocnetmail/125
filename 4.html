<!DOCTYPE html>
<html lang="fr" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revue de Presse - Gestionnaire d'Erreurs</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #1a73e8;
  --danger: #ff4444;
  --success: #00C851;
  --bg: #001122;
  --card: #001a44;
  --text: #fff;
  --radius: 12px;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif}

body{background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}

/* Header Centré Mobile */
.app-header{
  background:linear-gradient(135deg,#001122 0%,#002244 100%);
  padding:20px 16px;
  text-align:center;
  position:sticky;top:0;z-index:100;
  box-shadow:0 4px 20px rgba(0,0,0,0.4)
}

.main-title{font-size:1.8rem;font-weight:900;margin-bottom:20px;text-shadow:0 2px 4px rgba(0,0,0,0.5)}

/* Alertes de statut */
.status-alert{
  padding:16px;margin:10px auto;max-width:600px;border-radius:var(--radius);
  display:flex;align-items:center;gap:12px;font-weight:700
}
.status-alert.error{background:rgba(255,68,68,0.2);border:2px solid var(--danger);color:#ff6b6b}
.status-alert.success{background:rgba(0,200,81,0.2);border:2px solid var(--success);color:#4ade80}
.status-alert.warning{background:rgba(255,193,7,0.2);border:2px solid #ffc107;color:#ffd54f}

/* Boutons Debug */
.debug-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:15px 0}
.debug-btn{
  background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.3);
  color:white;padding:8px 16px;border-radius:20px;cursor:pointer;font-size:0.85rem
}
.debug-btn:hover{background:rgba(255,255,255,0.2)}

/* Conteneurs centraux */
.container{max-width:800px;margin:0 auto;padding:16px}

/* Filtres */
.filters{background:rgba(255,255,255,0.05);padding:20px;border-radius:var(--radius);margin-bottom:20px;border:1px solid rgba(255,255,255,0.1)}
.filter-row{display:flex;flex-direction:column;gap:12px;margin-bottom:15px}
label{font-weight:700;color:#ffd700;font-size:0.9rem}

input[type="text"],input[type="date"]{
  padding:14px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.1);color:white;font-size:1rem;width:100%
}

.btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:15px}
.btn{
  flex:1;min-width:140px;padding:14px 20px;border:none;border-radius:25px;
  font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  font-size:0.95rem;transition:transform 0.2s
}
.btn:active{transform:scale(0.95)}
.btn-primary{background:var(--primary)}
.btn-danger{background:var(--danger)}
.btn-success{background:var(--success)}
.btn:disabled{opacity:0.5;cursor:not-allowed}

/* Stats */
.stats{text-align:center;padding:15px;background:rgba(0,0,0,0.3);border-radius:var(--radius);margin-bottom:20px;font-weight:700}

/* Articles */
.articles{display:flex;flex-direction:column;gap:16px}
.article{
  background:var(--card);border-radius:var(--radius);overflow:hidden;
  border:1px solid rgba(255,255,255,0.1);cursor:pointer;transition:transform 0.2s
}
.article:hover{transform:translateY(-2px)}
.article-img{
  width:100%;height:200px;object-fit:cover;background:linear-gradient(45deg,#000428,#004e92)
}
.article-content{padding:16px}
.article-title{font-size:1.2rem;font-weight:900;margin-bottom:8px}
.article-meta{color:#4ECDC4;font-size:0.9rem;font-weight:700}

/* Empty State */
.empty{text-align:center;padding:60px 20px;color:#aaa}
.empty-icon{font-size:4rem;margin-bottom:15px}

/* Overlay */
#overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:1000;flex-direction:column
}
.overlay-header{
  padding:16px;background:rgba(0,0,0,0.8);display:flex;justify-content:space-between;align-items:center
}
.overlay-title{font-weight:900;font-size:1.2rem;flex:1;padding-left:15px}
.close-btn{width:45px;height:45px;border-radius:50%;background:#ff4444;border:none;color:white;font-size:1.5rem;cursor:pointer}
iframe{flex:1;width:100%;border:none;background:white}

/* PDF Container (hidden) */
#pdf-temp{position:absolute;left:-9999px;width:210mm;background:white;color:black;padding:20px}
.pdf-article{border:2px solid #333;margin-bottom:20px;padding:15px;page-break-inside:avoid}
.pdf-img{max-width:100%;border:3px solid #000;padding:5px;background:#f5f5f5;display:block;margin:10px auto}

/* Responsive */
@media(min-width:768px){
  .filter-row{flex-direction:row;align-items:center}
  label{min-width:80px}
  input{flex:1}
}
</style>
</head>
<body>

<header class="app-header">
  <h1 class="main-title">📰 Revue de Presse</h1>
  
  <!-- Zone de statut debug -->
  <div id="status-zone"></div>
  
  <!-- Boutons debug/testing -->
  <div class="debug-btns" id="debug-controls" style="display:none">
    <button class="debug-btn" onclick="loadDemoData()">🧪 Charger données démo</button>
    <button class="debug-btn" onclick="retryLoad()">🔄 Réessayer chargement</button>
    <button class="debug-btn" onclick="checkData()">🔍 Vérifier données</button>
  </div>
</header>

<div class="container">

  <!-- Filtres -->
  <div class="filters">
    <div class="filter-row">
      <label>Recherche:</label>
      <input type="text" id="search" placeholder="Titre, source ou thème..." oninput="debouncedFilter()">
    </div>
    
    <div class="filter-row">
      <label>Du:</label>
      <input type="date" id="date-start" onchange="applyFilter()">
      <label>Au:</label>
      <input type="date" id="date-end" onchange="applyFilter()">
    </div>
    
    <div class="btns">
      <button class="btn btn-danger" onclick="resetFilters()">🗑️ Réinitialiser</button>
      <button class="btn btn-primary" onclick="generatePDF()" id="pdf-btn" disabled>📄 PDF</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats" id="stats" style="display:none">
    <span id="count">0</span> article(s) trouvé(s)
  </div>

  <!-- Liste articles -->
  <div id="articles-container">
    <div class="empty">
      <div class="empty-icon">⏳</div>
      <h3>Chargement des données...</h3>
      <p>Veuillez patienter</p>
    </div>
  </div>
</div>

<!-- Overlay -->
<div id="overlay">
  <div class="overlay-header">
    <div class="overlay-title" id="overlay-title"></div>
    <button class="close-btn" onclick="closeOverlay()">×</button>
  </div>
  <iframe id="frame"></iframe>
</div>

<!-- PDF Hidden Container -->
<div id="pdf-temp"></div>

<script>
// ==========================================
// CONFIGURATION ET ÉTAT
// ==========================================
const Config = {
  jsonUrl: './data/datajson.json',  // Chemin relatif sécurisé
  logosUrl: './data/logo_media.json',
  imagesPath: './images3/',
  itemsPerPage: 50  // Plus restrictif pour mobile
};

let State = {
  allArticles: [],      // Toutes les données brutes
  filtered: [],         // Données filtrées
  logos: [],           // Logos médias
  isError: false,      // Flag erreur
  errorMsg: '',        // Message d'erreur
  usingDemo: false     // Mode démo activé?
};

// ==========================================
// DONNÉES DÉMO (Fallback)
// ==========================================
const DemoData = [
  {
    id: 1,
    titre: "Actualités économiques du jour",
    source: "Le360",
    date_heure: "28/01/2026 10:30",
    theme: "Économie",
    url: "https://example.com/1",
    image_brute: "",
    visible: true,
    sentiment: "Positif",
    mots_cles: "économie, finance, marché"
  },
  {
    id: 2,
    titre: "Nouvelles technologies innovantes",
    source: "Medi1",
    date_heure: "27/01/2026 14:15",
    theme: "Technologie",
    url: "https://example.com/2",
    image_brute: "",
    visible: true,
    sentiment: "Neutre",
    mots_cles: "tech, innovation, digital"
  },
  {
    id: 3,
    titre: "Sport: Résultats du weekend",
    source: "Hespress",
    date_heure: "26/01/2026 09:00",
    theme: "Sport",
    url: "https://example.com/3",
    image_brute: "",
    visible: true,
    sentiment: "Positif",
    mots_cles: "football, match, championnat"
  }
];

// ==========================================
// INITIALISATION
// ==========================================
document.addEventListener('DOMContentLoaded', () => {
  console.log('🚀 Démarrage application...');
  init();
});

async function init() {
  showStatus('⏳ Chargement des données...', 'warning');
  
  try {
    // Tentative de chargement avec timeout
    await Promise.race([
      loadData(),
      new Promise((_, reject) => 
        setTimeout(() => reject(new Error('Timeout')), 10000)
      )
    ]);
  } catch (error) {
    console.error('❌ Erreur initiale:', error);
    handleLoadError(error);
  }
}

// ==========================================
// CHARGEMENT DONNÉES (avec retry)
// ==========================================
async function loadData(attempt = 1) {
  console.log(`📡 Tentative de chargement #${attempt}...`);
  
  try {
    // Vérifier si fichier existe avec HEAD
    const checkRes = await fetch(Config.jsonUrl, { method: 'HEAD' });
    if (!checkRes.ok) throw new Error(`Fichier non trouvé (HTTP ${checkRes.status})`);
    
    // Chargement données
    const [articlesRes, logosRes] = await Promise.all([
      fetch(Config.jsonUrl),
      fetch(Config.logosUrl).catch(() => ({ok: false, json: async () => []}))
    ]);
    
    if (!articlesRes.ok) throw new Error(`Erreur HTTP ${articlesRes.status}`);
    
    const rawData = await articlesRes.json();
    const logosData = logosRes.ok ? await logosRes.json() : [];
    
    // Validation basique
    if (!Array.isArray(rawData)) throw new Error('Format JSON invalide (attendu: tableau)');
    if (rawData.length === 0) throw new Error('Fichier JSON vide');
    
    // Traitement
    State.allArticles = processArticles(rawData);
    State.logos = logosData;
    State.isError = false;
    State.usingDemo = false;
    
    showStatus(`✅ ${State.allArticles.length} articles chargés`, 'success');
    document.getElementById('debug-controls').style.display = 'none';
    
    applyFilter();
    
  } catch (error) {
    if (attempt < 3) {
      console.warn(`⚠️ Tentative ${attempt} échouée, retry...`);
      setTimeout(() => loadData(attempt + 1), 1000 * attempt);
    } else {
      throw error;
    }
  }
}

function processArticles(data) {
  return data
    .filter(item => {
      // Garder visible=true ou undefined (pour compatibilité)
      const visible = item.visible;
      return visible === true || visible === "true" || visible === undefined || visible === null;
    })
    .map(item => ({
      ...item,
      _searchable: `${item.titre || ''} ${item.source || ''} ${item.theme || ''}`.toLowerCase(),
      _date: parseDate(item.date_heure)
    }))
    .sort((a, b) => (b._date || 0) - (a._date || 0));
}

// ==========================================
// GESTION ERREURS
// ==========================================
function handleLoadError(error) {
  console.error('💥 Erreur critique:', error);
  State.isError = true;
  State.errorMsg = error.message;
  
  showStatus(`❌ Erreur: ${error.message}`, 'error');
  document.getElementById('debug-controls').style.display = 'flex';
  
  // Afficher message utilisateur avec option démo
  document.getElementById('articles-container').innerHTML = `
    <div class="empty">
      <div class="empty-icon">⚠️</div>
      <h3>Impossible de charger les données</h3>
      <p>${error.message}</p>
      <div style="margin-top:20px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button onclick="loadDemoData()" class="btn btn-success">Utiliser données démo</button>
        <button onclick="retryLoad()" class="btn btn-primary">Réessayer</button>
      </div>
    </div>
  `;
}

// Actions debug
function retryLoad() {
  document.getElementById('articles-container').innerHTML = `
    <div class="empty">
      <div class="empty-icon">⏳</div>
      <h3>Nouvelle tentative...</h3>
    </div>
  `;
  loadData();
}

function loadDemoData() {
  console.log('🧪 Chargement mode démo...');
  State.allArticles = processArticles(DemoData);
  State.logos = [];
  State.usingDemo = true;
  State.isError = false;
  
  showStatus(`✅ Mode démo: ${State.allArticles.length} articles`, 'warning');
  document.getElementById('debug-controls').style.display = 'none';
  applyFilter();
}

function checkData() {
  console.log('📊 État actuel:', State);
  alert(`Articles: ${State.allArticles.length}\nUtilise démo: ${State.usingDemo}\nErreur: ${State.isError}`);
}

// ==========================================
// FILTRAGE
// ==========================================
function applyFilter() {
  const search = document.getElementById('search').value.toLowerCase();
  const start = document.getElementById('date-start').value;
  const end = document.getElementById('date-end').value;
  
  console.log(`🔍 Filtrage: "${search}", Dates: ${start} → ${end}`);
  
  State.filtered = State.allArticles.filter(article => {
    // Filtre texte
    if (search && !article._searchable.includes(search)) return false;
    
    // Filtre date
    if (start || end) {
      const artDate = article._date;
      if (!artDate) return false;
      
      if (start) {
        const s = new Date(start);
        if (artDate < s) return false;
      }
      if (end) {
        const e = new Date(end);
        e.setHours(23,59,59);
        if (artDate > e) return false;
      }
    }
    
    return true;
  });
  
  render();
}

const debouncedFilter = debounce(applyFilter, 300);

function debounce(fn, ms) {
  let timeout;
  return () => {
    clearTimeout(timeout);
    timeout = setTimeout(fn, ms);
  };
}

function resetFilters() {
  document.getElementById('search').value = '';
  document.getElementById('date-start').value = '';
  document.getElementById('date-end').value = '';
  applyFilter();
}

// ==========================================
// RENDU
// ==========================================
function render() {
  const container = document.getElementById('articles-container');
  const count = State.filtered.length;
  
  // Stats
  document.getElementById('count').textContent = count;
  document.getElementById('stats').style.display = count ? 'block' : 'none';
  document.getElementById('pdf-btn').disabled = count === 0;
  
  if (count === 0) {
    container.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🔍</div>
        <h3>Aucun résultat</h3>
        <p>Essayez de modifier vos critères de recherche</p>
        ${State.isError ? `<button onclick="loadDemoData()" class="btn btn-success" style="margin-top:15px">Charger données démo</button>` : ''}
      </div>
    `;
    return;
  }
  
  // Afficher articles (limité à 50 pour perf mobile)
  const toShow = State.filtered.slice(0, Config.itemsPerPage);
  
  container.innerHTML = toShow.map((art, i) => `
    <article class="article" onclick='openArticle(${JSON.stringify(art).replace(/'/g,"&#39;")})' 
             style="animation:fadeIn 0.3s ease ${i*0.05}s both">
      <img class="article-img" 
           src="${art.image_brute ? (art.image_brute.startsWith('http') ? art.image_brute : Config.imagesPath + art.image_brute) : 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'}" 
           onerror="this.style.display='none'" 
           alt="">
      <div class="article-content">
        <div class="article-title">${escapeHtml(art.titre)}</div>
        <div class="article-meta">
          📰 ${escapeHtml(art.source)} | 📅 ${art.date_heure || 'Date inconnue'}
          ${art.theme ? `| 🏷️ ${escapeHtml(art.theme)}` : ''}
        </div>
      </div>
    </article>
  `).join('');
  
  if (count > Config.itemsPerPage) {
    container.innerHTML += `
      <div style="text-align:center;padding:20px;color:#aaa;font-size:0.9rem">
        ... et ${count - Config.itemsPerPage} autres articles (utilisez les filtres)
      </div>
    `;
  }
}

// ==========================================
// UTILITAIRES
// ==========================================
function parseDate(str) {
  if (!str) return null;
  try {
    const [date] = str.split(' ');
    const [d, m, y] = date.split('/');
    return new Date(y, m-1, d);
  } catch { return null; }
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function showStatus(msg, type) {
  const zone = document.getElementById('status-zone');
  zone.innerHTML = `<div class="status-alert ${type}">${msg}</div>`;
  if (type === 'success') setTimeout(() => { if(zone.querySelector('.success')) zone.innerHTML=''; }, 3000);
}

// ==========================================
// OVERLAY
// ==========================================
function openArticle(article) {
  document.getElementById('overlay-title').textContent = article.titre || 'Article';
  document.getElementById('frame').src = article.url || '#';
  document.getElementById('overlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeOverlay() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('frame').src = '';
  document.body.style.overflow = '';
}

// ==========================================
// PDF GENERATION
// ==========================================
async function generatePDF() {
  if (State.filtered.length === 0) return;
  
  const btn = document.getElementById('pdf-btn');
  const original = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '⏳ Génération...';
  
  try {
    const container = document.getElementById('pdf-temp');
    
    let html = `
      <div style="text-align:center;border-bottom:3px solid #1a73e8;padding-bottom:20px;margin-bottom:20px">
        <h1 style="color:#1a73e8;margin:0">Revue de Presse</h1>
        <p>Généré le ${new Date().toLocaleDateString('fr-FR')}</p>
        <p><strong>${State.filtered.length} articles</strong></p>
      </div>
    `;
    
    State.filtered.forEach((art, i) => {
      const imgUrl = art.image_brute ? 
        (art.image_brute.startsWith('http') ? art.image_brute : Config.imagesPath + art.image_brute) 
        : '';
      
      html += `
        <div class="pdf-article">
          <h3 style="margin:0 0 10px 0;color:#333">${i+1}. ${escapeHtml(art.titre)}</h3>
          <p style="margin:5px 0;color:#666;font-size:0.9rem">
            <strong>Source:</strong> ${escapeHtml(art.source)} | 
            <strong>Date:</strong> ${art.date_heure || 'N/A'}
            ${art.theme ? `| <strong>Thème:</strong> ${escapeHtml(art.theme)}` : ''}
          </p>
          ${imgUrl ? `
            <div style="text-align:center;margin:15px 0;padding:10px;background:#f5f5f5;border:2px solid #ddd;border-radius:8px">
              <img src="${imgUrl}" class="pdf-img" style="max-height:150px" onerror="this.style.display='none'" alt="">
            </div>
          ` : ''}
          ${art.mots_cles ? `<p style="font-size:0.85rem;color:#555"><strong>Mots-clés:</strong> ${escapeHtml(art.mots_cles)}</p>` : ''}
          ${art.url ? `<p style="font-size:0.8rem;color:#999;word-break:break-all">${art.url}</p>` : ''}
        </div>
      `;
    });
    
    container.innerHTML = html;
    
    // Attendre images
    await waitImages(container);
    
    await html2pdf()
      .from(container)
      .set({
        margin: [10,10,10,10],
        filename: `revue_presse_${new Date().toISOString().split('T')[0]}.pdf`,
        image: { type: 'jpeg', quality: 0.95 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'mm', format: 'a4' }
      })
      .save();
      
    showStatus('✅ PDF généré avec succès', 'success');
    
  } catch (e) {
    console.error(e);
    alert('Erreur PDF: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = original;
  }
}

function waitImages(container) {
  return new Promise(resolve => {
    const imgs = container.querySelectorAll('img');
    let loaded = 0;
    const check = () => {
      loaded++;
      if (loaded >= imgs.length) setTimeout(resolve, 300);
    };
    if (imgs.length === 0) return resolve();
    imgs.forEach(img => {
      if (img.complete) check();
      else { img.onload = check; img.onerror = check; }
    });
    setTimeout(resolve, 3000);
  });
}

// ==========================================
// CSS ANIMATIONS
// ==========================================
const style = document.createElement('style');
style.textContent = `
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
`;
document.head.appendChild(style);
</script>
</body>
</html>
