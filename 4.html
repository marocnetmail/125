<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>مراجعة الصحافة الأسبوعية</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #1a73e8;
  --background: #001122;
  --card-bg: #001a44;
  --text: #ffffff;
}

body {
  font-family: 'Tajawal', sans-serif;
  background: var(--background);
  color: var(--text);
  margin: 0;
  -webkit-font-smoothing: antialiased;
}

/* --- OPTIMISATION GRILLE --- */
#articles-container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 20px;
  padding: 15px;
  max-width: 1200px;
  margin: 0 auto;
}

/* --- CARTE ARTICLE OPTIMISÉE --- */
.article-card {
  background: var(--card-bg);
  border-radius: 15px;
  overflow: hidden;
  position: relative;
  height: 380px;
  display: flex;
  flex-direction: column;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  transition: transform 0.3s ease;
}

.article-image-container {
  height: 100%;
  width: 100%;
  position: relative;
}

.article-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  background: #002244; /* Placeholder couleur si image absente */
}

/* Dégradé pour lisibilité du titre */
.title-overlay {
  position: absolute;
  bottom: 0;
  right: 0;
  left: 0;
  padding: 20px;
  background: linear-gradient(transparent, rgba(0,0,0,0.9) 70%);
  z-index: 2;
}

.article-main-title {
  font-size: 1.4rem;
  font-weight: 900;
  color: #fff;
  margin-bottom: 8px;
  line-height: 1.3;
}

/* Logo Média - Correction visibilité */
.media-logo-container {
  position: absolute;
  top: 15px;
  left: 15px;
  z-index: 5;
  background: rgba(255,255,255,0.9);
  padding: 5px;
  border-radius: 8px;
  width: 60px;
  height: 35px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.media-logo {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}

/* --- BOUTONS TACTILES --- */
.action-btn {
  min-height: 48px;
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  font-family: inherit;
  font-weight: bold;
  cursor: pointer;
}

/* PDF HIDDEN AREA */
#pdf-temp-container {
  display: none;
}
</style>
</head>
<body>

<header style="padding: 20px; text-align: center; background: #001a44;">
  <h1 style="margin-bottom: 15px;">مراجعة الصحافة</h1>
  <div style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;">
    <input type="text" id="search-input" placeholder="بحث..." style="padding: 12px; border-radius: 8px; border: none; width: 250px;">
    <button id="download-pdf-btn" class="action-btn" style="background: #2E7D32; color: white;">تحميل التقرير PDF</button>
  </div>
</header>

<main id="articles-container">
  </main>

<script>
// Exemple de données avec sécurité d'affichage
const articles = [
  {
    title: "عنوان المقال الأول الهام",
    image: "images1/art1.jpg",
    media: "images1/logo-news.png",
    date: "2024-05-20",
    url: "#"
  }
];

function renderArticles(data) {
  const container = document.getElementById('articles-container');
  container.innerHTML = data.map(art => `
    <div class="article-card" onclick="window.open('${art.url}', '_blank')">
      <div class="media-logo-container">
        <img src="${art.media}" class="media-logo" onerror="this.parentElement.style.display='none'">
      </div>
      
      <div class="article-image-container">
        <img src="${art.image}" class="article-image" 
             onerror="this.src='https://via.placeholder.com/400x300/001a44/ffffff?text=Image+Indisponible'" 
             loading="lazy">
        
        <div class="title-overlay">
          <div class="article-main-title">${art.title}</div>
          <div style="color: #4ECDC4; font-size: 0.9rem;">${art.date}</div>
        </div>
      </div>
    </div>
  `).join('');
}

// OPTIMISATION PDF : Assure que tout le contenu est rendu avant capture
async function generatePDF() {
  const btn = document.getElementById('download-pdf-btn');
  btn.innerText = "جاري التحميل...";
  
  const element = document.createElement('div');
  element.style.padding = "20px";
  element.style.color = "black";
  element.style.background = "white";
  element.dir = "rtl";
  
  element.innerHTML = `
    <h1 style="text-align:center; color:#1a73e8">تقرير الصحافة الأسبوعية</h1>
    ${articles.map(art => `
      <div style="margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px;">
        <h3>${art.title}</h3>
        <p>التاريخ: ${art.date}</p>
      </div>
    `).join('')}
  `;

  const opt = {
    margin: 10,
    filename: 'report.pdf',
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2 },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };

  html2pdf().set(opt).from(element).save().then(() => {
    btn.innerText = "تحميل التقرير PDF";
  });
}

document.getElementById('download-pdf-btn').addEventListener('click', generatePDF);
document.getElementById('search-input').addEventListener('input', (e) => {
  const val = e.target.value.toLowerCase();
  const filtered = articles.filter(a => a.title.toLowerCase().includes(val));
  renderArticles(filtered);
});

// Initialisation
renderArticles(articles);
</script>

</body>
</html>
