<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<!-- OPTIMISATION ULTRA MOBILE -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">
<meta name="theme-color" content="#001122">
<meta name="description" content="مراجعة الصحافة الأسبوعية">
<title>مراجعة الصحافة</title>
<link rel="icon" type="image/png" href="images1/00011.png">
<!-- Police simplifiée -->
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ===== RESET COMPLET POUR MOBILE ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}

:root {
  --primary: #1a73e8;
  --background: #001122;
  --card-bg: #001a44;
  --text: #ffffff;
  --accent-1: #FF6B6B;
  --accent-2: #4ECDC4;
  --radius: 12px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

/* ===== BASE ULTRA SIMPLE ===== */
html, body {
  height: 100%;
  width: 100%;
  overflow: hidden;
  position: fixed;
}

body {
  font-family: 'Tajawal', -apple-system, sans-serif;
  background: var(--background);
  color: var(--text);
  line-height: 1.4;
  font-size: 16px;
  overscroll-behavior: none;
  -webkit-text-size-adjust: 100%;
  -webkit-font-smoothing: antialiased;
}

/* ===== HEADER FIXE ===== */
.app-header {
  background: #001122;
  padding: 8px 10px;
  padding-top: calc(8px + var(--safe-top));
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  max-height: 50vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.main-title {
  font-size: 1.2rem;
  font-weight: 900;
  color: white;
  text-align: center;
  margin-bottom: 8px;
  padding: 0 4px;
}

/* ===== RECHERCHE ===== */
.search-wrapper {
  display: flex;
  align-items: center;
  background: rgba(255, 255, 255, 0.1);
  border-radius: var(--radius);
  padding: 4px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  margin-bottom: 8px;
  min-height: 44px;
}

.search-icon {
  padding: 0 10px;
  color: var(--text);
  font-size: 1rem;
}

#search-input {
  flex: 1;
  padding: 12px 8px;
  background: transparent;
  border: none;
  color: var(--text);
  font-size: 16px;
  outline: none;
  text-align: right;
  -webkit-appearance: none;
  appearance: none;
  min-height: 40px;
}

.clear-search {
  padding: 0 12px;
  color: var(--text);
  background: none;
  border: none;
  font-size: 1.2rem;
  min-height: 44px;
  min-width: 44px;
  display: none;
}

/* ===== FILTRES DATE ===== */
.date-filters {
  display: flex;
  gap: 8px;
  margin: 8px 0;
  flex-direction: column;
}

.date-group {
  display: flex;
  align-items: center;
  gap: 6px;
}

.date-label {
  font-size: 0.85rem;
  color: var(--accent-2);
  min-width: 35px;
  white-space: nowrap;
}

.date-input-wrapper {
  flex: 1;
  background: rgba(255, 255, 255, 0.1);
  border-radius: var(--radius);
  border: 1px solid rgba(255, 255, 255, 0.2);
  min-height: 44px;
}

.date-input {
  width: 100%;
  padding: 12px 10px;
  background: transparent;
  border: none;
  color: var(--text);
  font-size: 16px;
  outline: none;
  text-align: right;
  min-height: 44px;
  -webkit-appearance: none;
  appearance: none;
}

/* Style spécifique pour iOS */
.date-input::-webkit-date-and-time-value {
  text-align: right;
}

/* ===== BOUTONS PÉRIODE ===== */
.period-presets {
  display: flex;
  gap: 6px;
  margin: 8px 0;
  justify-content: center;
}

.preset-btn {
  background: rgba(255, 255, 255, 0.1);
  color: var(--text);
  border: 1px solid rgba(255, 255, 255, 0.2);
  padding: 12px 6px;
  border-radius: var(--radius);
  font-size: 0.85rem;
  cursor: pointer;
  min-height: 44px;
  flex: 1;
  text-align: center;
  touch-action: manipulation;
}

.preset-btn.active {
  background: var(--primary);
  border-color: var(--primary);
}

/* ===== BOUTONS ACTION ===== */
.action-buttons {
  display: flex;
  gap: 8px;
  margin: 8px 0;
}

.action-btn {
  background: var(--primary);
  color: white;
  border: none;
  padding: 14px 10px;
  border-radius: var(--radius);
  font-size: 0.95rem;
  cursor: pointer;
  min-height: 48px;
  flex: 1;
  text-align: center;
  touch-action: manipulation;
  font-weight: 600;
}

.action-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* ===== STATS BAR ===== */
.stats-bar {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 10px 12px;
  background: rgba(0, 26, 68, 0.95);
  font-size: 0.85rem;
  color: var(--text);
  position: sticky;
  top: 0;
  z-index: 5;
  height: 44px;
  margin-top: 0;
  backdrop-filter: blur(10px);
}

.results-count {
  font-weight: 700;
  color: var(--accent-2);
  text-align: center;
}

/* ===== CONTENU PRINCIPAL ===== */
.main-content {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  padding-top: calc(var(--header-height, 240px));
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  background: var(--background);
  overscroll-behavior: contain;
}

#articles-container {
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  min-height: calc(100vh - var(--header-height, 240px));
}

/* ===== CARTE ARTICLE ===== */
.article-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
  width: 100%;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.article-card:active {
  transform: scale(0.98);
  box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
}

.article-image-container {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  background: #000428;
  overflow: hidden;
}

.article-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  background: linear-gradient(to bottom, #000428, #001122);
}

/* Badges */
.metadata-badges {
  position: absolute;
  top: 8px;
  left: 8px;
  right: 8px;
  display: flex;
  justify-content: space-between;
  z-index: 2;
  gap: 4px;
}

.metadata-badge {
  padding: 6px 10px;
  font-size: 0.75rem;
  font-weight: 700;
  border-radius: 16px;
  display: flex;
  align-items: center;
  gap: 4px;
  max-width: 48%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  background: rgba(0, 0, 0, 0.85);
  color: white;
  backdrop-filter: blur(4px);
}

/* Overlay titre */
.title-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 14px 10px;
  background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 50%, transparent 100%);
  z-index: 1;
}

.article-main-title {
  font-size: 1rem;
  font-weight: 700;
  line-height: 1.3;
  color: #FFFFFF;
  margin-bottom: 4px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  text-align: right;
  text-shadow: 0 1px 2px rgba(0,0,0,0.8);
}

.article-source {
  font-size: 0.8rem;
  color: var(--accent-2);
  display: flex;
  align-items: center;
  gap: 4px;
  text-align: right;
}

/* ===== PAGINATION ===== */
.pagination-container {
  position: sticky;
  bottom: 0;
  left: 0;
  right: 0;
  background: #001122;
  padding: 10px 12px;
  padding-bottom: calc(10px + var(--safe-bottom));
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 6px;
  border-top: 1px solid rgba(255, 255, 255, 0.1);
  z-index: 100;
  min-height: 60px;
  backdrop-filter: blur(10px);
}

.pagination-btn {
  background: rgba(255, 255, 255, 0.1);
  color: var(--text);
  border: 1px solid rgba(255, 255, 255, 0.2);
  padding: 8px 10px;
  border-radius: var(--radius);
  font-size: 0.85rem;
  cursor: pointer;
  min-width: 40px;
  min-height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  touch-action: manipulation;
}

.pagination-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.pagination-numbers {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  justify-content: center;
}

.pagination-number {
  background: rgba(255, 255, 255, 0.1);
  color: var(--text);
  border: 1px solid rgba(255, 255, 255, 0.2);
  width: 36px;
  height: 36px;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85rem;
  cursor: pointer;
  touch-action: manipulation;
}

.pagination-number.active {
  background: var(--primary);
  border-color: var(--primary);
}

.pagination-info {
  font-size: 0.8rem;
  color: var(--text);
  margin: 0 8px;
  text-align: center;
  min-width: 70px;
}

/* ===== OVERLAY ARTICLE ===== */
#article-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: #000;
  z-index: 2000;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}

.overlay-container {
  width: 100%;
  min-height: 100vh;
  background: white;
  display: flex;
  flex-direction: column;
}

.overlay-header {
  padding: 16px;
  padding-top: calc(16px + var(--safe-top));
  background: var(--primary);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 2;
  min-height: 80px;
}

.overlay-title {
  font-size: 1.2rem;
  font-weight: 700;
  color: white;
  flex: 1;
  line-height: 1.4;
  text-align: right;
}

.close-overlay {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--accent-1);
  border: none;
  color: white;
  font-size: 1.5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  touch-action: manipulation;
}

/* Contenu overlay */
.overlay-content {
  padding: 20px 16px;
  padding-bottom: calc(20px + var(--safe-bottom));
  background: white;
  color: #333;
  flex: 1;
}

.article-meta {
  margin-bottom: 20px;
  padding-bottom: 15px;
  border-bottom: 2px solid #eee;
}

.meta-item {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
  font-size: 1rem;
  color: #555;
  padding: 8px 0;
}

.article-url {
  display: block;
  margin: 30px 0;
  text-align: center;
}

.open-article-btn {
  background: var(--primary);
  color: white;
  border: none;
  padding: 16px 32px;
  border-radius: 25px;
  font-size: 1.1rem;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  display: inline-block;
  min-height: 54px;
  min-width: 200px;
  text-align: center;
  touch-action: manipulation;
  box-shadow: 0 4px 15px rgba(26, 115, 232, 0.3);
}

.overlay-actions {
  margin-top: 30px;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.back-btn {
  background: #666;
  color: white;
  border: none;
  padding: 16px 24px;
  border-radius: 25px;
  font-size: 1rem;
  cursor: pointer;
  min-height: 50px;
  touch-action: manipulation;
}

/* ===== LOADING & ERROR ===== */
#loading-indicator {
  text-align: center;
  padding: 60px 20px;
  color: var(--text);
}

.loading-spinner {
  width: 40px;
  height: 40px;
  border: 4px solid rgba(255, 255, 255, 0.2);
  border-top-color: var(--primary);
  border-radius: 50%;
  margin: 0 auto 20px;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.no-results, .error-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text);
}

.no-results-icon, .error-icon {
  font-size: 3rem;
  margin-bottom: 20px;
  opacity: 0.5;
}

.clear-search-btn, .retry-button {
  background: var(--primary);
  color: white;
  border: none;
  padding: 16px 28px;
  border-radius: 25px;
  font-size: 1rem;
  cursor: pointer;
  margin-top: 20px;
  min-height: 50px;
  touch-action: manipulation;
}

/* ===== PDF LOADING ===== */
.pdf-loading {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.9);
  z-index: 3000;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: white;
  padding: 20px;
  text-align: center;
}

.pdf-loading-spinner {
  width: 50px;
  height: 50px;
  border: 5px solid rgba(255, 255, 255, 0.2);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 20px;
}

/* ===== IMAGE ERROR ===== */
.image-error {
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255, 255, 255, 0.7);
  font-size: 0.85rem;
  height: 100%;
  text-align: center;
  padding: 20px;
  background: linear-gradient(to bottom, #000428, #001122);
}

/* ===== CONTENEUR PDF CACHÉ ===== */
#pdf-temp-container {
  position: absolute;
  left: -9999px;
  top: 0;
  width: 100%;
  opacity: 0;
  pointer-events: none;
}

/* ===== MEDIA QUERIES POUR PETITS ÉCRANS ===== */
@media (max-height: 700px) {
  .app-header {
    max-height: 40vh;
  }
  
  .article-image-container {
    aspect-ratio: 4/3;
  }
}

@media (max-width: 480px) {
  .app-header {
    padding: 6px 8px;
    padding-top: calc(6px + var(--safe-top));
  }
  
  .main-title {
    font-size: 1.1rem;
    margin-bottom: 6px;
  }
  
  .search-wrapper {
    min-height: 42px;
  }
  
  #search-input {
    padding: 10px 6px;
    font-size: 15px;
  }
  
  .date-input-wrapper, .preset-btn, .action-btn {
    min-height: 42px;
  }
  
  .date-input, .preset-btn, .action-btn {
    padding: 10px 8px;
    font-size: 14px;
  }
  
  .article-main-title {
    font-size: 0.95rem;
    -webkit-line-clamp: 2;
  }
  
  .metadata-badge {
    font-size: 0.7rem;
    padding: 5px 8px;
  }
  
  .pagination-btn, .pagination-number {
    min-width: 36px;
    min-height: 36px;
    font-size: 0.8rem;
  }
  
  .overlay-title {
    font-size: 1.1rem;
  }
  
  .open-article-btn {
    padding: 14px 24px;
    font-size: 1rem;
    min-height: 48px;
  }
}

@media (max-width: 360px) {
  :root {
    --radius: 10px;
  }
  
  .main-title {
    font-size: 1rem;
  }
  
  .search-wrapper, .date-input-wrapper, .preset-btn, .action-btn {
    min-height: 40px;
  }
  
  #search-input, .date-input {
    font-size: 14px;
    padding: 8px 6px;
  }
  
  .date-label {
    font-size: 0.75rem;
  }
  
  .period-presets, .action-buttons {
    gap: 4px;
  }
  
  .preset-btn, .action-btn {
    font-size: 13px;
    padding: 8px 4px;
  }
  
  .article-main-title {
    font-size: 0.9rem;
  }
  
  .pagination-container {
    gap: 3px;
    padding: 8px;
  }
  
  .pagination-btn, .pagination-number {
    min-width: 32px;
    min-height: 32px;
    font-size: 0.75rem;
  }
  
  .pagination-info {
    font-size: 0.75rem;
    min-width: 60px;
  }
}

/* ===== OPTIMISATIONS iOS ===== */
@supports (-webkit-touch-callout: none) {
  .main-content {
    height: -webkit-fill-available;
  }
  
  .search-wrapper, .date-input-wrapper {
    backdrop-filter: blur(10px);
    background: rgba(255, 255, 255, 0.08);
  }
}

/* ===== GESTION DU TOUCHER ===== */
@media (hover: none) and (pointer: coarse) {
  button, .article-card, .pagination-number {
    cursor: default;
  }
  
  .article-card:active {
    opacity: 0.7;
  }
  
  input, textarea, select {
    font-size: 16px !important; /* Empêche le zoom sur iOS */
  }
}

/* ===== UTILITAIRE POUR MASQUER LES ÉLÉMENTS ===== */
.hidden {
  display: none !important;
}

/* ===== GESTION DE L'HAUTEUR DYNAMIQUE DU HEADER ===== */
.header-height-observer {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: auto;
  pointer-events: none;
  opacity: 0;
}
</style>
</head>
<body>

<!-- Header fixe -->
<header class="app-header" id="app-header">
  <div class="header-height-observer" id="header-observer"></div>
  
  <h1 class="main-title">مراجعة الصحافة الأسبوعية</h1>
  
  <div class="search-wrapper">
    <div class="search-icon">🔍</div>
    <input type="text" id="search-input" placeholder="بحث في المقالات..." autocomplete="off" inputmode="search">
    <button class="clear-search" id="clear-search">✕</button>
  </div>
  
  <div class="date-filters">
    <div class="date-group">
      <span class="date-label">من:</span>
      <div class="date-input-wrapper">
        <input type="date" id="start-date" class="date-input">
      </div>
    </div>
    
    <div class="date-group">
      <span class="date-label">إلى:</span>
      <div class="date-input-wrapper">
        <input type="date" id="end-date" class="date-input">
      </div>
    </div>
  </div>
  
  <div class="period-presets">
    <button class="preset-btn active" data-period="week">أسبوع</button>
    <button class="preset-btn" data-period="biweekly">أسبوعين</button>
    <button class="preset-btn" data-period="month">شهر</button>
  </div>
  
  <div class="action-buttons">
    <button class="action-btn" id="clear-filters">مسح الكل</button>
    <button class="action-btn" id="download-pdf-btn">تحميل PDF</button>
  </div>
</header>

<!-- Stats bar -->
<div class="stats-bar" id="stats-bar" style="display: none;">
  <div class="results-count" id="results-count">0 مقال</div>
</div>

<!-- Contenu principal -->
<div class="main-content" id="main-content">
  <main id="articles-container">
    <div id="loading-indicator">
      <div class="loading-spinner"></div>
      <p>جاري تحميل المقالات...</p>
    </div>
  </main>
</div>

<!-- Pagination -->
<div class="pagination-container" id="pagination-container" style="display: none;">
  <button class="pagination-btn" id="first-btn">««</button>
  <button class="pagination-btn" id="prev-btn">‹</button>
  <div class="pagination-numbers" id="pagination-numbers"></div>
  <button class="pagination-btn" id="next-btn">›</button>
  <button class="pagination-btn" id="last-btn">»»</button>
  <div class="pagination-info" id="pagination-info">ص 1/1</div>
</div>

<!-- Overlay article -->
<div id="article-overlay">
  <div class="overlay-container">
    <div class="overlay-header">
      <div class="overlay-title" id="overlay-article-title"></div>
      <button class="close-overlay" id="close-overlay">×</button>
    </div>
    
    <div class="overlay-content">
      <div class="article-meta">
        <div class="meta-item" id="article-source">
          <span>📰</span>
          <span id="source-text"></span>
        </div>
        <div class="meta-item" id="article-date">
          <span>📅</span>
          <span id="date-text"></span>
        </div>
        <div class="meta-item" id="article-sentiment">
          <span>🎭</span>
          <span id="sentiment-text"></span>
        </div>
      </div>
      
      <div class="article-url">
        <a href="#" target="_blank" rel="noopener" class="open-article-btn" id="article-link">فتح المقال</a>
      </div>
      
      <div class="overlay-actions">
        <button class="back-btn" onclick="closeArticleOverlay()">العودة للقائمة</button>
      </div>
    </div>
  </div>
</div>

<!-- PDF Loading -->
<div class="pdf-loading" id="pdf-loading">
  <div class="pdf-loading-spinner"></div>
  <p>جارٍ إنشاء ملف PDF...</p>
</div>

<!-- Conteneur PDF caché -->
<div id="pdf-temp-container"></div>

<script>
// ===== CONFIGURATION SIMPLE =====
const CONFIG = {
  jsonUrl: 'data/datajson.json?t=' + Date.now(),
  articlesPerPage: 8,
  maxArticles: 200
};

// ===== ÉTAT DE L'APPLICATION =====
let appState = {
  articles: [],
  filteredArticles: [],
  searchQuery: '',
  startDate: null,
  endDate: null,
  isLoading: true,
  currentPage: 1,
  activePeriod: 'week',
  isScrolling: false,
  headerHeight: 240
};

// ===== ÉLÉMENTS DOM =====
const elements = {
  // Recherche
  searchInput: document.getElementById('search-input'),
  clearSearch: document.getElementById('clear-search'),
  
  // Dates
  startDate: document.getElementById('start-date'),
  endDate: document.getElementById('end-date'),
  
  // Boutons
  clearFilters: document.getElementById('clear-filters'),
  downloadPdfBtn: document.getElementById('download-pdf-btn'),
  periodPresets: document.querySelectorAll('.preset-btn'),
  
  // Conteneurs
  articlesContainer: document.getElementById('articles-container'),
  statsBar: document.getElementById('stats-bar'),
  resultsCount: document.getElementById('results-count'),
  mainContent: document.getElementById('main-content'),
  appHeader: document.getElementById('app-header'),
  
  // Pagination
  paginationContainer: document.getElementById('pagination-container'),
  firstBtn: document.getElementById('first-btn'),
  prevBtn: document.getElementById('prev-btn'),
  nextBtn: document.getElementById('next-btn'),
  lastBtn: document.getElementById('last-btn'),
  paginationNumbers: document.getElementById('pagination-numbers'),
  paginationInfo: document.getElementById('pagination-info'),
  
  // Overlay
  articleOverlay: document.getElementById('article-overlay'),
  closeOverlay: document.getElementById('close-overlay'),
  overlayArticleTitle: document.getElementById('overlay-article-title'),
  sourceText: document.getElementById('source-text'),
  dateText: document.getElementById('date-text'),
  sentimentText: document.getElementById('sentiment-text'),
  articleLink: document.getElementById('article-link'),
  
  // Loading
  loadingIndicator: document.getElementById('loading-indicator'),
  pdfLoading: document.getElementById('pdf-loading'),
  
  // PDF
  pdfTempContainer: document.getElementById('pdf-temp-container')
};

// ===== INITIALISATION =====
function initApp() {
  updateHeaderHeight();
  setupEventListeners();
  setupPeriodPresets();
  setupResizeObserver();
  loadArticles();
}

// ===== GESTION DES ÉVÉNEMENTS =====
function setupEventListeners() {
  // Recherche
  elements.searchInput.addEventListener('input', function(e) {
    appState.searchQuery = e.target.value;
    elements.clearSearch.style.display = appState.searchQuery ? 'flex' : 'none';
    filterArticles();
  });

  elements.clearSearch.addEventListener('click', () => {
    elements.searchInput.value = '';
    appState.searchQuery = '';
    elements.clearSearch.style.display = 'none';
    filterArticles();
    elements.searchInput.focus();
  });

  // Dates
  elements.startDate.addEventListener('change', function() {
    appState.startDate = this.value;
    appState.activePeriod = 'custom';
    updatePeriodButtons();
    filterArticles();
  });

  elements.endDate.addEventListener('change', function() {
    appState.endDate = this.value;
    appState.activePeriod = 'custom';
    updatePeriodButtons();
    filterArticles();
  });

  // Bouton effacer tout
  elements.clearFilters.addEventListener('click', () => {
    elements.searchInput.value = '';
    appState.searchQuery = '';
    elements.clearSearch.style.display = 'none';
    setPeriod('week');
    filterArticles();
    elements.searchInput.focus();
  });

  // Overlay
  elements.closeOverlay.addEventListener('click', closeArticleOverlay);
  
  // Fermeture avec Escape
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeArticleOverlay();
  });

  // Pagination
  elements.firstBtn.addEventListener('click', () => goToPage(1));
  elements.prevBtn.addEventListener('click', () => goToPage(appState.currentPage - 1));
  elements.nextBtn.addEventListener('click', () => goToPage(appState.currentPage + 1));
  elements.lastBtn.addEventListener('click', () => goToPage(getTotalPages()));

  // PDF
  elements.downloadPdfBtn.addEventListener('click', generatePDF);

  // Gestion du scroll
  let scrollTimeout;
  elements.mainContent.addEventListener('scroll', function() {
    appState.isScrolling = true;
    clearTimeout(scrollTimeout);
    scrollTimeout = setTimeout(() => {
      appState.isScrolling = false;
    }, 150);
  }, { passive: true });

  // Empêcher le pull-to-refresh
  let touchStartY = 0;
  document.addEventListener('touchstart', function(e) {
    if (e.target.closest('.article-card') || e.target.closest('#articles-container')) {
      touchStartY = e.touches[0].clientY;
    }
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    // Si on est en haut et qu'on scroll vers le bas, empêcher le refresh
    if (elements.mainContent.scrollTop === 0 && e.touches[0].clientY > touchStartY + 10) {
      e.preventDefault();
    }
  }, { passive: false });

  // Clic externe pour fermer l'overlay
  elements.articleOverlay.addEventListener('click', function(e) {
    if (e.target === this) closeArticleOverlay();
  });

  // Focus trap dans l'overlay
  elements.articleOverlay.addEventListener('keydown', function(e) {
    if (e.key === 'Tab') {
      const focusable = this.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
      const first = focusable[0];
      const last = focusable[focusable.length - 1];
      
      if (e.shiftKey && document.activeElement === first) {
        last.focus();
        e.preventDefault();
      } else if (!e.shiftKey && document.activeElement === last) {
        first.focus();
        e.preventDefault();
      }
    }
  });
}

function setupResizeObserver() {
  // Mettre à jour la hauteur du header quand il change
  const resizeObserver = new ResizeObserver(entries => {
    for (let entry of entries) {
      if (entry.target === elements.appHeader) {
        updateHeaderHeight();
      }
    }
  });
  
  resizeObserver.observe(elements.appHeader);
}

function updateHeaderHeight() {
  const height = elements.appHeader.offsetHeight;
  appState.headerHeight = height;
  document.documentElement.style.setProperty('--header-height', height + 'px');
  elements.mainContent.style.paddingTop = height + 'px';
}

// ===== PÉRIODES PRÉDÉFINIES =====
function setupPeriodPresets() {
  setPeriod('week');

  elements.periodPresets.forEach(btn => {
    btn.addEventListener('click', function() {
      const period = this.getAttribute('data-period');
      setPeriod(period);
    });
  });
}

function setPeriod(period) {
  const today = new Date();
  const startDate = new Date();

  // Formater la date pour l'input (YYYY-MM-DD)
  const formatDate = (date) => date.toISOString().split('T')[0];
  
  elements.endDate.value = formatDate(today);

  switch(period) {
    case 'week':
      startDate.setDate(today.getDate() - 7);
      break;
    case 'biweekly':
      startDate.setDate(today.getDate() - 14);
      break;
    case 'month':
      startDate.setDate(today.getDate() - 30);
      break;
  }

  elements.startDate.value = formatDate(startDate);

  appState.startDate = elements.startDate.value;
  appState.endDate = elements.endDate.value;
  appState.activePeriod = period;
  appState.currentPage = 1;

  elements.periodPresets.forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('data-period') === period);
  });

  filterArticles();
}

function updatePeriodButtons() {
  elements.periodPresets.forEach(btn => btn.classList.remove('active'));
}

// ===== GESTION DES DATES =====
function parseArticleDate(dateString) {
  if (!dateString) return null;
  try {
    const [datePart] = dateString.split(' ');
    const [day, month, year] = datePart.split('/');
    return new Date(year, month - 1, day);
  } catch {
    return null;
  }
}

function formatDateToDDMMYYYY(dateString) {
  if (!dateString) return '';
  try {
    const [datePart] = dateString.split(' ');
    const [day, month, year] = datePart.split('/');
    return `${day}/${month}/${year}`;
  } catch {
    return '';
  }
}

function getTimeAgo(dateString) {
  if (!dateString) return '';
  try {
    const [datePart] = dateString.split(' ');
    const [day, month, year] = datePart.split('/');
    const articleDate = new Date(year, month - 1, day);
    const now = new Date();
    const diffDays = Math.floor((now - articleDate) / (1000 * 60 * 60 * 24));
    
    if (diffDays === 0) return 'اليوم';
    if (diffDays === 1) return 'أمس';
    if (diffDays < 7) return `منذ ${diffDays} أيام`;
    if (diffDays < 30) return `منذ ${Math.floor(diffDays / 7)} أسابيع`;
    return formatDateToDDMMYYYY(dateString);
  } catch {
    return '';
  }
}

function isDateInRange(articleDate, startDate, endDate) {
  if (!articleDate) return false;
  
  const articleDateObj = parseArticleDate(articleDate);
  if (!articleDateObj) return false;
  
  if (!startDate && !endDate) return true;
  
  const start = startDate ? new Date(startDate) : null;
  const end = endDate ? new Date(endDate) : null;
  
  if (start && articleDateObj < start) return false;
  if (end && articleDateObj > end) return false;
  
  return true;
}

// ===== PAGINATION =====
function getTotalPages() {
  return Math.ceil(appState.filteredArticles.length / CONFIG.articlesPerPage);
}

function getCurrentPageArticles() {
  const startIndex = (appState.currentPage - 1) * CONFIG.articlesPerPage;
  const endIndex = startIndex + CONFIG.articlesPerPage;
  return appState.filteredArticles.slice(startIndex, endIndex);
}

function goToPage(page) {
  const totalPages = getTotalPages();
  if (page < 1 || page > totalPages) return;
  
  appState.currentPage = page;
  displayArticles();
  updatePagination();
  
  // Scroll vers le haut
  elements.mainContent.scrollTo({ top: 0, behavior: 'smooth' });
}

function updatePagination() {
  const totalPages = getTotalPages();
  const currentPage = appState.currentPage;
  
  if (totalPages <= 1) {
    elements.paginationContainer.style.display = 'none';
    return;
  }
  
  elements.paginationContainer.style.display = 'flex';
  
  elements.firstBtn.disabled = currentPage === 1;
  elements.prevBtn.disabled = currentPage === 1;
  elements.nextBtn.disabled = currentPage === totalPages;
  elements.lastBtn.disabled = currentPage === totalPages;
  
  elements.paginationInfo.textContent = `ص ${currentPage}/${totalPages}`;
  
  elements.paginationNumbers.innerHTML = '';
  
  let startPage = Math.max(1, currentPage - 2);
  let endPage = Math.min(totalPages, startPage + 4);
  
  if (endPage - startPage < 4) {
    startPage = Math.max(1, endPage - 4);
  }
  
  for (let i = startPage; i <= endPage; i++) {
    const pageBtn = document.createElement('div');
    pageBtn.className = `pagination-number ${i === currentPage ? 'active' : ''}`;
    pageBtn.textContent = i;
    pageBtn.setAttribute('role', 'button');
    pageBtn.setAttribute('aria-label', `الصفحة ${i}`);
    pageBtn.addEventListener('click', () => goToPage(i));
    elements.paginationNumbers.appendChild(pageBtn);
  }
}

// ===== GESTION DES IMAGES =====
function getArticleImageUrl(article) {
  if (!article.image_brute) return null;
  
  if (!article.image_brute.startsWith('http') &&
      !article.image_brute.startsWith('/') &&
      !article.image_brute.startsWith('images')) {
    return 'images3/' + article.image_brute;
  }
  
  return article.image_brute;
}

function createImageElement(imageUrl, title) {
  if (!imageUrl) {
    return '<div class="image-error">لا توجد صورة</div>';
  }

  return `<img src="${imageUrl}"
                alt="${title || 'صورة المقال'}"
                class="article-image"
                loading="lazy"
                decoding="async"
                onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\\'image-error\\'>لا توجد صورة</div>';"
                style="width:100%; height:100%;">`;
}

// ===== CHARGEMENT DES ARTICLES =====
async function loadArticles() {
  try {
    showLoading(true);
    const response = await fetch(CONFIG.jsonUrl);
    if (!response.ok) throw new Error('خطأ في الاتصال');
    
    const data = await response.json();
    appState.articles = processArticleData(data);
    filterArticles();
    
  } catch (error) {
    console.error('Error:', error);
    showError('تعذر تحميل المقالات. تحقق من اتصال الإنترنت.');
  } finally {
    showLoading(false);
  }
}

function processArticleData(articles) {
  return articles
    .filter(a => a.visible === true || a.visible === "true")
    .sort((a, b) => {
      try {
        const parseDate = (str) => {
          const [date, time] = str.split(' ');
          const [d, m, y] = date.split('/');
          const [h, min] = time ? time.split(':') : [0, 0];
          return new Date(y, m - 1, d, h, min);
        };
        return parseDate(b.date_heure) - parseDate(a.date_heure);
      } catch {
        return 0;
      }
    })
    .slice(0, CONFIG.maxArticles);
}

// ===== FILTRAGE =====
function filterArticles() {
  const query = appState.searchQuery.toLowerCase().trim();
  
  appState.filteredArticles = appState.articles.filter(article => {
    // Filtre texte
    if (query) {
      const searchText = `
        ${article.titre || ''}
        ${article.source || ''}
        ${article.theme || ''}
      `.toLowerCase();
      
      if (!searchText.includes(query)) return false;
    }
    
    // Filtre date
    return isDateInRange(article.date_heure, appState.startDate, appState.endDate);
  });
  
  appState.currentPage = 1;
  displayArticles();
  updateStatsBar();
  updatePagination();
  
  elements.downloadPdfBtn.disabled = appState.filteredArticles.length === 0;
}

// ===== AFFICHAGE DES ARTICLES =====
function displayArticles() {
  elements.articlesContainer.innerHTML = '';
  
  if (appState.filteredArticles.length === 0) {
    showNoResults();
    return;
  }
  
  const currentArticles = getCurrentPageArticles();
  
  currentArticles.forEach((article, index) => {
    const card = createArticleCard(article, index);
    elements.articlesContainer.appendChild(card);
  });
}

function createArticleCard(article, index) {
  const card = document.createElement('div');
  card.className = 'article-card';
  card.setAttribute('role', 'button');
  card.setAttribute('tabindex', '0');
  card.setAttribute('aria-label', `مقال: ${article.titre || 'بدون عنوان'}`);
  
  const imageUrl = getArticleImageUrl(article);
  const formattedDate = formatDateToDDMMYYYY(article.date_heure);
  const timeAgo = getTimeAgo(article.date_heure);
  const imageElement = createImageElement(imageUrl, article.titre);
  
  card.innerHTML = `
    <div class="article-image-container">
      ${imageElement}
      <div class="metadata-badges">
        <div class="metadata-badge" aria-label="التاريخ">
          <span>📅</span>
          <span>${timeAgo || formattedDate || 'بدون تاريخ'}</span>
        </div>
        <div class="metadata-badge" aria-label="التصنيف">
          <span>🏷️</span>
          <span>${(article.theme || 'عام').substring(0, 12)}</span>
        </div>
      </div>
      <div class="title-overlay">
        <h2 class="article-main-title">${truncateTitle(article.titre || 'بدون عنوان', 70)}</h2>
        <div class="article-source">
          <span>📰</span>
          <span>${article.source || 'غير معروف'}</span>
        </div>
      </div>
    </div>
  `;
  
  // Gestion des interactions
  let touchStartTime = 0;
  let isTouchMove = false;
  
  function handleTouchStart(e) {
    if (appState.isScrolling) return;
    touchStartTime = Date.now();
    isTouchMove = false;
    e.preventDefault();
  }
  
  function handleTouchMove() {
    if (appState.isScrolling) return;
    isTouchMove = true;
  }
  
  function handleTouchEnd(e) {
    if (appState.isScrolling || isTouchMove) return;
    
    const touchTime = Date.now() - touchStartTime;
    if (touchTime < 500) {
      openArticleOverlay(article);
    }
    
    e.preventDefault();
  }
  
  function handleClick(e) {
    if (!appState.isScrolling) {
      openArticleOverlay(article);
    }
  }
  
  function handleKeyDown(e) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      openArticleOverlay(article);
    }
  }
  
  // Événements tactiles
  card.addEventListener('touchstart', handleTouchStart, { passive: false });
  card.addEventListener('touchmove', handleTouchMove, { passive: true });
  card.addEventListener('touchend', handleTouchEnd, { passive: false });
  card.addEventListener('touchcancel', () => { isTouchMove = false; });
  
  // Événements souris/clavier
  card.addEventListener('click', handleClick);
  card.addEventListener('keydown', handleKeyDown);
  
  return card;
}

function truncateTitle(title, maxLength) {
  if (!title || title.length <= maxLength) return title;
  return title.substring(0, maxLength) + '...';
}

// ===== OVERLAY ARTICLE =====
function openArticleOverlay(article) {
  // Mettre à jour les informations
  elements.overlayArticleTitle.textContent = article.titre || 'المقال';
  elements.sourceText.textContent = article.source || 'غير معروف';
  elements.dateText.textContent = formatDateToDDMMYYYY(article.date_heure) || 'غير معروف';
  elements.sentimentText.textContent = article.sentiment || 'غير محدد';
  
  // Mettre à jour le lien
  if (article.url) {
    elements.articleLink.href = article.url;
    elements.articleLink.setAttribute('aria-label', `فتح مقال من ${article.source}`);
  } else {
    elements.articleLink.href = '#';
    elements.articleLink.onclick = (e) => {
      e.preventDefault();
      alert('لا يوجد رابط للمقال');
    };
  }
  
  // Afficher l'overlay
  elements.articleOverlay.style.display = 'block';
  document.body.style.overflow = 'hidden';
  
  // Focus sur le bouton de fermeture
  setTimeout(() => elements.closeOverlay.focus(), 100);
}

function closeArticleOverlay() {
  elements.articleOverlay.style.display = 'none';
  document.body.style.overflow = '';
  
  // Retourner le focus à l'article courant
  const currentCards = document.querySelectorAll('.article-card');
  if (currentCards.length > 0) {
    const pageStart = (appState.currentPage - 1) * CONFIG.articlesPerPage;
    const index = Math.min(pageStart, currentCards.length - 1);
    currentCards[index].focus();
  }
}

// ===== STATS BAR =====
function updateStatsBar() {
  const count = appState.filteredArticles.length;
  
  if (count === 0) {
    elements.statsBar.style.display = 'none';
    return;
  }
  
  elements.resultsCount.textContent = `${count} مقال${count > 1 ? 'ات' : ''}`;
  elements.statsBar.style.display = 'flex';
}

// ===== STATES =====
function showLoading(show) {
  elements.loadingIndicator.style.display = show ? 'block' : 'none';
}

function showNoResults() {
  elements.articlesContainer.innerHTML = `
    <div class="no-results">
      <div class="no-results-icon">🔍</div>
      <h3>لا توجد نتائج</h3>
      <p>لم يتم العثور على مقالات تطابق بحثك</p>
      <button class="clear-search-btn" onclick="elements.clearFilters.click()">
        مسح البحث
      </button>
    </div>
  `;
  elements.statsBar.style.display = 'none';
  elements.paginationContainer.style.display = 'none';
}

function showError(message) {
  elements.articlesContainer.innerHTML = `
    <div class="error-state">
      <div class="error-icon">⚠️</div>
      <h3>خطأ</h3>
      <p>${message}</p>
      <button class="retry-button" onclick="loadArticles()">
        إعادة المحاولة
      </button>
    </div>
  `;
  elements.statsBar.style.display = 'none';
  elements.paginationContainer.style.display = 'none';
}

// ===== PDF GENERATION =====
async function generatePDF() {
  if (appState.filteredArticles.length === 0) {
    alert('لا توجد مقالات لتحميلها');
    return;
  }
  
  try {
    // Afficher l'indicateur de chargement
    elements.pdfLoading.style.display = 'flex';
    elements.downloadPdfBtn.disabled = true;
    
    // Attendre que l'utilisateur voie l'indicateur
    await new Promise(resolve => setTimeout(resolve, 500));
    
    // Vérifier si html2pdf est disponible
    if (typeof html2pdf === 'undefined') {
      throw new Error('مكتبة PDF غير متاحة');
    }
    
    // Créer le contenu PDF
    const pdfContent = createPdfContent();
    elements.pdfTempContainer.innerHTML = '';
    elements.pdfTempContainer.appendChild(pdfContent);
    
    // Attendre un peu pour le rendu
    await new Promise(resolve => setTimeout(resolve, 300));
    
    // Options PDF optimisées pour mobile
    const options = {
      margin: [5, 5, 5, 5],
      filename: `مراجعة_الصحافة_${new Date().toISOString().split('T')[0]}.pdf`,
      image: { type: 'jpeg', quality: 0.7 },
      html2canvas: { 
        scale: 1,
        useCORS: true,
        logging: false,
        scrollY: 0,
        windowWidth: 800
      },
      jsPDF: { 
        unit: 'mm', 
        format: 'a4', 
        orientation: 'portrait',
        compress: true
      },
      pagebreak: { mode: ['css', 'legacy'] }
    };
    
    // Générer le PDF
    await html2pdf().set(options).from(pdfContent).save();
    
  } catch (error) {
    console.error('PDF Error:', error);
    alert('حدث خطأ أثناء إنشاء ملف PDF. يرجى المحاولة مرة أخرى.');
    
  } finally {
    // Nettoyer
    elements.pdfTempContainer.innerHTML = '';
    elements.pdfLoading.style.display = 'none';
    elements.downloadPdfBtn.disabled = false;
  }
}

function createPdfContent() {
  const container = document.createElement('div');
  container.style.cssText = `
    padding: 10px;
    background: white;
    color: black;
    font-family: 'Tajawal', sans-serif;
    direction: rtl;
    text-align: right;
    font-size: 12px;
    max-width: 100%;
  `;
  
  // Titre
  const title = document.createElement('h1');
  title.textContent = 'مراجعة الصحافة الأسبوعية';
  title.style.cssText = 'color: #1a73e8; text-align: center; margin-bottom: 10px; font-size: 18px;';
  container.appendChild(title);
  
  // Informations
  const info = document.createElement('div');
  info.innerHTML = `
    <div style="text-align: center; color: #666; margin-bottom: 15px; font-size: 11px;">
      عدد المقالات: ${appState.filteredArticles.length}<br>
      التاريخ: ${new Date().toLocaleDateString('ar-EG')}<br>
      الفترة: ${appState.startDate} إلى ${appState.endDate}
    </div>
  `;
  container.appendChild(info);
  
  // Articles
  appState.filteredArticles.forEach((article, index) => {
    const articleDiv = document.createElement('div');
    articleDiv.style.cssText = `
      margin-bottom: 10px;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 5px;
      background: #f9f9f9;
      page-break-inside: avoid;
    `;
    
    articleDiv.innerHTML = `
      <div style="font-weight: bold; color: #333; margin-bottom: 4px; font-size: 13px;">
        ${index + 1}. ${article.titre || 'بدون عنوان'}
      </div>
      <div style="color: #666; font-size: 11px; margin-bottom: 3px;">
        <strong>المصدر:</strong> ${article.source || 'غير معروف'}
      </div>
      <div style="color: #666; font-size: 11px; margin-bottom: 3px;">
        <strong>التاريخ:</strong> ${formatDateToDDMMYYYY(article.date_heure) || 'غير معروف'}
      </div>
      ${article.theme ? `<div style="color: #888; font-size: 10px;"><strong>التصنيف:</strong> ${article.theme}</div>` : ''}
    `;
    
    container.appendChild(articleDiv);
  });
  
  // Footer
  const footer = document.createElement('div');
  footer.style.cssText = 'text-align: center; margin-top: 15px; color: #888; font-size: 10px; border-top: 1px solid #eee; padding-top: 10px;';
  footer.textContent = 'تم الإنشاء بواسطة تطبيق مراجعة الصحافة - ' + new Date().toLocaleDateString('ar-EG');
  container.appendChild(footer);
  
  return container;
}

// ===== DÉMARRAGE =====
// Charger html2pdf dynamiquement
function loadPdfLibrary() {
  return new Promise((resolve, reject) => {
    if (typeof html2pdf !== 'undefined') {
      resolve();
      return;
    }
    
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
    script.onload = resolve;
    script.onerror = () => {
      console.warn('PDF library failed to load, PDF generation will be disabled');
      elements.downloadPdfBtn.style.display = 'none';
      resolve();
    };
    document.head.appendChild(script);
  });
}

// Initialiser l'application
document.addEventListener('DOMContentLoaded', async () => {
  // Précharger la bibliothèque PDF en arrière-plan
  loadPdfLibrary().catch(() => {
    elements.downloadPdfBtn.style.display = 'none';
  });
  
  // Démarrer l'application
  setTimeout(() => {
    initApp();
  }, 100);
  
  // Prévenir le double-tap zoom sur iOS
  let lastTouchEnd = 0;
  document.addEventListener('touchend', function(event) {
    const now = Date.now();
    if (now - lastTouchEnd <= 300) {
      event.preventDefault();
    }
    lastTouchEnd = now;
  }, false);
});

// Gestion de la mémoire
window.addEventListener('pagehide', function() {
  // Nettoyer les références
  appState.articles = [];
  appState.filteredArticles = [];
});

// Service Worker pour la mise en cache (optionnel)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/sw.js').catch(function(error) {
      console.log('Service Worker registration failed:', error);
    });
  });
}
</script>
