<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<!-- OPTIMISATION ULTRA MOBILE -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="format-detection" content="telephone=no">
<meta name="theme-color" content="#001122">
<meta name="description" content="مراجعة الصحافة الأسبوعية">
<title>مراجعة الصحافة</title>
<link rel="icon" type="image/png" href="images1/00011.png">
<!-- Police simplifiée -->
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ===== RESET COMPLET POUR MOBILE ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: rgba(0,0,0,0);
  -webkit-user-select: none;
  user-select: none;
  touch-action: manipulation;
}

:root {
  --primary: #1a73e8;
  --background: #001122;
  --card-bg: #001a44;
  --text: #ffffff;
  --accent-1: #FF6B6B;
  --accent-2: #4ECDC4;
  --radius: 8px;
}

/* ===== BASE ULTRA SIMPLE ===== */
body {
  font-family: 'Tajawal', -apple-system, sans-serif;
  background: var(--background);
  color: var(--text);
  line-height: 1.4;
  min-height: 100vh;
  overflow-x: hidden;
  font-size: 16px;
  position: fixed;
  width: 100%;
  height: 100%;
}

/* ===== HEADER FIXE ===== */
.app-header {
  background: #001122;
  padding: 10px 12px;
  padding-top: env(safe-area-inset-top, 10px);
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  height: auto;
  overflow: visible;
}

.main-title {
  font-size: 1.3rem;
  font-weight: 900;
  color: white;
  text-align: center;
  margin-bottom: 8px;
}

/* ===== RECHERCHE ===== */
.search-wrapper {
  display: flex;
  align-items: center;
  background: rgba(255, 255, 255, 0.1);
  border-radius: var(--radius);
  padding: 4px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  margin-bottom: 8px;
}

.search-icon {
  padding: 0 8px;
  color: var(--text);
}

#search-input {
  flex: 1;
  padding: 10px 8px;
  background: transparent;
  border: none;
  color: var(--text);
  font-size: 16px;
  outline: none;
  text-align: right;
  -webkit-user-select: text;
  user-select: text;
}

.clear-search {
  padding: 0 8px;
  color: var(--text);
  background: none;
  border: none;
  font-size: 1rem;
  min-height: 40px;
  min-width: 40px;
  display: none;
}

/* ===== FILTRES DATE ===== */
.date-filters {
  display: flex;
  gap: 5px;
  margin: 8px 0;
  flex-direction: column;
}

.date-group {
  display: flex;
  align-items: center;
  gap: 5px;
}

.date-label {
  font-size: 0.8rem;
  color: var(--accent-2);
  min-width: 40px;
}

.date-input-wrapper {
  flex: 1;
  background: rgba(255, 255, 255, 0.1);
  border-radius: var(--radius);
  border: 1px solid rgba(255, 255, 255, 0.2);
}

.date-input {
  width: 100%;
  padding: 8px;
  background: transparent;
  border: none;
  color: var(--text);
  font-size: 16px;
  outline: none;
  text-align: right;
  min-height: 40px;
  -webkit-user-select: text;
  user-select: text;
}

/* ===== BOUTONS PÉRIODE ===== */
.period-presets {
  display: flex;
  gap: 5px;
  margin: 8px 0;
  justify-content: center;
}

.preset-btn {
  background: rgba(255, 255, 255, 0.1);
  color: var(--text);
  border: 1px solid rgba(255, 255, 255, 0.2);
  padding: 8px 10px;
  border-radius: var(--radius);
  font-size: 0.85rem;
  cursor: pointer;
  min-height: 40px;
  flex: 1;
  text-align: center;
  -webkit-user-select: none;
  user-select: none;
}

.preset-btn.active {
  background: var(--primary);
  border-color: var(--primary);
}

/* ===== BOUTONS ACTION ===== */
.action-buttons {
  display: flex;
  gap: 8px;
  margin: 8px 0;
}

.clear-filters-btn, .download-pdf-btn {
  background: var(--primary);
  color: white;
  border: none;
  padding: 10px;
  border-radius: var(--radius);
  font-size: 0.9rem;
  cursor: pointer;
  min-height: 44px;
  flex: 1;
  text-align: center;
  -webkit-user-select: none;
  user-select: none;
}

.download-pdf-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* ===== CONTENU PRINCIPAL ===== */
.main-content {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  padding-top: 180px; /* Espace pour le header */
  padding-bottom: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  background: var(--background);
}

#articles-container {
  padding: 12px;
  padding-bottom: 80px; /* Espace pour la pagination */
  display: flex;
  flex-direction: column;
  gap: 12px;
  min-height: calc(100vh - 180px);
}

/* ===== CARTE ARTICLE ===== */
.article-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
  width: 100%;
  -webkit-tap-highlight-color: transparent;
  transform: translateZ(0);
  will-change: transform;
}

.article-card.touched {
  opacity: 0.8;
  transform: scale(0.98);
}

.article-image-container {
  position: relative;
  width: 100%;
  height: 160px;
  background: #000428;
  overflow: hidden;
}

.article-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  background: #000428;
}

/* Badges */
.metadata-badges {
  position: absolute;
  top: 8px;
  left: 8px;
  right: 8px;
  display: flex;
  justify-content: space-between;
  z-index: 2;
}

.metadata-badge {
  padding: 5px 8px;
  font-size: 0.7rem;
  font-weight: 700;
  border-radius: 12px;
  display: flex;
  align-items: center;
  gap: 3px;
  max-width: 45%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  background: rgba(0, 0, 0, 0.8);
  color: white;
}

/* Overlay titre */
.title-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 12px 8px;
  background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
  z-index: 1;
}

.article-main-title {
  font-size: 1rem;
  font-weight: 700;
  line-height: 1.3;
  color: #FFFFFF;
  margin-bottom: 3px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  text-align: right;
}

.article-source {
  font-size: 0.75rem;
  color: var(--accent-2);
  display: flex;
  align-items: center;
  gap: 3px;
  text-align: right;
}

/* ===== STATS BAR ===== */
.stats-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 12px;
  background: rgba(0, 26, 68, 0.9);
  font-size: 0.75rem;
  color: var(--text);
  position: fixed;
  top: 160px;
  left: 0;
  right: 0;
  z-index: 999;
  height: 30px;
}

.results-count {
  font-weight: 600;
  color: var(--accent-2);
}

/* ===== PAGINATION ===== */
.pagination-container {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #001122;
  padding: 10px 12px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 5px;
  border-top: 1px solid rgba(255, 255, 255, 0.1);
  z-index: 1000;
  height: 60px;
}

.pagination-btn {
  background: rgba(255, 255, 255, 0.1);
  color: var(--text);
  border: 1px solid rgba(255, 255, 255, 0.2);
  padding: 6px 8px;
  border-radius: var(--radius);
  font-size: 0.8rem;
  cursor: pointer;
  min-width: 36px;
  min-height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-user-select: none;
  user-select: none;
}

.pagination-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.pagination-numbers {
  display: flex;
  gap: 3px;
}

.pagination-number {
  background: rgba(255, 255, 255, 0.1);
  color: var(--text);
  border: 1px solid rgba(255, 255, 255, 0.2);
  width: 32px;
  height: 32px;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8rem;
  cursor: pointer;
  -webkit-user-select: none;
  user-select: none;
}

.pagination-number.active {
  background: var(--primary);
  border-color: var(--primary);
}

.pagination-info {
  font-size: 0.75rem;
  color: var(--text);
  margin: 0 5px;
}

/* ===== OVERLAY ARTICLE ===== */
#article-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: #000;
  z-index: 2000;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.overlay-container {
  width: 100%;
  min-height: 100vh;
  background: white;
  display: flex;
  flex-direction: column;
}

.overlay-header {
  padding: 15px;
  padding-top: calc(15px + env(safe-area-inset-top, 15px));
  background: var(--primary);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 2;
}

.overlay-title {
  font-size: 1.1rem;
  font-weight: 700;
  color: white;
  flex: 1;
  line-height: 1.3;
  text-align: right;
}

.close-overlay {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--accent-1);
  border: none;
  color: white;
  font-size: 1.2rem;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  -webkit-user-select: none;
  user-select: none;
}

/* Contenu overlay */
.overlay-content {
  padding: 15px;
  background: white;
  color: #333;
  flex: 1;
}

.article-meta {
  margin-bottom: 15px;
  padding-bottom: 10px;
  border-bottom: 1px solid #eee;
}

.meta-item {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 5px;
  font-size: 0.85rem;
  color: #666;
}

.article-url {
  display: block;
  margin: 20px 0;
  text-align: center;
}

.open-article-btn {
  background: var(--primary);
  color: white;
  border: none;
  padding: 14px 28px;
  border-radius: 25px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  display: inline-block;
  min-height: 50px;
  min-width: 200px;
  text-align: center;
}

.overlay-actions {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.back-btn {
  background: #666;
  color: white;
  border: none;
  padding: 12px 24px;
  border-radius: 25px;
  font-size: 0.9rem;
  cursor: pointer;
  min-height: 44px;
}

/* ===== LOADING & ERROR ===== */
#loading-indicator {
  text-align: center;
  padding: 40px 15px;
  color: var(--text);
}

.loading-spinner {
  width: 30px;
  height: 30px;
  border: 3px solid rgba(255, 255, 255, 0.2);
  border-top-color: var(--primary);
  border-radius: 50%;
  margin: 0 auto 15px;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.no-results, .error-state {
  text-align: center;
  padding: 50px 15px;
  color: var(--text);
}

.no-results-icon, .error-icon {
  font-size: 2.5rem;
  margin-bottom: 15px;
  opacity: 0.5;
}

.clear-search-btn, .retry-button {
  background: var(--primary);
  color: white;
  border: none;
  padding: 12px 24px;
  border-radius: 20px;
  font-size: 0.9rem;
  cursor: pointer;
  margin-top: 15px;
  min-height: 44px;
}

/* ===== PDF LOADING ===== */
.pdf-loading {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.8);
  z-index: 3000;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: white;
}

.pdf-loading-spinner {
  width: 40px;
  height: 40px;
  border: 4px solid rgba(255, 255, 255, 0.2);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 15px;
}

/* ===== IMAGE ERROR ===== */
.image-error {
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255, 255, 255, 0.7);
  font-size: 0.75rem;
  height: 100%;
  text-align: center;
  padding: 15px;
  background: #000428;
}

/* ===== CONTENEUR PDF CACHÉ ===== */
#pdf-temp-container {
  position: absolute;
  left: -9999px;
  top: 0;
  width: 100%;
  opacity: 0;
  pointer-events: none;
}

/* ===== OPTIMISATIONS iOS ===== */
@supports (-webkit-touch-callout: none) {
  .main-content {
    padding-top: calc(180px + env(safe-area-inset-top, 0px));
  }
  
  .overlay-header {
    padding-top: calc(15px + constant(safe-area-inset-top));
    padding-top: calc(15px + env(safe-area-inset-top));
  }
}

/* ===== PRÉVENTION DES PROBLÈMES DE TOUCHER ===== */
@media (hover: none) and (pointer: coarse) {
  .article-card {
    touch-action: pan-y;
  }
  
  .article-card:active {
    opacity: 0.8;
  }
}

/* ===== TRÈS PETITS ÉCRANS ===== */
@media (max-width: 360px) {
  .article-image-container {
    height: 140px;
  }
  
  .article-main-title {
    font-size: 0.9rem;
  }
  
  .preset-btn, .clear-filters-btn, .download-pdf-btn {
    font-size: 0.8rem;
    padding: 6px 8px;
  }
}
</style>
</head>
<body>

<!-- Header fixe -->
<header class="app-header">
  <h1 class="main-title">مراجعة الصحافة الأسبوعية</h1>
  
  <div class="search-wrapper">
    <div class="search-icon">🔍</div>
    <input type="text" id="search-input" placeholder="بحث في المقالات..." autocomplete="off">
    <button class="clear-search" id="clear-search">✕</button>
  </div>
  
  <div class="date-filters">
    <div class="date-group">
      <span class="date-label">من:</span>
      <div class="date-input-wrapper">
        <input type="date" id="start-date" class="date-input">
      </div>
    </div>
    
    <div class="date-group">
      <span class="date-label">إلى:</span>
      <div class="date-input-wrapper">
        <input type="date" id="end-date" class="date-input">
      </div>
    </div>
  </div>
  
  <div class="period-presets">
    <button class="preset-btn active" data-period="week">أسبوع</button>
    <button class="preset-btn" data-period="biweekly">أسبوعين</button>
    <button class="preset-btn" data-period="month">شهر</button>
  </div>
  
  <div class="action-buttons">
    <button class="clear-filters-btn" id="clear-filters">مسح الكل</button>
    <button class="download-pdf-btn" id="download-pdf-btn">تحميل PDF</button>
  </div>
</header>

<!-- Stats bar -->
<div class="stats-bar" id="stats-bar" style="display: none;">
  <div class="results-count" id="results-count">0 مقال</div>
</div>

<!-- Contenu principal -->
<div class="main-content">
  <main id="articles-container">
    <div id="loading-indicator">
      <div class="loading-spinner"></div>
      <p>جاري تحميل المقالات...</p>
    </div>
  </main>
</div>

<!-- Pagination fixe -->
<div class="pagination-container" id="pagination-container" style="display: none;">
  <button class="pagination-btn" id="first-btn">««</button>
  <button class="pagination-btn" id="prev-btn">‹</button>
  <div class="pagination-numbers" id="pagination-numbers"></div>
  <button class="pagination-btn" id="next-btn">›</button>
  <button class="pagination-btn" id="last-btn">»»</button>
  <div class="pagination-info" id="pagination-info">ص 1/1</div>
</div>

<!-- Overlay article -->
<div id="article-overlay">
  <div class="overlay-container">
    <div class="overlay-header">
      <div class="overlay-title" id="overlay-article-title"></div>
      <button class="close-overlay" id="close-overlay">×</button>
    </div>
    
    <div class="overlay-content">
      <div class="article-meta">
        <div class="meta-item" id="article-source">
          <span>📰</span>
          <span id="source-text"></span>
        </div>
        <div class="meta-item" id="article-date">
          <span>📅</span>
          <span id="date-text"></span>
        </div>
        <div class="meta-item" id="article-sentiment">
          <span>🎭</span>
          <span id="sentiment-text"></span>
        </div>
      </div>
      
      <div class="article-url">
        <a href="#" target="_blank" class="open-article-btn" id="article-link">فتح المقال</a>
      </div>
      
      <div class="overlay-actions">
        <button class="back-btn" onclick="closeArticleOverlay()">العودة للقائمة</button>
      </div>
    </div>
  </div>
</div>

<!-- PDF Loading -->
<div class="pdf-loading" id="pdf-loading">
  <div class="pdf-loading-spinner"></div>
  <p>جارٍ إنشاء ملف PDF...</p>
</div>

<!-- Conteneur PDF caché -->
<div id="pdf-temp-container"></div>

<script>
// ===== CONFIGURATION SIMPLE =====
const CONFIG = {
  jsonUrl: 'data/datajson.json?t=' + Date.now(),
  articlesPerPage: 8,
  maxArticles: 200
};

// ===== ÉTAT DE L'APPLICATION =====
let appState = {
  articles: [],
  filteredArticles: [],
  searchQuery: '',
  startDate: null,
  endDate: null,
  isLoading: true,
  currentPage: 1,
  activePeriod: 'week',
  touchStartTime: 0,
  touchStartY: 0,
  isScrolling: false
};

// ===== ÉLÉMENTS DOM =====
const elements = {
  // Recherche
  searchInput: document.getElementById('search-input'),
  clearSearch: document.getElementById('clear-search'),
  
  // Dates
  startDate: document.getElementById('start-date'),
  endDate: document.getElementById('end-date'),
  
  // Boutons
  clearFilters: document.getElementById('clear-filters'),
  downloadPdfBtn: document.getElementById('download-pdf-btn'),
  periodPresets: document.querySelectorAll('.preset-btn'),
  
  // Conteneurs
  articlesContainer: document.getElementById('articles-container'),
  statsBar: document.getElementById('stats-bar'),
  resultsCount: document.getElementById('results-count'),
  
  // Pagination
  paginationContainer: document.getElementById('pagination-container'),
  firstBtn: document.getElementById('first-btn'),
  prevBtn: document.getElementById('prev-btn'),
  nextBtn: document.getElementById('next-btn'),
  lastBtn: document.getElementById('last-btn'),
  paginationNumbers: document.getElementById('pagination-numbers'),
  paginationInfo: document.getElementById('pagination-info'),
  
  // Overlay
  articleOverlay: document.getElementById('article-overlay'),
  closeOverlay: document.getElementById('close-overlay'),
  overlayArticleTitle: document.getElementById('overlay-article-title'),
  sourceText: document.getElementById('source-text'),
  dateText: document.getElementById('date-text'),
  sentimentText: document.getElementById('sentiment-text'),
  articleLink: document.getElementById('article-link'),
  
  // Loading
  loadingIndicator: document.getElementById('loading-indicator'),
  pdfLoading: document.getElementById('pdf-loading'),
  
  // PDF
  pdfTempContainer: document.getElementById('pdf-temp-container')
};

// ===== INITIALISATION =====
function initApp() {
  setupEventListeners();
  setupPeriodPresets();
  loadArticles();
}

// ===== GESTION DES ÉVÉNEMENTS =====
function setupEventListeners() {
  // Recherche
  elements.searchInput.addEventListener('input', function(e) {
    appState.searchQuery = e.target.value;
    elements.clearSearch.style.display = appState.searchQuery ? 'flex' : 'none';
    filterArticles();
  });

  elements.clearSearch.addEventListener('click', () => {
    elements.searchInput.value = '';
    appState.searchQuery = '';
    elements.clearSearch.style.display = 'none';
    filterArticles();
  });

  // Dates
  elements.startDate.addEventListener('change', function() {
    appState.startDate = this.value;
    appState.activePeriod = 'custom';
    updatePeriodButtons();
    filterArticles();
  });

  elements.endDate.addEventListener('change', function() {
    appState.endDate = this.value;
    appState.activePeriod = 'custom';
    updatePeriodButtons();
    filterArticles();
  });

  // Bouton effacer tout
  elements.clearFilters.addEventListener('click', () => {
    elements.searchInput.value = '';
    appState.searchQuery = '';
    elements.clearSearch.style.display = 'none';
    setPeriod('week');
    filterArticles();
  });

  // Overlay
  elements.closeOverlay.addEventListener('click', closeArticleOverlay);
  
  // Fermeture avec Escape
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeArticleOverlay();
  });

  // Pagination
  elements.firstBtn.addEventListener('click', () => goToPage(1));
  elements.prevBtn.addEventListener('click', () => goToPage(appState.currentPage - 1));
  elements.nextBtn.addEventListener('click', () => goToPage(appState.currentPage + 1));
  elements.lastBtn.addEventListener('click', () => goToPage(getTotalPages()));

  // PDF
  elements.downloadPdfBtn.addEventListener('click', generatePDF);

  // Prévenir le zoom sur iOS
  document.addEventListener('touchmove', function(e) {
    if (e.scale !== 1) e.preventDefault();
  }, { passive: false });

  // Prévenir les clics pendant le scroll
  let scrollTimeout;
  document.querySelector('.main-content').addEventListener('scroll', function() {
    appState.isScrolling = true;
    clearTimeout(scrollTimeout);
    scrollTimeout = setTimeout(() => {
      appState.isScrolling = false;
    }, 100);
  });

  // Empêcher le pull-to-refresh sur iOS
  let startY;
  document.addEventListener('touchstart', function(e) {
    startY = e.touches[0].clientY;
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    const y = e.touches[0].clientY;
    if (y > startY && window.scrollY === 0) {
      e.preventDefault();
    }
  }, { passive: false });
}

// ===== PÉRIODES PRÉDÉFINIES =====
function setupPeriodPresets() {
  setPeriod('week');

  elements.periodPresets.forEach(btn => {
    btn.addEventListener('click', function() {
      const period = this.getAttribute('data-period');
      setPeriod(period);
    });
  });
}

function setPeriod(period) {
  const today = new Date();
  const startDate = new Date();

  elements.endDate.value = today.toISOString().split('T')[0];

  switch(period) {
    case 'week':
      startDate.setDate(today.getDate() - 7);
      break;
    case 'biweekly':
      startDate.setDate(today.getDate() - 14);
      break;
    case 'month':
      startDate.setDate(today.getDate() - 30);
      break;
  }

  elements.startDate.value = startDate.toISOString().split('T')[0];

  appState.startDate = elements.startDate.value;
  appState.endDate = elements.endDate.value;
  appState.activePeriod = period;
  appState.currentPage = 1;

  elements.periodPresets.forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('data-period') === period);
  });

  filterArticles();
}

function updatePeriodButtons() {
  elements.periodPresets.forEach(btn => btn.classList.remove('active'));
}

// ===== GESTION DES DATES =====
function parseArticleDate(dateString) {
  if (!dateString) return null;
  try {
    const [datePart] = dateString.split(' ');
    const [day, month, year] = datePart.split('/');
    return new Date(year, month - 1, day);
  } catch {
    return null;
  }
}

function formatDateToDDMMYYYY(dateString) {
  if (!dateString) return '';
  try {
    const [datePart] = dateString.split(' ');
    const [day, month, year] = datePart.split('/');
    return `${day}/${month}/${year}`;
  } catch {
    return '';
  }
}

function getTimeAgo(dateString) {
  if (!dateString) return '';
  try {
    const [datePart] = dateString.split(' ');
    const [day, month, year] = datePart.split('/');
    const articleDate = new Date(year, month - 1, day);
    const now = new Date();
    const diffDays = Math.floor((now - articleDate) / (1000 * 60 * 60 * 24));
    
    if (diffDays === 0) return 'اليوم';
    if (diffDays === 1) return 'أمس';
    if (diffDays < 7) return `منذ ${diffDays} أيام`;
    if (diffDays < 30) return `منذ ${Math.floor(diffDays / 7)} أسابيع`;
    return formatDateToDDMMYYYY(dateString);
  } catch {
    return '';
  }
}

function isDateInRange(articleDate, startDate, endDate) {
  if (!articleDate) return false;
  
  const articleDateObj = parseArticleDate(articleDate);
  if (!articleDateObj) return false;
  
  if (!startDate && !endDate) return true;
  
  const start = startDate ? new Date(startDate) : null;
  const end = endDate ? new Date(endDate) : null;
  
  if (start && articleDateObj < start) return false;
  if (end && articleDateObj > end) return false;
  
  return true;
}

// ===== PAGINATION =====
function getTotalPages() {
  return Math.ceil(appState.filteredArticles.length / CONFIG.articlesPerPage);
}

function getCurrentPageArticles() {
  const startIndex = (appState.currentPage - 1) * CONFIG.articlesPerPage;
  const endIndex = startIndex + CONFIG.articlesPerPage;
  return appState.filteredArticles.slice(startIndex, endIndex);
}

function goToPage(page) {
  const totalPages = getTotalPages();
  if (page < 1 || page > totalPages) return;
  
  appState.currentPage = page;
  displayArticles();
  updatePagination();
  
  // Scroll vers le haut
  document.querySelector('.main-content').scrollTop = 0;
}

function updatePagination() {
  const totalPages = getTotalPages();
  const currentPage = appState.currentPage;
  
  if (totalPages <= 1) {
    elements.paginationContainer.style.display = 'none';
    return;
  }
  
  elements.paginationContainer.style.display = 'flex';
  
  elements.firstBtn.disabled = currentPage === 1;
  elements.prevBtn.disabled = currentPage === 1;
  elements.nextBtn.disabled = currentPage === totalPages;
  elements.lastBtn.disabled = currentPage === totalPages;
  
  elements.paginationInfo.textContent = `ص ${currentPage}/${totalPages}`;
  
  elements.paginationNumbers.innerHTML = '';
  
  let startPage = Math.max(1, currentPage - 2);
  let endPage = Math.min(totalPages, startPage + 4);
  
  if (endPage - startPage < 4) {
    startPage = Math.max(1, endPage - 4);
  }
  
  for (let i = startPage; i <= endPage; i++) {
    const pageBtn = document.createElement('div');
    pageBtn.className = `pagination-number ${i === currentPage ? 'active' : ''}`;
    pageBtn.textContent = i;
    pageBtn.addEventListener('click', () => goToPage(i));
    elements.paginationNumbers.appendChild(pageBtn);
  }
}

// ===== GESTION DES IMAGES =====
function getArticleImageUrl(article) {
  if (!article.image_brute) return null;
  
  if (!article.image_brute.startsWith('http') &&
      !article.image_brute.startsWith('/') &&
      !article.image_brute.startsWith('images')) {
    return 'images3/' + article.image_brute;
  }
  
  return article.image_brute;
}

function createImageElement(imageUrl, title) {
  if (!imageUrl) {
    return '<div class="image-error">لا توجد صورة</div>';
  }

  return `<img src="${imageUrl}"
                alt="${title || 'صورة المقال'}"
                class="article-image"
                loading="lazy"
                onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\\'image-error\\'>لا توجد صورة</div>';"
                style="width:100%; height:100%;">`;
}

// ===== CHARGEMENT DES ARTICLES =====
async function loadArticles() {
  try {
    showLoading(true);
    const response = await fetch(CONFIG.jsonUrl);
    if (!response.ok) throw new Error('خطأ في الاتصال');
    
    const data = await response.json();
    appState.articles = processArticleData(data);
    filterArticles();
    
  } catch (error) {
    console.error('Error:', error);
    showError('تعذر تحميل المقالات. تحقق من اتصال الإنترنت.');
  } finally {
    showLoading(false);
  }
}

function processArticleData(articles) {
  return articles
    .filter(a => a.visible === true || a.visible === "true")
    .sort((a, b) => {
      try {
        const parseDate = (str) => {
          const [date, time] = str.split(' ');
          const [d, m, y] = date.split('/');
          const [h, min] = time ? time.split(':') : [0, 0];
          return new Date(y, m - 1, d, h, min);
        };
        return parseDate(b.date_heure) - parseDate(a.date_heure);
      } catch {
        return 0;
      }
    })
    .slice(0, CONFIG.maxArticles);
}

// ===== FILTRAGE =====
function filterArticles() {
  const query = appState.searchQuery.toLowerCase().trim();
  
  appState.filteredArticles = appState.articles.filter(article => {
    // Filtre texte
    if (query) {
      const searchText = `
        ${article.titre || ''}
        ${article.source || ''}
        ${article.theme || ''}
      `.toLowerCase();
      
      if (!searchText.includes(query)) return false;
    }
    
    // Filtre date
    return isDateInRange(article.date_heure, appState.startDate, appState.endDate);
  });
  
  appState.currentPage = 1;
  displayArticles();
  updateStatsBar();
  updatePagination();
  
  elements.downloadPdfBtn.disabled = appState.filteredArticles.length === 0;
}

// ===== AFFICHAGE DES ARTICLES =====
function displayArticles() {
  elements.articlesContainer.innerHTML = '';
  
  if (appState.filteredArticles.length === 0) {
    showNoResults();
    return;
  }
  
  const currentArticles = getCurrentPageArticles();
  
  currentArticles.forEach((article, index) => {
    const card = createArticleCard(article, index);
    elements.articlesContainer.appendChild(card);
  });
}

function createArticleCard(article, index) {
  const card = document.createElement('div');
  card.className = 'article-card';
  
  const imageUrl = getArticleImageUrl(article);
  const formattedDate = formatDateToDDMMYYYY(article.date_heure);
  const timeAgo = getTimeAgo(article.date_heure);
  const imageElement = createImageElement(imageUrl, article.titre);
  
  card.innerHTML = `
    <div class="article-image-container">
      ${imageElement}
      <div class="metadata-badges">
        <div class="metadata-badge">
          <span>📅</span>
          <span>${timeAgo || formattedDate || 'بدون تاريخ'}</span>
        </div>
        <div class="metadata-badge">
          <span>🏷️</span>
          <span>${(article.theme || 'عام').substring(0, 12)}</span>
        </div>
      </div>
      <div class="title-overlay">
        <h2 class="article-main-title">${truncateTitle(article.titre || 'بدون عنوان', 70)}</h2>
        <div class="article-source">
          <span>📰</span>
          <span>${article.source || 'غير معروف'}</span>
        </div>
      </div>
    </div>
  `;
  
  // Gestion tactile AVEC PRÉVENTION DU SCROLL
  let touchStartTime = 0;
  let touchStartY = 0;
  let isTouchMove = false;
  
  card.addEventListener('touchstart', (e) => {
    if (appState.isScrolling) return;
    
    touchStartTime = Date.now();
    touchStartY = e.touches[0].clientY;
    isTouchMove = false;
    
    card.classList.add('touched');
    e.preventDefault();
  }, { passive: false });
  
  card.addEventListener('touchmove', (e) => {
    if (appState.isScrolling) return;
    
    const touchY = e.touches[0].clientY;
    const diffY = Math.abs(touchY - touchStartY);
    
    if (diffY > 10) {
      isTouchMove = true;
      card.classList.remove('touched');
    }
  }, { passive: true });
  
  card.addEventListener('touchend', (e) => {
    if (appState.isScrolling || isTouchMove) {
      card.classList.remove('touched');
      return;
    }
    
    const touchTime = Date.now() - touchStartTime;
    if (touchTime < 500) {
      card.classList.remove('touched');
      setTimeout(() => openArticleOverlay(article), 50);
    } else {
      card.classList.remove('touched');
    }
    
    e.preventDefault();
  }, { passive: false });
  
  card.addEventListener('touchcancel', () => {
    card.classList.remove('touched');
  });
  
  return card;
}

function truncateTitle(title, maxLength) {
  if (!title || title.length <= maxLength) return title;
  return title.substring(0, maxLength) + '...';
}

// ===== OVERLAY ARTICLE =====
function openArticleOverlay(article) {
  // Mettre à jour les informations
  elements.overlayArticleTitle.textContent = article.titre || 'المقال';
  elements.sourceText.textContent = article.source || 'غير معروف';
  elements.dateText.textContent = formatDateToDDMMYYYY(article.date_heure) || 'غير معروف';
  elements.sentimentText.textContent = article.sentiment || 'غير محدد';
  
  // Mettre à jour le lien
  if (article.url) {
    elements.articleLink.href = article.url;
  }
  
  // Afficher l'overlay
  elements.articleOverlay.style.display = 'block';
  document.body.style.overflow = 'hidden';
}

function closeArticleOverlay() {
  elements.articleOverlay.style.display = 'none';
  document.body.style.overflow = '';
}

// ===== STATS BAR =====
function updateStatsBar() {
  const count = appState.filteredArticles.length;
  const total = appState.articles.length;
  
  elements.resultsCount.textContent = `${count} مقال`;
  elements.statsBar.style.display = 'flex';
}

// ===== STATES =====
function showLoading(show) {
  elements.loadingIndicator.style.display = show ? 'block' : 'none';
}

function showNoResults() {
  elements.articlesContainer.innerHTML = `
    <div class="no-results">
      <div class="no-results-icon">🔍</div>
      <h3>لا توجد نتائج</h3>
      <p>لم يتم العثور على مقالات تطابق بحثك</p>
      <button class="clear-search-btn" onclick="elements.clearFilters.click()">
        مسح البحث
      </button>
    </div>
  `;
  elements.statsBar.style.display = 'none';
  elements.paginationContainer.style.display = 'none';
}

function showError(message) {
  elements.articlesContainer.innerHTML = `
    <div class="error-state">
      <div class="error-icon">⚠️</div>
      <h3>خطأ</h3>
      <p>${message}</p>
      <button class="retry-button" onclick="loadArticles()">
        إعادة المحاولة
      </button>
    </div>
  `;
  elements.statsBar.style.display = 'none';
  elements.paginationContainer.style.display = 'none';
}

// ===== PDF GENERATION =====
async function generatePDF() {
  if (appState.filteredArticles.length === 0) {
    alert('لا توجد مقالات لتحميلها');
    return;
  }
  
  try {
    // Afficher l'indicateur de chargement
    elements.pdfLoading.style.display = 'flex';
    elements.downloadPdfBtn.disabled = true;
    
    // Attendre que l'utilisateur voie l'indicateur
    await new Promise(resolve => setTimeout(resolve, 500));
    
    // Vérifier si html2pdf est disponible
    if (typeof html2pdf === 'undefined') {
      throw new Error('مكتبة PDF غير متاحة');
    }
    
    // Créer le contenu PDF
    const pdfContent = createPdfContent();
    elements.pdfTempContainer.innerHTML = '';
    elements.pdfTempContainer.appendChild(pdfContent);
    
    // Attendre un peu pour le rendu
    await new Promise(resolve => setTimeout(resolve, 300));
    
    // Options PDF
    const options = {
      margin: [10, 10, 10, 10],
      filename: `مراجعة_الصحافة_${new Date().toISOString().split('T')[0]}.pdf`,
      image: { type: 'jpeg', quality: 0.8 },
      html2canvas: { 
        scale: 1,
        useCORS: true,
        logging: false
      },
      jsPDF: { 
        unit: 'mm', 
        format: 'a4', 
        orientation: 'portrait',
        compress: true
      }
    };
    
    // Générer le PDF
    await html2pdf().set(options).from(pdfContent).save();
    
  } catch (error) {
    console.error('PDF Error:', error);
    alert('حدث خطأ أثناء إنشاء ملف PDF. يرجى المحاولة مرة أخرى.');
    
  } finally {
    // Nettoyer
    elements.pdfTempContainer.innerHTML = '';
    elements.pdfLoading.style.display = 'none';
    elements.downloadPdfBtn.disabled = false;
  }
}

function createPdfContent() {
  const container = document.createElement('div');
  container.style.cssText = `
    padding: 15px;
    background: white;
    color: black;
    font-family: 'Tajawal', sans-serif;
    direction: rtl;
    text-align: right;
    font-size: 14px;
  `;
  
  // Titre
  const title = document.createElement('h1');
  title.textContent = 'مراجعة الصحافة الأسبوعية';
  title.style.cssText = 'color: #1a73e8; text-align: center; margin-bottom: 15px; font-size: 20px;';
  container.appendChild(title);
  
  // Informations
  const info = document.createElement('div');
  info.innerHTML = `
    <div style="text-align: center; color: #666; margin-bottom: 20px;">
      عدد المقالات: ${appState.filteredArticles.length}<br>
      التاريخ: ${new Date().toLocaleDateString('ar-EG')}
    </div>
  `;
  container.appendChild(info);
  
  // Articles
  appState.filteredArticles.forEach((article, index) => {
    const articleDiv = document.createElement('div');
    articleDiv.style.cssText = `
      margin-bottom: 15px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      background: #f9f9f9;
    `;
    
    articleDiv.innerHTML = `
      <div style="font-weight: bold; color: #333; margin-bottom: 5px;">
        ${index + 1}. ${article.titre || 'بدون عنوان'}
      </div>
      <div style="color: #666; font-size: 12px; margin-bottom: 3px;">
        المصدر: ${article.source || 'غير معروف'}
      </div>
      <div style="color: #666; font-size: 12px; margin-bottom: 3px;">
        التاريخ: ${formatDateToDDMMYYYY(article.date_heure) || 'غير معروف'}
      </div>
      ${article.theme ? `<div style="color: #888; font-size: 11px;">التصنيف: ${article.theme}</div>` : ''}
    `;
    
    container.appendChild(articleDiv);
  });
  
  // Footer
  const footer = document.createElement('div');
  footer.style.cssText = 'text-align: center; margin-top: 20px; color: #888; font-size: 12px;';
  footer.textContent = 'تم الإنشاء بواسطة تطبيق مراجعة الصحافة';
  container.appendChild(footer);
  
  return container;
}

// ===== DÉMARRAGE =====
// Charger html2pdf dynamiquement
function loadPdfLibrary() {
  return new Promise((resolve, reject) => {
    if (typeof html2pdf !== 'undefined') {
      resolve();
      return;
    }
    
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
    script.onload = resolve;
    script.onerror = reject;
    document.head.appendChild(script);
  });
}

// Initialiser l'application
document.addEventListener('DOMContentLoaded', async () => {
  // Précharger la bibliothèque PDF
  try {
    await loadPdfLibrary();
  } catch (error) {
    console.warn('PDF library failed to load:', error);
  }
  
  // Démarrer l'application
  setTimeout(() => {
    initApp();
  }, 100);
});

// Prévenir les comportements indésirables
document.addEventListener('touchstart', function(e) {
  // Empêcher les clics multiples rapides
  if (e.timeStamp - (window.lastTouchTime || 0) < 300) {
    e.preventDefault();
  }
  window.lastTouchTime = e.timeStamp;
}, { passive: false });

// Gestion de la mémoire
window.addEventListener('beforeunload', function() {
  // Nettoyer les références
  appState.articles = [];
  appState.filteredArticles = [];
});
</script>
