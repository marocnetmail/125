<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<meta name="theme-color" content="#001122">
<meta name="description" content="مراجعة الصحافة الأسبوعية">
<meta name="format-detection" content="telephone=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>مراجعة الصحافة الأسبوعية</title>
<link rel="icon" type="image/png" href="images1/00011.png">
<!-- Bibliothèque html2pdf pour générer des PDFs avec support arabe -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<!-- Police arabe optimisée pour mobile -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Naskh+Arabic:wght@400;700&family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">
<style>
/* ===== CSS RESET & VARIABLES ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  -webkit-text-size-adjust: 100%;
  -ms-text-size-adjust: 100%;
  text-size-adjust: 100%;
}
:root {
  --primary: #1a73e8;
  --primary-dark: #0d5cb6;
  --background: #001122;
  --card-bg: #001a44;
  --text: #ffffff;
  --text-secondary: #cccccc;
  --accent-1: #FF6B6B;
  --accent-2: #4ECDC4;
  --accent-3: #FFD166;
  --shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
  --radius: 8px;
  --radius-sm: 6px;
  --radius-lg: 12px;
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
  --safe-left: env(safe-area-inset-left);
  --safe-right: env(safe-area-inset-right);
}
/* ===== BASE STYLES MOBILE OPTIMIZED ===== */
html {
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
  height: 100%;
}
body {
  font-family: 'Tajawal', 'Amiri', 'Noto Naskh Arabic', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: var(--background);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  height: 100%;
  width: 100%;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
  padding-left: var(--safe-left);
  padding-right: var(--safe-right);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  font-size: 16px;
}
/* ===== COMPACT HEADER MOBILE ===== */
.app-header {
  background: linear-gradient(135deg, #001122 0%, #002244 100%);
  padding: 12px;
  padding-top: calc(12px + var(--safe-top));
  box-shadow: var(--shadow);
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.title-search-container {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 100%;
}
.main-title {
  font-size: clamp(1.5rem, 5vw, 1.8rem);
  font-weight: 900;
  color: white;
  line-height: 1.2;
  text-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
  text-align: center;
  letter-spacing: -0.5px;
  font-family: 'Tajawal', 'Amiri', 'Noto Naskh Arabic', sans-serif;
  word-wrap: break-word;
  overflow-wrap: break-word;
}
/* ===== FILTERS CONTAINER MOBILE ===== */
.filters-container {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 10px;
  width: 100%;
}
/* ===== SEARCH BAR MOBILE ===== */
.search-container {
  width: 100%;
  touch-action: manipulation;
}
.search-wrapper {
  position: relative;
  display: flex;
  align-items: center;
  background: rgba(255, 255, 255, 0.1);
  border-radius: var(--radius);
  padding: 4px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  transition: var(--transition);
  min-height: 48px;
}
.search-wrapper:focus-within {
  border-color: var(--primary);
  background: rgba(255, 255, 255, 0.15);
  box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.2);
}
.search-icon {
  padding: 0 12px;
  color: var(--text-secondary);
  font-size: 1.1rem;
  display: flex;
  align-items: center;
  flex-shrink: 0;
  pointer-events: none;
}
#search-input {
  flex: 1;
  padding: 12px 8px 12px 0;
  background: transparent;
  border: none;
  color: var(--text);
  font-size: 16px;
  outline: none;
  font-family: inherit;
  min-width: 0;
  text-align: right;
  direction: rtl;
  line-height: 1.5;
}
#search-input::placeholder {
  color: rgba(255, 255, 255, 0.5);
  text-align: right;
  font-size: 15px;
}
.clear-search {
  padding: 0 12px;
  color: var(--text-secondary);
  font-size: 1.2rem;
  cursor: pointer;
  display: none;
  transition: var(--transition);
  background: none;
  border: none;
  flex-shrink: 0;
  min-width: 44px;
  min-height: 44px;
  align-items: center;
  justify-content: center;
  touch-action: manipulation;
}
.clear-search:hover, .clear-search:active {
  color: var(--text);
  transform: scale(1.1);
}
/* ===== DATE FILTERS MOBILE ===== */
.date-filters {
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: stretch;
}
.date-group {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
}
.date-label {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--accent-3);
  white-space: nowrap;
  min-width: 50px;
  flex-shrink: 0;
}
.date-input-wrapper {
  flex: 1;
  position: relative;
  background: rgba(255, 255, 255, 0.1);
  border-radius: var(--radius);
  border: 1px solid rgba(255, 255, 255, 0.2);
  overflow: hidden;
  transition: var(--transition);
}
.date-input-wrapper:focus-within {
  border-color: var(--primary);
  background: rgba(255, 255, 255, 0.15);
}
.date-input {
  width: 100%;
  padding: 10px 12px;
  background: transparent;
  border: none;
  color: var(--text);
  font-size: 16px;
  outline: none;
  font-family: inherit;
  min-height: 48px;
  text-align: right;
  direction: rtl;
  -webkit-appearance: none;
  appearance: none;
}
.date-input::-webkit-calendar-picker-indicator {
  filter: invert(1);
  opacity: 0.7;
  cursor: pointer;
  padding: 4px;
  width: 24px;
  height: 24px;
}
.date-separator {
  display: none;
}
/* ===== PRÉDÉFINIS DE PÉRIODE MOBILE ===== */
.period-presets {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 10px;
  justify-content: center;
  width: 100%;
}
.preset-btn {
  background: rgba(255, 255, 255, 0.1);
  color: var(--text);
  border: 1px solid rgba(255, 255, 255, 0.2);
  padding: 12px 16px;
  border-radius: var(--radius);
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  min-width: 100px;
  text-align: center;
  flex: 1;
  max-width: 120px;
  font-family: 'Tajawal', 'Amiri', 'Noto Naskh Arabic', sans-serif;
  touch-action: manipulation;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
  min-height: 48px;
}
.preset-btn:hover, .preset-btn:active {
  background: rgba(255, 255, 255, 0.2);
  border-color: var(--primary);
  transform: translateY(-1px);
}
.preset-btn.active {
  background: var(--primary);
  border-color: var(--primary);
  color: white;
  box-shadow: 0 0 10px rgba(26, 115, 232, 0.4);
}
/* ===== BOUTONS D'ACTION MOBILE ===== */
.action-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 10px;
  justify-content: center;
  width: 100%;
}
.clear-filters-btn, .download-pdf-btn {
  color: white;
  border: none;
  padding: 12px 20px;
  border-radius: var(--radius);
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  flex-shrink: 1;
  min-width: 120px;
  min-height: 48px;
  font-family: 'Tajawal', 'Amiri', 'Noto Naskh Arabic', sans-serif;
  touch-action: manipulation;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
  letter-spacing: 0.5px;
}
.clear-filters-btn {
  background: linear-gradient(135deg, var(--accent-1), #ff5252);
}
.clear-filters-btn:hover, .clear-filters-btn:active {
  background: linear-gradient(135deg, #ff5252, #ff4444);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
}
.download-pdf-btn {
  background: linear-gradient(135deg, #4CAF50, #2E7D32);
}
.download-pdf-btn:hover, .download-pdf-btn:active {
  background: linear-gradient(135deg, #2E7D32, #1B5E20);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(76, 175, 80, 0.4);
}
.download-pdf-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none !important;
  filter: grayscale(0.5);
}
/* ===== LOADING STATE ===== */
#loading-indicator {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-secondary);
  font-family: 'Tajawal', 'Amiri', 'Noto Naskh Arabic', sans-serif;
}
.loading-spinner {
  width: 40px;
  height: 40px;
  border: 3px solid rgba(255, 255, 255, 0.1);
  border-top-color: var(--primary);
  border-radius: 50%;
  margin: 0 auto 15px;
  animation: spin 1s linear infinite;
  will-change: transform;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
/* ===== ARTICLES CONTAINER ===== */
#articles-container {
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  min-height: 200px;
  max-width: 800px;
  margin: 0 auto;
  width: 100%;
}
/* ===== ARTICLE CARD MOBILE ===== */
.article-card {
  background: var(--card-bg);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  cursor: pointer;
  border: 1px solid rgba(255, 255, 255, 0.05);
  display: flex;
  flex-direction: column;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeInUp 0.5s ease forwards;
  height: 100%;
  position: relative;
  margin-bottom: 5px;
  width: 100%;
  will-change: transform, opacity;
}
@keyframes fadeInUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
.article-card:active {
  transform: scale(0.98);
}
/* Article Image Section Mobile */
.article-image-container {
  position: relative;
  width: 100%;
  height: 220px;
  background: linear-gradient(45deg, #000428, #004e92);
  overflow: hidden;
  flex-shrink: 0;
}
.article-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.6s ease;
  background: linear-gradient(45deg, #000428, #004e92);
  display: block;
}
/* ===== TITLE OVERLAY MOBILE ===== */
.title-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  padding: 20px 15px 15px;
  background: linear-gradient(to top,
    rgba(0, 0, 0, 0.95) 0%,
    rgba(0, 0, 0, 0.85) 40%,
    rgba(0, 0, 0, 0.6) 70%,
    transparent 100%);
  z-index: 2;
}
/* TITRE PRINCIPAL MOBILE */
.article-main-title {
  font-size: clamp(1.3rem, 4.5vw, 1.6rem);
  font-weight: 900;
  line-height: 1.3;
  color: #FFFFFF;
  margin-bottom: 8px;
  text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8),
    0 4px 8px rgba(0, 0, 0, 0.6);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  letter-spacing: -0.3px;
  font-family: 'Tajawal', 'Amiri', 'Noto Naskh Arabic', sans-serif;
  text-align: right;
  word-wrap: break-word;
  overflow-wrap: break-word;
}
/* Source Mobile */
.article-source {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--accent-2);
  display: flex;
  align-items: center;
  gap: 6px;
  opacity: 0.95;
  text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
  text-align: right;
  font-family: 'Tajawal', 'Amiri', 'Noto Naskh Arabic', sans-serif;
}
/* ===== METADATA BADGES MOBILE ===== */
.metadata-badges {
  position: absolute;
  top: 12px;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 0 12px;
  z-index: 3;
  gap: 8px;
  pointer-events: none;
}
.metadata-badge {
  padding: 6px 10px;
  font-size: 0.8rem;
  font-weight: 700;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
  display: flex;
  align-items: center;
  gap: 4px;
  transition: transform 0.2s;
  flex-shrink: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  border: 1px solid rgba(255, 255, 255, 0.2);
  font-family: 'Tajawal', 'Amiri', 'Noto Naskh Arabic', sans-serif;
  max-width: 48%;
  pointer-events: auto;
}
.date-badge {
  background: rgba(255, 107, 107, 0.92);
  color: white;
}
.category-badge {
  background: rgba(78, 205, 196, 0.92);
  color: white;
}
.category-badge.ltr {
  text-align: left;
  justify-content: flex-start;
  padding-right: 10px;
}
.category-badge.rtl {
  text-align: right;
  justify-content: flex-end;
  padding-left: 10px;
}
/* ===== LOGO DES MÉDIAS MOBILE ===== */
.media-logo-container {
  position: absolute;
  bottom: 12px;
  left: 12px;
  z-index: 4;
  width: 55px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
  overflow: hidden;
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
}
.media-logo {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.6));
  transition: var(--transition);
  opacity: 0.9;
}
/* ===== TEMPS ÉCOULÉ MOBILE ===== */
.time-ago {
  position: absolute;
  top: 60px;
  right: 12px;
  padding: 5px 10px;
  background: rgba(0, 0, 0, 0.75);
  color: rgba(255, 255, 255, 0.9);
  font-size: 0.75rem;
  font-weight: 600;
  border-radius: 12px;
  z-index: 2;
  backdrop-filter: blur(5px);
  -webkit-backdrop-filter: blur(5px);
  border: 1px solid rgba(255, 255, 255, 0.15);
  font-family: 'Tajawal', 'Amiri', 'Noto Naskh Arabic', sans-serif;
}
/* ===== PAGINATION MOBILE ===== */
.pagination-container {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px 12px;
  gap: 8px;
  margin-top: 20px;
  flex-wrap: wrap;
}
.pagination-btn {
  background: rgba(255, 255, 255, 0.1);
  color: var(--text);
  border: 1px solid rgba(255, 255, 255, 0.2);
  padding: 10px 14px;
  border-radius: var(--radius);
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  min-width: 44px;
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  touch-action: manipulation;
  font-family: 'Tajawal', 'Amiri', 'Noto Naskh Arabic', sans-serif;
}
.pagination-btn:hover:not(:disabled), .pagination-btn:active:not(:disabled) {
  background: rgba(255, 255, 255, 0.2);
  border-color: var(--primary);
  transform: translateY(-1px);
}
.pagination-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
  transform: none !important;
}
.pagination-numbers {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
}
.pagination-number {
  background: rgba(255, 255, 255, 0.1);
  color: var(--text);
  border: 1px solid rgba(255, 255, 255, 0.2);
  width: 40px;
  height: 40px;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  touch-action: manipulation;
  font-family: 'Tajawal', 'Amiri', 'Noto Naskh Arabic', sans-serif;
}
.pagination-number:hover:not(.active), .pagination-number:active:not(.active) {
  background: rgba(255, 255, 255, 0.2);
  border-color: var(--primary);
}
.pagination-number.active {
  background: var(--primary);
  border-color: var(--primary);
  color: white;
  box-shadow: 0 0 10px rgba(26, 115, 232, 0.4);
}
.pagination-info {
  font-size: 0.85rem;
  color: var(--text-secondary);
  margin: 0 5px;
  font-family: 'Tajawal', 'Amiri', 'Noto Naskh Arabic', sans-serif;
  width: 100%;
  text-align: center;
  margin-top: 10px;
}
/* ===== ARTICLE OVERLAY MOBILE ===== */
#article-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  height: -webkit-fill-available;
  background: rgba(0, 0, 0, 0.98);
  z-index: 1000;
  animation: fadeIn 0.3s ease;
  overflow: hidden;
}
.overlay-container {
  width: 100%;
  height: 100%;
  max-height: 100vh;
  max-height: -webkit-fill-available;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}
/* ===== OVERLAY HEADER MOBILE ===== */
.overlay-header-extended {
  padding: 12px;
  padding-top: calc(12px + var(--safe-top));
  background: rgba(0, 26, 68, 0.95);
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  display: flex;
  flex-direction: column;
  gap: 10px;
  position: relative;
  z-index: 2;
  flex-shrink: 0;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.overlay-header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  width: 100%;
  gap: 12px;
}
.overlay-title {
  font-size: clamp(1.2rem, 4vw, 1.5rem);
  font-weight: 900;
  color: #FFFFFF;
  flex: 1;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
  min-width: 0;
  text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
  font-family: 'Tajawal', 'Amiri', 'Noto Naskh Arabic', sans-serif;
  text-align: right;
  word-wrap: break-word;
  overflow-wrap: break-word;
}
.close-overlay {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--accent-1);
  border: none;
  color: white;
  font-size: 1.8rem;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: var(--transition);
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
  position: relative;
  z-index: 10;
  touch-action: manipulation;
}
.close-overlay:hover, .close-overlay:active {
  background: #ff4444;
  transform: rotate(90deg) scale(1.05);
}
/* ===== SENTIMENT ET MOTS-CLÉS MOBILE ===== */
.overlay-details {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.sentiment-display-overlay {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  border-radius: 20px;
  font-weight: 700;
  font-size: 0.85rem;
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(5px);
  -webkit-backdrop-filter: blur(5px);
  border: 1px solid rgba(255, 255, 255, 0.2);
  width: fit-content;
  font-family: 'Tajawal', 'Amiri', 'Noto Naskh Arabic', sans-serif;
}
.sentiment-positive {
  color: #4CAF50;
  border-color: rgba(76, 175, 80, 0.4);
  background: rgba(76, 175, 80, 0.1);
}
.sentiment-negative {
  color: #FF6B6B;
  border-color: rgba(255, 107, 107, 0.4);
  background: rgba(255, 107, 107, 0.1);
}
.sentiment-neutral {
  color: #FFD166;
  border-color: rgba(255, 209, 102, 0.4);
  background: rgba(255, 209, 102, 0.1);
}
.keywords-container-overlay {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  max-height: 80px;
  overflow-y: auto;
}
.keyword-overlay {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  font-size: 0.8rem;
  padding: 5px 10px;
  border-radius: 14px;
  font-weight: 600;
  border: 1px solid rgba(255, 255, 255, 0.2);
  white-space: nowrap;
  font-family: 'Tajawal', 'Amiri', 'Noto Naskh Arabic', sans-serif;
}
/* ===== CONTENU ARTICLE MOBILE ===== */
.overlay-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  position: relative;
  min-height: 0;
  overflow: hidden;
}
.article-frame-container {
  flex: 1;
  position: relative;
  background: white;
  min-height: 0;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
}
#article-frame {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}
/* ===== NO RESULTS & ERROR MOBILE ===== */
.no-results, .error-state {
  text-align: center;
  padding: 50px 20px;
  color: var(--text-secondary);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 300px;
  font-family: 'Tajawal', 'Amiri', 'Noto Naskh Arabic', sans-serif;
}
.no-results-icon, .error-icon {
  font-size: 3.5rem;
  margin-bottom: 20px;
  opacity: 0.6;
}
.clear-search-btn, .retry-button {
  background: var(--primary);
  color: white;
  border: none;
  padding: 14px 28px;
  border-radius: 25px;
  cursor: pointer;
  margin-top: 25px;
  font-family: inherit;
  transition: var(--transition);
  font-size: 1rem;
  font-weight: 600;
  min-height: 52px;
  min-width: 160px;
  touch-action: manipulation;
  font-family: 'Tajawal', 'Amiri', 'Noto Naskh Arabic', sans-serif;
}
.clear-search-btn:hover, .clear-search-btn:active,
.retry-button:hover, .retry-button:active {
  background: var(--primary-dark);
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(26, 115, 232, 0.4);
}
/* ===== ANIMATIONS ===== */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
/* ===== SCROLL TO TOP MOBILE ===== */
.scroll-top {
  position: fixed;
  bottom: calc(20px + var(--safe-bottom));
  right: calc(20px + var(--safe-right));
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: var(--primary);
  color: white;
  border: none;
  font-size: 1.4rem;
  line-height: 1;
  cursor: pointer;
  display: none;
  z-index: 99;
  transition: var(--transition);
  box-shadow: var(--shadow);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.2);
  touch-action: manipulation;
  display: flex;
  align-items: center;
  justify-content: center;
}
.scroll-top:hover, .scroll-top:active {
  background: var(--primary-dark);
  transform: translateY(-3px) scale(1.1);
  box-shadow: 0 6px 16px rgba(0, 0, 0, 0.4);
}
/* ===== IMAGE ERROR STATE ===== */
.image-error {
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255, 255, 255, 0.7);
  font-size: 0.9rem;
  height: 100%;
  text-align: center;
  padding: 20px;
  background: linear-gradient(45deg, #000428, #004e92);
  font-family: 'Tajawal', 'Amiri', 'Noto Naskh Arabic', sans-serif;
}
/* ===== STATS BAR MOBILE ===== */
.stats-bar {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  padding: 12px;
  background: rgba(0, 26, 68, 0.6);
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  font-size: 0.85rem;
  color: var(--text-secondary);
  gap: 10px;
  max-width: 800px;
  margin: 0 auto;
  width: 100%;
  font-family: 'Tajawal', 'Amiri', 'Noto Naskh Arabic', sans-serif;
}
.results-count {
  font-weight: 700;
  color: var(--accent-2);
  font-size: 1rem;
  text-align: center;
}
.active-filters {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
}
.filter-tag {
  background: rgba(255, 255, 255, 0.15);
  padding: 6px 12px;
  border-radius: 15px;
  font-size: 0.8rem;
  display: flex;
  align-items: center;
  gap: 6px;
  border: 1px solid rgba(255, 255, 255, 0.1);
}
.filter-tag .remove-filter {
  background: none;
  border: none;
  color: var(--accent-1);
  cursor: pointer;
  font-size: 1.1rem;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  min-width: 24px;
  min-height: 24px;
  touch-action: manipulation;
}
/* ===== STYLES SPÉCIFIQUES POUR PDF ===== */
.pdf-container {
  font-family: 'Tajawal', 'Amiri', 'Noto Naskh Arabic', sans-serif;
  direction: rtl;
  text-align: right;
  padding: 20px;
  background: white;
  color: black;
  max-width: 800px;
  margin: 0 auto;
  display: block !important;
  position: relative !important;
  overflow: visible !important;
}
.pdf-header {
  text-align: center;
  margin-bottom: 30px;
  border-bottom: 2px solid #1a73e8;
  padding-bottom: 20px;
}
.pdf-title {
  font-size: 28px;
  font-weight: bold;
  color: #1a73e8;
  margin-bottom: 10px;
}
.pdf-subtitle {
  font-size: 16px;
  color: #666;
  margin-bottom: 10px;
}
.pdf-date-range {
  font-size: 14px;
  color: #888;
}
.pdf-article {
  margin-bottom: 25px;
  page-break-inside: avoid;
  border: 1px solid #ddd;
  border-radius: 8px;
  padding: 15px;
  background: #f9f9f9;
  overflow: hidden;
}
.pdf-article-title {
  font-size: 18px;
  font-weight: bold;
  color: #333;
  margin-bottom: 10px;
  line-height: 1.4;
}
.pdf-article-meta {
  font-size: 14px;
  color: #666;
  margin-bottom: 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
}
.pdf-article-image {
  max-width: 100%;
  height: auto;
  margin: 10px 0;
  border-radius: 4px;
  display: block;
}
.pdf-article-content {
  font-size: 14px;
  line-height: 1.6;
  color: #444;
  margin-top: 10px;
}
.pdf-keywords {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}
.pdf-keyword {
  background: #1a73e8;
  color: white;
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 12px;
}
.pdf-footer {
  text-align: center;
  margin-top: 30px;
  padding-top: 20px;
  border-top: 1px solid #ddd;
  font-size: 12px;
  color: #888;
}
#pdf-temp-container {
  position: absolute;
  left: -9999px;
  top: 0;
  width: 210mm;
  min-height: 297mm;
  background: white;
  z-index: -1;
  opacity: 0;
  pointer-events: none;
}
/* ===== RESPONSIVE BREAKPOINTS OPTIMISÉS ===== */
/* VERY SMALL PHONES (≤ 360px) */
@media (max-width: 360px) {
  .main-title {
    font-size: 1.4rem;
  }
  .article-main-title {
    font-size: 1.2rem;
    -webkit-line-clamp: 3;
  }
  .metadata-badge {
    font-size: 0.7rem;
    padding: 4px 8px;
  }
  .preset-btn {
    min-width: 80px;
    padding: 10px 12px;
    font-size: 0.8rem;
  }
}
/* SMALL PHONES (361px - 480px) */
@media (min-width: 361px) and (max-width: 480px) {
  .main-title {
    font-size: 1.6rem;
  }
  .article-main-title {
    font-size: 1.4rem;
  }
  .article-image-container {
    height: 240px;
  }
}
/* MEDIUM PHONES / LARGE PHONES (481px - 768px) */
@media (min-width: 481px) and (max-width: 768px) {
  .date-filters {
    flex-direction: row;
    flex-wrap: wrap;
  }
  .date-group {
    flex: 1;
    min-width: 140px;
  }
  .date-separator {
    display: block;
    color: var(--accent-2);
    font-weight: bold;
    font-size: 1.2rem;
  }
  .article-image-container {
    height: 280px;
  }
  .stats-bar {
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
  }
  .pagination-info {
    width: auto;
    margin-top: 0;
  }
}
/* TABLET & SMALL DESKTOP (769px - 1024px) */
@media (min-width: 769px) {
  .app-header {
    padding: 15px 20px;
    padding-top: calc(15px + var(--safe-top));
  }
  .main-title {
    font-size: 2rem;
  }
  .filters-container {
    flex-direction: row;
    align-items: center;
  }
  .search-container {
    flex: 1;
  }
  .date-filters {
    flex: 2;
    flex-direction: row;
  }
  .date-separator {
    display: block;
    color: var(--accent-2);
    font-weight: bold;
  }
  .article-image-container {
    height: 300px;
  }
  .article-main-title {
    font-size: 1.9rem;
  }
  .stats-bar {
    flex-direction: row;
    justify-content: space-between;
    padding: 12px 20px;
  }
  .pagination-info {
    width: auto;
    margin-top: 0;
  }
  .overlay-container {
    max-width: 1000px;
    margin: 0 auto;
    height: 95vh;
    margin-top: 2.5vh;
    border-radius: var(--radius-lg);
  }
}
/* LARGE DESKTOP (≥ 1025px) */
@media (min-width: 1025px) {
  .article-main-title {
    font-size: 2.1rem;
  }
  #articles-container {
    gap: 20px;
  }
}
/* LANDSCAPE ORIENTATION MOBILE */
@media (max-height: 500px) and (orientation: landscape) {
  .app-header {
    position: relative;
  }
  .article-image-container {
    height: 180px;
  }
  .overlay-header-extended {
    padding: 8px 12px;
    gap: 8px;
  }
  .keywords-container-overlay {
    max-height: 60px;
  }
}
/* TOUCH DEVICE OPTIMIZATIONS */
@media (hover: none) and (pointer: coarse) {
  .article-card:hover {
    transform: none;
  }
  .article-card:active {
    transform: scale(0.98);
  }
  .clear-filters-btn:active, .download-pdf-btn:active,
  .clear-search-btn:active, .retry-button:active,
  .scroll-top:active, .pagination-btn:active,
  .preset-btn:active, .pagination-number:active {
    transform: scale(0.95);
    opacity: 0.9;
  }
  .search-wrapper:active, .date-input-wrapper:active {
    background: rgba(255, 255, 255, 0.2);
  }
  /* Suppression du délai tactil sur certains navigateurs */
  a, button, .article-card, .pagination-btn, .preset-btn {
    touch-action: manipulation;
    -webkit-tap-highlight-color: rgba(0,0,0,0);
  }
}
/* DARK MODE SUPPORT */
@media (prefers-color-scheme: dark) {
  :root {
    --background: #000c18;
    --card-bg: #001428;
  }
  .article-image-container {
    background: linear-gradient(45deg, #000214, #003366);
  }
}
/* REDUCED MOTION ACCESSIBILITY */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
  .article-card {
    animation: none;
    opacity: 1;
    transform: none;
  }
  .loading-spinner {
    animation: none;
    border-top-color: transparent;
    opacity: 0.5;
  }
}
/* HIGH CONTRAST MODE */
@media (prefers-contrast: high) {
  :root {
    --primary: #0057d9;
    --accent-1: #ff3333;
    --accent-2: #00a3a3;
  }
  .search-wrapper, .date-input-wrapper {
    border-width: 2px;
  }
  .article-main-title {
    color: #FFFFFF;
    text-shadow: 0 2px 4px #000000;
  }
  .metadata-badge {
    border-width: 2px;
  }
}
/* PRINT STYLES */
@media print {
  .app-header, .filters-container, .period-presets,
  .action-buttons, .scroll-top, .close-overlay,
  .pagination-container, .stats-bar {
    display: none !important;
  }
  body {
    background: white !important;
    color: black !important;
    padding: 0;
  }
  #articles-container {
    display: block;
    padding: 0;
  }
  .article-card {
    break-inside: avoid;
    margin-bottom: 20px;
    box-shadow: none;
    border: 1px solid #ccc;
    page-break-inside: avoid;
  }
  .article-image-container {
    height: 200px;
  }
  .media-logo-container {
    display: none !important;
  }
}
/* IOS SAFARI SPECIFIC FIXES */
@supports (-webkit-touch-callout: none) {
  body {
    min-height: -webkit-fill-available;
  }
  .date-input {
    font-size: 16px; /* Empêche le zoom sur iOS */
  }
  #search-input {
    font-size: 16px;
  }
  .overlay-container {
    height: -webkit-fill-available;
  }
}
</style>
</head>
<body>

        <div class="date-group">

          <div class="date-input-wrapper">

  <div class="results-count" id="results-count">0 مقال</div>
  <div class="active-filters" id="active-filters">
  </div>
</div>

          <span id="sentiment-value">جار التحميل...</span>

<script>
// ===== VARIABLE GLOBALE POUR LES LOGOS =====
let mediaLogos = [];
// ===== APP CONFIGURATION =====
const CONFIG = {
  jsonUrl: 'data/datajson.json?t=' + Date.now(),
  logosUrl: 'data/logo_media.json?t=' + Date.now(),
  maxArticles: 1000,
  imagesBasePath: 'images3/',
  debounceDelay: 300,
  touchDelay: 100,
  articlesPerPage: 10
};
// ===== TOUCH DETECTION =====
const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
// ===== APP STATE =====
let appState = {
  articles: [],
  filteredArticles: [],
  searchQuery: '',
  startDate: null,
  endDate: null,
  isLoading: true,
  lastTouchTime: 0,
  currentPage: 1,
  activePeriod: 'week'
};
const elements = {
  searchInput: document.getElementById('search-input'),
  clearSearch: document.getElementById('clear-search'),
  startDate: document.getElementById('start-date'),
  endDate: document.getElementById('end-date'),
  clearFilters: document.getElementById('clear-filters'),
  articlesContainer: document.getElementById('articles-container'),
  articleOverlay: document.getElementById('article-overlay'),
  closeOverlay: document.getElementById('close-overlay'),
  articleFrame: document.getElementById('article-frame'),
  overlayArticleTitle: document.getElementById('overlay-article-title'),
  sentimentDisplayOverlay: document.getElementById('sentiment-display-overlay'),
  sentimentValue: document.getElementById('sentiment-value'),
  keywordsContainerOverlay: document.getElementById('keywords-container-overlay'),
  loadingIndicator: document.getElementById('loading-indicator'),
  scrollTop: document.getElementById('scroll-top'),
  statsBar: document.getElementById('stats-bar'),
  resultsCount: document.getElementById('results-count'),
  activeFilters: document.getElementById('active-filters'),
  paginationContainer: document.getElementById('pagination-container'),
  firstBtn: document.getElementById('first-btn'),
  prevBtn: document.getElementById('prev-btn'),
  nextBtn: document.getElementById('next-btn'),
  lastBtn: document.getElementById('last-btn'),
  paginationNumbers: document.getElementById('pagination-numbers'),
  paginationInfo: document.getElementById('pagination-info'),
  periodPresets: document.querySelectorAll('.preset-btn'),
  downloadPdfBtn: document.getElementById('download-pdf-btn'),
  pdfTempContainer: document.getElementById('pdf-temp-container')
};
async function initApp() {
  setupEventListeners();
  await loadMediaLogos();
  setupPeriodPresets();
  loadArticles();
  setupMobileOptimizations();
}
function setupMobileOptimizations() {
  // Empêcher le rebond sur iOS
  document.body.addEventListener('touchmove', function(e) {
    if (e.target.closest('#article-overlay')) return;
    if (window.scrollY <= 0 && e.touches[0].clientY > 0) {
      e.preventDefault();
    }
  }, { passive: false });
  
  // Gestion du viewport dynamique sur mobile
  let vh = window.innerHeight * 0.01;
  document.documentElement.style.setProperty('--vh', `${vh}px`);
  
  window.addEventListener('resize', () => {
    let vh = window.innerHeight * 0.01;
    document.documentElement.style.setProperty('--vh', `${vh}px`);
  });
  
  // Corriger le problème de "sticky hover" sur mobile
  if (isTouchDevice) {
    document.body.addEventListener('touchstart', function(){}, {passive: true});
  }
}
async function loadMediaLogos() {
  try {
    const response = await fetch(CONFIG.logosUrl);
    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
    mediaLogos = await response.json();
    console.log('Logos des médias chargés:', mediaLogos.length, 'logos');
  } catch (error) {
    console.error('Erreur de chargement des logos:', error);
    mediaLogos = [];
  }
}
function setupPeriodPresets() {
  setPeriod('week');

  elements.periodPresets.forEach(btn => {
    btn.addEventListener('click', function() {
      const period = this.getAttribute('data-period');
      setPeriod(period);
    });
  });
}
function setPeriod(period) {
  const today = new Date();
  const startDate = new Date();

  elements.endDate.value = today.toISOString().split('T')[0];

  switch(period) {
    case 'week':
      startDate.setDate(today.getDate() - 7);
      elements.startDate.value = startDate.toISOString().split('T')[0];
      break;
    
    case 'biweekly':
      startDate.setDate(today.getDate() - 15);
      elements.startDate.value = startDate.toISOString().split('T')[0];
      break;
    
    case 'month':
      startDate.setDate(today.getDate() - 30);
      elements.startDate.value = startDate.toISOString().split('T')[0];
      break;
  }

  appState.startDate = elements.startDate.value;
  appState.endDate = elements.endDate.value;
  appState.activePeriod = period;
  appState.currentPage = 1;

  elements.periodPresets.forEach(btn => {
    if (btn.getAttribute('data-period') === period) {
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }
  });

  filterArticles();
}
function setupEventListeners() {
  // Optimisation pour les événements tactiles sur mobile
  let touchStartY = 0;

// ===== DATE HELPER FUNCTIONS =====
function parseArticleDate(dateString) {
  if (!dateString) return null;

  try {
    const [datePart, timePart] = dateString.split(' ');
    const [day, month, year] = datePart.split('/');
   
    if (!day || !month || !year) return null;
   
    return new Date(year, month - 1, day);
  } catch (e) {
    console.warn('Error parsing date:', dateString, e);
    return null;
  }
}
function formatDateToDDMMYYYY(dateString) {
  if (!dateString) return '';

  try {
    const [datePart, timePart] = dateString.split(' ');
    const [day, month, year] = datePart.split('/');
   
    const paddedDay = day.padStart(2, '0');
    const paddedMonth = month.padStart(2, '0');
   
    return `${paddedDay}/${paddedMonth}/${year}`;
  } catch (e) {
    console.warn('Error formatting date:', dateString, e);
    return dateString || '';
  }
}
function getTimeAgo(dateString) {
  if (!dateString) return '';

  try {
    const [datePart, timePart] = dateString.split(' ');
    const [day, month, year] = datePart.split('/');
    const [hours, minutes] = timePart ? timePart.split(':') : [0, 0];
   
    const articleDate = new Date(year, month - 1, day, hours, minutes);
    const now = new Date();
    const diffMs = now - articleDate;
   
    const diffMins = Math.floor(diffMs / (1000 * 60));
    const diffHours = Math.floor(diffMs / (1000 * 60 * 60));
    const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
   
    if (diffMins < 1) {
      return `الآن`;
    } else if (diffMins < 60) {
      return `منذ ${diffMins} دقيقة`;
    } else if (diffHours < 24) {
      return `منذ ${diffHours} ساعة`;
    } else if (diffDays === 1) {
      return `منذ يوم`;
    } else if (diffDays < 7) {
      return `منذ ${diffDays} أيام`;
    } else if (diffDays < 30) {
      const weeks = Math.floor(diffDays / 7);
      return `منذ ${weeks} أسبوع`;
    } else {
      const formattedDate = formatDateToDDMMYYYY(dateString);
      return formattedDate;
    }
  } catch (e) {
    return '';
  }
}
function isDateInRange(articleDate, startDate, endDate) {
  if (!articleDate) return false;

  const articleDateObj = parseArticleDate(articleDate);
  if (!articleDateObj) return false;

  if (!startDate && !endDate) return true;

  const start = startDate ? new Date(startDate) : null;
  const end = endDate ? new Date(endDate) : null;

  if (start) start.setHours(0, 0, 0, 0);
  if (end) end.setHours(23, 59, 59, 999);

  if (start && articleDateObj < start) return false;
  if (end && articleDateObj > end) return false;

  return true;
}
// ===== PAGINATION FUNCTIONS =====
function getTotalPages() {
  return Math.ceil(appState.filteredArticles.length / CONFIG.articlesPerPage);
}
function getCurrentPageArticles() {
  const startIndex = (appState.currentPage - 1) * CONFIG.articlesPerPage;
  const endIndex = startIndex + CONFIG.articlesPerPage;
  return appState.filteredArticles.slice(startIndex, endIndex);
}
function goToPage(page) {
  const totalPages = getTotalPages();

  if (page < 1 || page > totalPages) return;

  appState.currentPage = page;
  displayArticles();
  updatePagination();

  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function updatePagination() {
  const totalPages = getTotalPages();
  const currentPage = appState.currentPage;

  if (totalPages <= 1) {
    elements.paginationContainer.style.display = 'none';
    return;
  }

  elements.paginationContainer.style.display = 'flex';

  elements.firstBtn.disabled = currentPage === 1;
  elements.prevBtn.disabled = currentPage === 1;
  elements.nextBtn.disabled = currentPage === totalPages;
  elements.lastBtn.disabled = currentPage === totalPages;

  elements.paginationInfo.textContent = `الصفحة ${currentPage} من ${totalPages}`;

  elements.paginationNumbers.innerHTML = '';

  let startPage = Math.max(1, currentPage - 1);
  let endPage = Math.min(totalPages, startPage + 2);

  if (endPage - startPage < 2) {
    startPage = Math.max(1, endPage - 2);
  }

  for (let i = startPage; i <= endPage; i++) {
    const pageBtn = document.createElement('div');
    pageBtn.className = `pagination-number ${i === currentPage ? 'active' : ''}`;
    pageBtn.textContent = i;
    pageBtn.addEventListener('click', () => goToPage(i));
    elements.paginationNumbers.appendChild(pageBtn);
  }
}
// ===== IMAGE MANAGEMENT =====
function getArticleImageUrl(article) {
  if (article.image_brute) {
    if (!article.image_brute.startsWith('http') &&
        !article.image_brute.startsWith('/') &&
        !article.image_brute.startsWith('images')) {
      return CONFIG.imagesBasePath + article.image_brute;
    }
    return article.image_brute;
  }

  return null;
}
// ===== LOGO MEDIA MANAGEMENT =====
function getMediaLogoUrl(source) {
  if (!source || mediaLogos.length === 0) return null;

  const media = mediaLogos.find(item =>
    item.domaine && source && (
      item.domaine.toLowerCase() === source.toLowerCase() ||
      source.toLowerCase().includes(item.domaine.toLowerCase())
    )
  );

  return media ? media.url : null;
}
function createImageElement(imageUrl, title) {
  if (!imageUrl) {
    return '<div class="image-error">صورة غير متوفرة</div>';
  }

  return `<img src="${imageUrl}"
                alt="${title || 'صورة المقال'}"
                class="article-image"
                loading="lazy"
                decoding="async"
                onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\\'image-error\\'>صورة غير متوفرة</div>';"
                onload="this.style.opacity='1'"
                style="opacity:0; transition: opacity 0.3s ease;">`;
}
function createMediaLogoElement(source) {
  const logoUrl = getMediaLogoUrl(source);

  if (!logoUrl) {
    return '';
  }

  return `
    <div class="media-logo-container">
      <img src="${logoUrl}"
           alt="شعار ${source}"
           class="media-logo"
           loading="lazy"
           decoding="async"
           onerror="this.style.display='none';"
           onload="this.style.opacity='1'"
           style="opacity:0; transition: opacity 0.3s ease;">

  `;
}
// ===== LOAD & PROCESS =====
async function loadArticles() {
  try {
    showLoading(true);
    const response = await fetch(CONFIG.jsonUrl);
    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
    const data = await response.json();
    appState.articles = processArticleData(data);
    filterArticles();
  } catch (error) {
    console.error('Error loading articles:', error);
    showError('تعذر تحميل المقالات. يرجى المحاولة مرة أخرى.');
  } finally {
    showLoading(false);
  }
}
function processArticleData(articles) {
  return articles
    .filter(a => a.visible === true || a.visible === "true")
    .sort((a, b) => {
      try {
        const parseDate = (str) => {
          const [date, time] = str.split(' ');
          const [d, m, y] = date.split('/');
          const [h, min] = time ? time.split(':') : [0, 0];
          return new Date(y, m - 1, d, h, min);
        };
        return parseDate(b.date_heure) - parseDate(a.date_heure);
      } catch (e) {
        return 0;
      }
    })
    .slice(0, CONFIG.maxArticles);
}
function filterArticles() {
  const query = appState.searchQuery.toLowerCase().trim();
  const startDate = appState.startDate;
  const endDate = appState.endDate;

  appState.filteredArticles = appState.articles.filter(article => {
    let matchesText = true;
    if (query) {
      const searchableText = `
        ${article.titre || ''}
        ${article.source || ''}
        ${article.theme || ''}
        ${article.mots_cles || ''}
        ${article.langue || ''}
        ${article.sentiment || ''}
      `.toLowerCase();
     
      matchesText = searchableText.includes(query);
    }
   
    const matchesDate = isDateInRange(article.date_heure, startDate, endDate);
   
    return matchesText && matchesDate;
  });

  appState.currentPage = 1;

  displayArticles();
  updateStatsBar();
  updatePagination();

  elements.downloadPdfBtn.disabled = appState.filteredArticles.length === 0;
}

  if (isTouchDevice) {

  } else {

    });

async function generatePDF() {
  try {
    if (appState.filteredArticles.length === 0) {
      alert('لا توجد مقالات لتحميلها. يرجى تصفية المقالات أولاً.');
      return;
    }
    
    // Détection mobile et ajustement
    const isMobile = window.innerWidth <= 768;
    
    elements.downloadPdfBtn.disabled = true;
    const originalText = elements.downloadPdfBtn.innerHTML;
    elements.downloadPdfBtn.innerHTML = '<span>⏳</span><span>جار التوليد...</span>';
    
    // Délai supplémentaire sur mobile pour permettre le rendu UI
    if (isMobile) {
      await new Promise(resolve => setTimeout(resolve, 100));
    }
    
    const pdfContent = createPdfContent();
    
    elements.pdfTempContainer.innerHTML = '';
    elements.pdfTempContainer.appendChild(pdfContent);
    
    await waitForImages(pdfContent);
    
    // Options ajustées pour mobile
    const options = {
      margin: isMobile ? [5, 5, 5, 5] : [10, 10, 10, 10],
      filename: `مراجعة_الصحافة_${new Date().toISOString().split('T')[0]}.pdf`,
      image: {
        type: 'jpeg',
        quality: isMobile ? 0.85 : 0.95
      },
      html2canvas: {
        scale: isMobile ? 1.5 : 2,
        useCORS: true,
        allowTaint: true,
        logging: false,
        backgroundColor: '#ffffff',
        letterRendering: true,
        foreignObjectRendering: false,
        scrollX: 0,
        scrollY: 0
      },
      jsPDF: {
        unit: 'mm',
        format: 'a4',
        orientation: 'portrait',
        hotfixes: ["px_scaling"],
        compress: true,
        putOnlyUsedFonts: true
      }
    };
    
    await html2pdf().set(options).from(pdfContent).save();
    
    elements.pdfTempContainer.innerHTML = '';
    elements.downloadPdfBtn.disabled = false;
    elements.downloadPdfBtn.innerHTML = originalText;
    
  } catch (error) {
    console.error('Erreur lors de la génération du PDF:', error);
    alert('حدث خطأ أثناء إنشاء ملف PDF. يرجى المحاولة مرة أخرى.');

    elements.downloadPdfBtn.innerHTML = '<span>📄</span><span>تحميل PDF</span>';
    if (elements.pdfTempContainer) {
      elements.pdfTempContainer.innerHTML = '';
    }
  }
}

function waitForImages(container) {
  return new Promise((resolve) => {
    const images = container.querySelectorAll('img');
    let loaded = 0;
    const total = images.length;
    
    if (total === 0) {
      setTimeout(resolve, 300);
      return;
    }
    
    const checkComplete = () => {
      loaded++;
      if (loaded >= total) {
        setTimeout(resolve, 300);
      }
    };
    
    images.forEach(img => {
      if (img.complete && img.naturalHeight !== 0) {
        checkComplete();
      } else {
        img.onload = checkComplete;
        img.onerror = checkComplete;
      }
    });
    
    setTimeout(resolve, 8000);
  });
}

  subtitle.style.fontSize = '14px';
  subtitle.style.color = '#666';
  subtitle.style.marginBottom = '10px';

  header.appendChild(title);
  header.appendChild(subtitle);

  if (appState.startDate && appState.endDate) {
    const formatDate = (dateStr) => {
      if (!dateStr) return '';
      const [year, month, day] = dateStr.split('-');
      return `${day}/${month}/${year}`;
    };
    
    const start = formatDate(appState.startDate);
    const end = formatDate(appState.endDate);
    
    const dateRange = document.createElement('div');
    dateRange.className = 'pdf-date-range';
    dateRange.style.fontSize = '12px';
    dateRange.style.color = '#888';
    dateRange.innerHTML = `<strong>الفترة:</strong> ${start} - ${end}`;
    header.appendChild(dateRange);
  }

  const count = appState.filteredArticles.length;
  const total = appState.articles.length;
  const stats = document.createElement('div');
  stats.className = 'pdf-date-range';
  stats.style.fontSize = '12px';
  stats.style.color = '#888';
  stats.innerHTML = `<strong>عدد المقالات:</strong> ${count} مقال${count !== 1 ? 'ات' : ''} (${total} المجموع)`;
  header.appendChild(stats);

  container.appendChild(header);

  appState.filteredArticles.forEach((article, index) => {
    const articleDiv = document.createElement('div');
    articleDiv.className = 'pdf-article';
    articleDiv.style.marginBottom = '15px';
    articleDiv.style.pageBreakInside = 'avoid';
    articleDiv.style.border = '1px solid #ddd';
    articleDiv.style.borderRadius = '8px';
    articleDiv.style.padding = '12px';
    articleDiv.style.background = '#f9f9f9';
    
    const title = document.createElement('h2');
    title.className = 'pdf-article-title';
    title.textContent = `${index + 1}. ${article.titre || 'بدون عنوان'}`;
    title.style.fontSize = '16px';
    title.style.fontWeight = 'bold';
    title.style.color = '#333';
    title.style.marginBottom = '8px';
    title.style.lineHeight = '1.4';
    articleDiv.appendChild(title);
    
    const imageUrl = getArticleImageUrl(article);
    if (imageUrl) {
      const imgContainer = document.createElement('div');
      imgContainer.style.textAlign = 'center';
      imgContainer.style.margin = '8px 0';
      
      const img = document.createElement('img');
      img.className = 'pdf-article-image';
      img.src = imageUrl;
      img.style.maxWidth = '100%';
      img.style.maxHeight = '120px';
      img.style.objectFit = 'contain';
      img.style.borderRadius = '4px';
      img.style.display = 'block';
      img.style.margin = '0 auto';
      
      img.onerror = function() {
        this.style.display = 'none';
      };
      
      imgContainer.appendChild(img);
      articleDiv.appendChild(imgContainer);
    }
    
    const meta = document.createElement('div');
    meta.className = 'pdf-article-meta';
    meta.style.fontSize = '12px';
    meta.style.color = '#666';
    meta.style.marginBottom = '6px';
    meta.style.display = 'flex';
    meta.style.flexWrap = 'wrap';
    meta.style.gap = '10px';
    
    const formattedDate = formatDateToDDMMYYYY(article.date_heure) || 'تاريخ غير معروف';
    
    meta.innerHTML = `
      <div><strong>المصدر:</strong> ${article.source || 'غير معروف'}</div>
      <div><strong>التاريخ:</strong> ${formattedDate}</div>
      ${article.theme ? `<div><strong>الفئة:</strong> ${article.theme}</div>` : ''}
      ${article.sentiment ? `<div><strong>المشاعر:</strong> ${article.sentiment}</div>` : ''}
    `;
    
    articleDiv.appendChild(meta);
    
    if (article.mots_cles) {
      const keywords = article.mots_cles.split(',').map(k => k.trim()).filter(k => k);
      if (keywords.length > 0) {
        const keywordsDiv = document.createElement('div');
        keywordsDiv.className = 'pdf-keywords';
        keywordsDiv.style.display = 'flex';
        keywordsDiv.style.flexWrap = 'wrap';
        keywordsDiv.style.gap = '5px';
        keywordsDiv.style.marginTop = '8px';
        
        keywords.forEach(keyword => {
          const keywordSpan = document.createElement('span');
          keywordSpan.className = 'pdf-keyword';
          keywordSpan.textContent = keyword;
          keywordSpan.style.background = '#1a73e8';
          keywordSpan.style.color = 'white';
          keywordSpan.style.padding = '3px 8px';
          keywordSpan.style.borderRadius = '10px';
          keywordSpan.style.fontSize = '11px';
          keywordsDiv.appendChild(keywordSpan);
        });
        
        articleDiv.appendChild(keywordsDiv);
      }
    }
    
    if (article.url) {
      const urlDiv = document.createElement('div');
      urlDiv.style.marginTop = '8px';
      urlDiv.style.fontSize = '9px';
      urlDiv.style.color = '#999';
      urlDiv.style.wordBreak = 'break-all';
      urlDiv.innerHTML = `<strong>URL:</strong> ${article.url}`;
      articleDiv.appendChild(urlDiv);
    }
    
    container.appendChild(articleDiv);
  });

  const footer = document.createElement('div');
  footer.className = 'pdf-footer';
  footer.style.textAlign = 'center';
  footer.style.marginTop = '20px';
  footer.style.paddingTop = '15px';
  footer.style.borderTop = '1px solid #ddd';
  footer.style.fontSize = '11px';
  footer.style.color = '#888';

  const today = new Date();
  const dateAr = today.toLocaleDateString('ar-EG');

  footer.innerHTML = `
    تم إنشاء هذا التقرير بتاريخ ${dateAr}<br>
    <em>مراجعة الصحافة الأسبوعية</em>
  `;

  container.appendChild(footer);
  
  return container;
}

function debounce(func, wait) {
  let timeout;
  return (...args) => {
    clearTimeout(timeout);
    timeout = setTimeout(() => func(...args), wait);
  };
}
// Initialiser l'application
document.addEventListener('DOMContentLoaded', initApp);
// Gestion de la visibilité de la page pour optimiser les performances sur mobile
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    // Arrêter les animations non essentielles
    document.body.style.animationPlayState = 'paused';
  } else {
    document.body.style.animationPlayState = 'running';
  }
});
</script>
</body>
</html>
