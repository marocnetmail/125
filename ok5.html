und:rgba(255,255,255,.1);border-radius:16px;border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(10px)}.stat-item{display:flex;align-items:center;gap:10px;padding:12px 20px;background:rgba(255,255,255,.15);color:#fff;border-radius:30px;font-size:1rem;font-weight:600;flex:1;min-width:140px;border:1px solid rgba(255,255,255,.1);transition:all var(--transition)}.stat-item:hover{background:rgba(255,255,255,.25);transform:translateY(-2px)}.facebook-link{display:inline-flex;align-items:center;gap:12px;padding:14px 22px;background:var(--facebook);color:#fff;text-decoration:none;border-radius:14px;font-weight:700;margin-top:25px}.facebook-link:hover{background:var(--facebook-dark);transform:translateY(-3px);box-shadow:0 6px 20px rgba(8,102,255,.4)}.facebook-icon{font-size:1.4rem}.controls{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:15px 0}.search-input,.year-select{flex:1;min-width:220px;padding:14px 18px;font-size:1.1rem;border:2px solid #ddd;background:#fff;border-radius:12px;transition:all var(--transition)}.search-input:focus,.year-select:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(147,112,219,.15);transform:translateY(-2px)}.theme-toggle{padding:14px 18px;background:var(--primary);color:#fff;border:none;border-radius:12px;cursor:pointer;font-size:1.3rem;transition:all var(--transition);min-width:70px}.theme-toggle:hover{background:var(--secondary);transform:translateY(-3px)}.year-section{margin-bottom:25px;background:#fff;border-radius:20px;overflow:hidden;box-shadow:var(--card-shadow);border:1px solid rgba(147,112,219,.1);transition:transform var(--transition)}.year-section:hover{transform:translateY(-5px)}.year-header{width:100%;padding:18px;background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;border:none;text-align:right;font-size:1.4rem;font-weight:800;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:15px}.year-header:hover{background:linear-gradient(135deg,#8a64d4 <script>
const VIDEO_DATA=[{fbid:"664426331407897",date:"2022-01-18",year:"2022",titre_ar:"تخليد اليوم الوطني للمهندس المعماري",titre_fr:"Célébration de la Journée Nationale de l'Architecte",description_ar:"تخليد اليوم الوطني للمهندس المعماري تحت شعار: \"دور المهندس المعماري في النموذج التنموي الجديد\"، حيث نظمت الوزارة فعاليات وأنشطة للاحتفاء بدور المهندسين المعماريين في تشكيل المشهد الحضري والمساهمة في التنمية المستدامة. تم تنظيم هذا الحدث الهام في مقر الوزارة بحضور عدد كبير من المهندسين المعماريين والخبراء في مجال التعمير والتنمية الحضرية.",description_fr:"Célébration de la Journée Nationale de l'Architecte sous le thème : \"Le rôle de l'architecte dans le nouveau modèle de développement\". Le ministère a organisé des événements et activités pour célébrer le rôle des architectes dans la formation du paysage urbain et leur contribution au développement durable. Cet événement majeur a rassemblé des architectes, des urbanistes et des experts du développement territorial.",url_facebook:"https://www.facebook.com/MATUHPV/videos/664426331407897/",thumbnail:"https://scontent-iad3-2.xx.fbcdn.net/v/t15.5256-10/271810389_664431154740748_9199244546718538407_n.jpg",type:"video",views:1856,reactions:145,commentaires:43,partages:25,duration_seconds:120},{fbid:"3055743178046962",date:"2022-01-24",year:"2022",titre_ar:"الجزء الاول من الجلسة العمومية للأسئلة الأسبوعية الشفوية",titre_fr:"Première partie de la séance plénière des questions orales hebdomadaires",description_ar:"الجلسة العمومية للأسئلة الأسبوعية الشفوية التي عقدت في البرلمان، حيث تمت مناقشة عدد من القضايا المتعلقة بسياسات الإسكان والتعمير. تناولت الجلسة مواضيع هامة تتعلق بتطوير المدن وتحسين جودة الحياة للمواطنين.",description_fr:"Séance plénière des questions orales hebdomadaires au Parlement, durant laquelle plusieurs questions relatives aux politiques de logement et d'urbanisme ont été débattues. La séance a abordé des sujets importants concernant le développement des villes et l'amélioration de la qualité de vie des citoyens.",url_facebook:"https://www.facebook.com/MATUHPV/videos/3055743178046962/",thumbnail:"https://scontent-iad3-2.xx.fbcdn.net/v/t15.5256-10/272058391_3055758311378782_7854534478366822538_n.jpg",type:"video",views:2103,reactions:78,commentaires:32,partages:18,duration_seconds:180},{fbid:"123456789012345",date:"2021-12-15",year:"2021",titre_ar:"",titre_fr:"Visite de terrain pour le projet de développement urbain",description_ar:"",description_fr:"Visite de terrain effectuée par la ministre pour suivre l'avancement des travaux du projet de développement urbain dans la région nord. La visite a permis de constater les progrès réalisés et d'échanger avec les responsables du projet.",url_facebook:"https://www.facebook.com/MATUHPV/videos/123456789012345/",thumbnail:"https://via.placeholder.com/800x450/9370DB/FFFFFF?text=Visite+Terrain",type:"video",views:1500,reactions:65,commentaires:28,partages:12,duration_seconds:240}];

function createYearSection(e,t){const n=document.createElement("section");n.className="year-section";n.setAttribute("aria-label",`Vidéos de l'année ${e}`);const a=document.createElement("button");a.className="year-header";a.dataset.year=e;a.setAttribute("aria-expanded","false");a.innerHTML=`سنة ${e} <span class="year-count">${t.length}</span>`;const o=document.createElement("div");o.className="videos-panel";o.setAttribute("role","region");t.forEach((e,t)=>{setTimeout(()=>{o.appendChild(createVideoCard(e))},100*t)});return n.appendChild(a),n.appendChild(o),n}

// Modifier la fonction createVideoCard pour utiliser le nouveau conteneur de transformation
function createVideoCard(e){const t=document.createElement("article");t.className=`publication-card`;const n=e.titre_ar||e.titre_fr;t.setAttribute("aria-label",n);t.style.animationDelay=`${.3*Math.random()}s`;const a=e.thumbnail?createVideoTransformationContent(e):"",o=e.type==="reel"?createReelsBadge():"",i=e.description_ar||e.description_fr||"",s=i.length>150,d=createDescriptionContent(i,"ar",s);t.innerHTML=`<div class="card-header"><div class="avatar" aria-hidden="true">M</div><div><div class="post-date">${formatDate(e.date)}</div></div></div>${o}<div class="post-content"><strong>${escapeHtml(n)}</strong>${d}</div>${a}<div class="post-stats"><div>👁 ${formatNumber(e.views||0)} مشاهدة</div><div>👍 ${formatNumber(e.reactions||0)} تفاعل</div><div>💬 ${formatNumber(e.commentaires||0)} تعليق</div><div>↗ ${formatNumber(e.partages||0)} مشاركة</div></div><button class="btn" data-fbid="${e.fbid}" aria-label="مشاهدة ${n} على فيسبوك"><span style="margin-left: 8px;">📘</span> مشاهدة على فيسبوك</button>`;t.querySelector(".btn")?.addEventListener("click",()=>window.open(e.url_facebook,"_blank"));t.querySelectorAll(".see-more-btn").forEach(e=>{e.addEventListener("click",function(e){e.preventDefault();const t=this.closest(".description-container"),n=t.querySelector(".description-text"),a=this.classList.contains("expanded");a?(n.classList.add("truncated"),this.classList.remove("expanded"),this.innerHTML='<span class="icon">▼</span> عرض المزيد'):(n.classList.remove("truncated"),this.classList.add("expanded"),this.innerHTML='<span class="icon">▲</span> عرض أقل')})});return t}

// Nouvelle fonction pour créer le conteneur de transformation image→vidéo
function createVideoTransformationContent(e){const t=e.type==="reel"?"9/16":"16/9",n=e.duration_seconds?`<div class="video-time">${formatDuration(e.duration_seconds)}</div>`:"",a=e.titre_ar||e.titre_fr||"",o=generateEmbedUrl(e.url_facebook);return`<div class="video-transformation-container" data-fbid="${e.fbid}" style="aspect-ratio: ${t};"><img src="${e.thumbnail}" alt="${a}" class="video-thumbnail" loading="lazy" width="800" height="450"><div class="play-button-overlay">▶</div>${n}<iframe src="" data-embed-url="${o}" class="video-embed-frame" title="Vidéo ${a}" allow="autoplay; fullscreen" allowfullscreen></iframe></div>`}

function generateEmbedUrl(e){const t=e.split("?")[0];return`https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(t)}&show_text=false&width=560&autoplay=true`}

// Gérer le clic sur l'image pour la transformer en vidéo
function setupVideoTransformation(){document.querySelectorAll(".video-transformation-container").forEach(e=>{const t=e.querySelector(".video-thumbnail"),n=e.querySelector(".play-button-overlay"),a=e.querySelector(".video-embed-frame"),o=e.dataset.fbid;function i(){t.style.opacity="0";setTimeout(()=>{t.style.display="none"},500);a.src=a.dataset.embedUrl;a.classList.add("active");n.style.display="none";state.playingVideos[o]=!0}function s(){t.style.opacity="1";t.style.display="block";a.src="";a.classList.remove("active");n.style.display="flex";delete state.playingVideos[o]}t.addEventListener("click",i);n.addEventListener("click",i);e.addEventListener("dblclick",s)})}

function createDescriptionContent(e,t,n){if(!e)return"";const a=t==="ar"?"ar":"";if(n)return`<div class="description-container"><div class="description-text truncated ${a}">${escapeHtml(e)}</div><button class="see-more-btn"><span class="icon">▼</span> عرض المزيد</button></div>`;return`<div class="description-text ${a}">${escapeHtml(e)}</div>`}
function createReelsBadge(){return'<div class="reels-badge">Facebook Reels</div>'}
function showVideo(e){state.activeVideo=e;const t=e.titre_ar||e.titre_fr||"",n=e.titre_fr||"",a=e.description_ar||e.description_fr||"",o=a.length>150;document.getElementById("videoTitleHeader").textContent=truncateText(n,60);document.getElementById("videoTitleAr").textContent=t;document.getElementById("videoTitleFr").textContent=n;document.getElementById("videoDescriptionAr").innerHTML=createDescriptionContent(a,"ar",o);document.getElementById("videoDate").textContent=formatDate(e.date);document.getElementById("videoYear").textContent=e.year;document.getElementById("videoId").textContent=e.fbid;document.getElementById("facebookLink").href=e.url_facebook;updateVideoStats(e);loadVideoIframe(e);document.getElementById("videoSection").classList.add("active");document.getElementById("videoSection").scrollIntoView({behavior:"smooth",block:"start"});setTimeout(()=>{document.querySelectorAll("#videoDescriptionContainer .see-more-btn").forEach(e=>{e.addEventListener("click",function(e){e.preventDefault();const t=this.closest(".description-container"),n=t.querySelector(".description-text"),a=this.classList.contains("expanded");a?(n.classList.add("truncated"),this.classList.remove("expanded"),this.innerHTML='<span class="icon">▼</span> عرض المزيد'):(n.classList.remove("truncated"),this.classList.add("expanded"),this.innerHTML='<span class="icon">▲</span> عرض أقل')})})},100);renderVideos()}
function updateVideoStats(e){const t=document.getElementById("videoStats");t.innerHTML="";[{icon:"👁",value:e.views,label:"vues"},{icon:"👍",value:e.reactions,label:"réactions"},{icon:"💬",value:e.commentaires,label:"commentaires"},{icon:"↪️",value:e.partages,label:"partages"}].forEach(({icon:n,value:a,label:o})=>{if(a||0===a){const i=document.createElement("div");i.className="stat-item";i.innerHTML=`<span>${n}</span> ${formatNumber(a)} ${o}`;t.appendChild(i)}})}
function loadVideoIframe(e){const t=e.url_facebook.split("?")[0];document.getElementById("videoIframe").src=`https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(t)}&show_text=false&width=560`}
function hideVideo(){state.activeVideo=null;document.getElementById("videoSection").classList.remove("active");document.getElementById("videoIframe").src="";renderVideos()}
function toggleYearPanel(e){const t=e.nextElementSibling,n=e.classList.contains("open");n?(e.classList.remove("open"),e.setAttribute("aria-expanded","false"),t.style.maxHeight=null,state.openYear=null):(e.classList.add("open"),e.setAttribute("aria-expanded","true"),t.style.maxHeight=t.scrollHeight+"px",state.openYear=e.dataset.year)}
function formatDate(e){try{return new Date(e).toLocaleDateString("ar-MA",{day:"numeric",month:"long",year:"numeric"})}catch(t){return e}}
function formatDuration(e){const t=Math.floor(e/60);return`${t}:${(e%60).toString().padStart(2,"0")}`}
function formatNumber(e){return e||0===e?e.toString().replace(/\B(?=(\d{3})+(?!\d))/g,","):"0"}
function truncateText(e,t){return e&&e.length>t?e.substring(0,t)+"...":e||""}
function escapeHtml(e){if(!e)return"";const t=document.createElement("div");return t.textContent=e,t.innerHTML}
function setupEventListeners(){document.getElementById("searchInput").addEventListener("input",e=>{state.searchTerm=e.target.value;renderVideos();setTimeout(setupVideoTransformation,100)});document.getElementById("yearSelect").addEventListener("change",e=>{state.selectedYear=e.target.value;renderVideos();setTimeout(setupVideoTransformation,100)});document.getElementById("themeToggle").addEventListener("click",toggleTheme);document.getElementById("closeVideo").addEventListener("click",hideVideo);document.getElementById("videosTree").addEventListener("click",e=>{e.target.closest(".year-header")&&toggleYearPanel(e.target.closest(".year-header"))});document.addEventListener("keydown",e=>{"Escape"===e.key&&state.activeVideo&&hideVideo()});setTimeout(setupVideoTransformation,500)}
function toggleTheme(){const e=document.body.classList.toggle("dark-mode");localStorage.setItem("theme",e?"dark":"light");document.getElementById("themeToggle").textContent=e?"☀️":"🌓"}
function restoreTheme(){"dark"===localStorage.getItem("theme")&&(document.body.classList.add("dark-mode"),document.getElementById("themeToggle").textContent="☀️")}
document.addEventListener("DOMContentLoaded",()=>{init();setTimeout(setupVideoTransformation,1000)});
</script>
</body>
